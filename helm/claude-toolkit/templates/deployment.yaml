apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "claude-toolkit.fullname" . }}
  labels:
    {{- include "claude-toolkit.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "claude-toolkit.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "claude-toolkit.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "claude-toolkit.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: claude-toolkit
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            # ── Claude API ──
            - name: CLAUDE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.existingSecret | default (printf "%s-claude" (include "claude-toolkit.fullname" .)) }}
                  key: {{ .Values.secret.apiKeyKey }}
            - name: CLAUDE_BASE_URL
              value: {{ .Values.claude.baseUrl | quote }}
            - name: CLAUDE_MODEL
              value: {{ .Values.claude.model | quote }}
            {{- if .Values.claude.proxyHost }}
            - name: CLAUDE_PROXY_HOST
              value: {{ .Values.claude.proxyHost | quote }}
            - name: CLAUDE_PROXY_PORT
              value: {{ .Values.claude.proxyPort | quote }}
            {{- end }}
            # ── DB ──
            - name: DB_TYPE
              value: {{ .Values.db.type | quote }}
            {{- if ne .Values.db.type "h2" }}
            - name: DB_HOST
              value: {{ .Values.db.host | quote }}
            - name: DB_PORT
              value: {{ include "claude-toolkit.dbPort" . | quote }}
            - name: DB_NAME
              value: {{ .Values.db.name | quote }}
            - name: DB_USERNAME
              value: {{ .Values.db.username | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dbSecret.existingSecret | default (printf "%s-db" (include "claude-toolkit.fullname" .)) }}
                  key: {{ .Values.dbSecret.passwordKey }}
            {{- end }}
            {{- if .Values.javaOpts }}
            - name: JAVA_OPTS
              value: {{ .Values.javaOpts | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.healthcheck.enabled }}
          # v4.4.0: startupProbe — Spring Boot 시작 시간이 길어도 (최대 5분) liveness 가
          #         pod 를 죽이지 않도록 보호. failureThreshold * periodSeconds 까지 대기.
          startupProbe:
            httpGet:
              path: {{ .Values.healthcheck.livenessPath }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: {{ .Values.healthcheck.timeoutSeconds }}
            failureThreshold: 30   # 30 * 10s = 5분 시작 허용
          livenessProbe:
            httpGet:
              path: {{ .Values.healthcheck.livenessPath }}
              port: http
            initialDelaySeconds: {{ .Values.healthcheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.periodSeconds }}
            timeoutSeconds: {{ .Values.healthcheck.timeoutSeconds }}
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.healthcheck.readinessPath }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: {{ .Values.healthcheck.periodSeconds }}
            timeoutSeconds: {{ .Values.healthcheck.timeoutSeconds }}
            failureThreshold: 3
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if and .Values.persistence.enabled (eq .Values.db.type "h2") }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          {{- end }}
      {{- if and .Values.persistence.enabled (eq .Values.db.type "h2") }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "claude-toolkit.fullname" . }}-data
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
