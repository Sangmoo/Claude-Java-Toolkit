{{- if and .Values.persistence.enabled (eq .Values.db.type "h2") -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "claude-toolkit.fullname" . }}-data
  labels:
    {{- include "claude-toolkit.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
{{- end }}
