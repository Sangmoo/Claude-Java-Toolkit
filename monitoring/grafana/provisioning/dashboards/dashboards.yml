# v4.3.0 — Grafana 가 시작 시 /var/lib/grafana/dashboards 디렉토리의
# JSON 대시보드 파일들을 자동 로드한다.

apiVersion: 1

providers:
  - name: 'Claude Toolkit'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
