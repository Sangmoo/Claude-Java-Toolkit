services:
  claude-toolkit:
    build: .
    container_name: claude-toolkit
    ports:
      - "${PORT:-8027}:8027"
    environment:
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - CLAUDE_BASE_URL=${CLAUDE_BASE_URL:-https://api.anthropic.com}
      - CLAUDE_PROXY_HOST=${CLAUDE_PROXY_HOST:-}
      - CLAUDE_PROXY_PORT=${CLAUDE_PROXY_PORT:-0}
      - DB_TYPE=${DB_TYPE:-h2}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-claude_toolkit}
      - DB_USERNAME=${DB_USERNAME:-claude}
      - DB_PASSWORD=${DB_PASSWORD:-claude1234}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1}
      # JAVA_OPTS 는 Dockerfile 의 기본값 (TLS/DNS 튜닝 포함) 을 사용한다.
      # 커스텀 옵션이 필요할 때만 override — 기본값을 덮지 않도록 주의.
    volumes:
      - toolkit-data:/root/.claude-toolkit
      # Windows 드라이브를 컨테이너에 마운트 (읽기 전용)
      # D:\path → 컨테이너 /host/d/path 로 자동 접근
      - /c:/host/c:ro
      - /d:/host/d:ro
    restart: unless-stopped

  # ── MySQL (docker-compose --profile mysql up -d) ──
  db:
    image: mysql:8.0
    container_name: claude-toolkit-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root1234}
      MYSQL_DATABASE: ${DB_NAME:-claude_toolkit}
      MYSQL_USER: ${DB_USERNAME:-claude}
      MYSQL_PASSWORD: ${DB_PASSWORD:-claude1234}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    profiles:
      - mysql

  # ── PostgreSQL (docker-compose --profile postgresql up -d) ──
  db-pg:
    image: postgres:14-alpine
    container_name: claude-toolkit-pg
    environment:
      POSTGRES_DB: ${DB_NAME:-claude_toolkit}
      POSTGRES_USER: ${DB_USERNAME:-claude}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-claude1234}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    profiles:
      - postgresql

  # ────────────────────────────────────────────────────────────────────────
  # v4.3.0: 모니터링 스택 (docker-compose --profile monitoring up -d)
  # ────────────────────────────────────────────────────────────────────────
  # Prometheus 가 claude-toolkit:8027/actuator/prometheus 를 15초 간격으로 스크랩.
  # Grafana 는 Prometheus 를 데이터소스로 자동 등록 + "Claude Toolkit Overview"
  # 대시보드를 자동 프로비저닝.
  #
  # 접속:
  #   - Grafana:    http://localhost:3000  (admin/admin, 첫 로그인 시 비번 변경)
  #   - Prometheus: http://localhost:9090  (메트릭 직접 쿼리용 — 대부분 안 봐도 됨)

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: claude-toolkit-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.4.0
    container_name: claude-toolkit-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  toolkit-data:
  db-data:
  pg-data:
  prometheus-data:
  grafana-data:
