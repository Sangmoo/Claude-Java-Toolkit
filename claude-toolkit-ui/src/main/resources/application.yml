server:
  port: ${PORT:8027}

spring:
  application:
    name: claude-toolkit-ui
  thymeleaf:
    cache: false
    encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:h2:file:${user.home}/.claude-toolkit/history-db;AUTO_SERVER=TRUE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

claude:
  api-key: ${CLAUDE_API_KEY:}   # Set via env var: export CLAUDE_API_KEY=sk-ant-...
  model: claude-sonnet-4-20250514
  max-tokens: 8192
  timeout-seconds: 120

# ── Claude Toolkit settings ────────────────────────────────────────────────
# These can also be provided via environment variables or updated at runtime
# through the Settings page at http://localhost:8027/settings
toolkit:
  db:
    url: ${ORACLE_DB_URL:}                # e.g. jdbc:oracle:thin:@//host:1521/ORCL
    username: ${ORACLE_DB_USERNAME:}
    password: ${ORACLE_DB_PASSWORD:}
  project:
    scan-path: ${PROJECT_SCAN_PATH:}      # e.g. C:/workspace/my-project/src/main/java

logging:
  level:
    io.github.claudetoolkit: DEBUG
