server:
  port: ${PORT:8027}

spring:
  application:
    name: claude-toolkit-ui
  profiles:
    active: ${DB_TYPE:h2}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
    session:
      timeout: 60m
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

claude:
  api-key: ${CLAUDE_API_KEY:}   # Set via env var: export CLAUDE_API_KEY=sk-ant-...
  model: claude-sonnet-4-20250514
  max-tokens: 8192
  timeout-seconds: 120
  base-url: ${CLAUDE_BASE_URL:https://api.anthropic.com}
  proxy-host: ${CLAUDE_PROXY_HOST:}   # 사내망에서 forward proxy 경유 시 지정
  proxy-port: ${CLAUDE_PROXY_PORT:0}  # 0 = 미설정

# ── Claude Toolkit settings ────────────────────────────────────────────────
# These can also be provided via environment variables or updated at runtime
# through the Settings page at http://localhost:8027/settings
toolkit:
  db:
    url: ${ORACLE_DB_URL:}                # e.g. jdbc:oracle:thin:@//host:1521/ORCL
    username: ${ORACLE_DB_USERNAME:}
    password: ${ORACLE_DB_PASSWORD:}
  project:
    scan-path: ${PROJECT_SCAN_PATH:}      # e.g. C:/workspace/my-project/src/main/java
  # v4.2.7: 이력/즐겨찾기 보관 상한 설정화
  history:
    max: ${TOOLKIT_HISTORY_MAX:200}       # 전체 리뷰 이력 상한 (초과시 가장 오래된 것부터 제거)
  favorites:
    max: ${TOOLKIT_FAVORITES_MAX:500}     # 전체 즐겨찾기 상한

# ── Actuator / Health / Metrics ───────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        # v4.3.0: prometheus 엔드포인트 추가 (/actuator/prometheus — Grafana 스크랩용)
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
      # v4.4.x — Spring Boot 표준 liveness/readiness 분리 활성화
      #   /actuator/health/liveness  → 앱이 살아있는가 (재시작 결정)
      #   /actuator/health/readiness → 트래픽을 받을 준비가 됐는가 (Startup warmup 완료 여부)
      # Docker / K8s 가 readiness 를 기다려야 사용자에게 "준비 안된" 화면이 안 노출됨.
      probes:
        enabled: true
      # v4.2.6: 헬스 결과 캐싱 — 30초 동안 같은 결과 재사용
      # OracleDbHealthIndicator 등 외부 의존성 검사가 자주 호출되어 워커 스레드를
      # 묶지 않도록 함. Indicator 자체에도 60초 캐시가 있어서 이중 보호.
      cache:
        time-to-live: 30s
      # v4.4.x — StartupReadiness 를 readiness probe 그룹에 포함
      group:
        readiness:
          include: readinessState,startupReadiness,db
  metrics:
    # v4.3.0: 모든 메트릭에 application 태그 자동 부여 (Grafana 다중 인스턴스 구분용)
    tags:
      application: claude-toolkit
    # 분포 통계 — HTTP 요청 시간/SQL 분석 시간 백분위 (p50/p95/p99) 노출
    distribution:
      percentiles-histogram:
        http.server.requests: true
        analysis.duration: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
        analysis.duration: 0.5, 0.95, 0.99

# ── OpenAPI / Swagger UI (v4.4.0) ─────────────────────────────────────────
# /swagger-ui.html → 인터랙티브 API 탐색
# /v3/api-docs    → JSON 스펙 (Postman/Insomnia 임포트)
# SecurityConfig 가 ADMIN 으로 제한
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tagsSorter: alpha
    operationsSorter: method
    displayRequestDuration: true
    tryItOutEnabled: true
    persistAuthorization: true
    docExpansion: none           # 첫 화면에서 모두 접힘 (large API 가독성)
  paths-to-match:
    - /api/v1/**                  # 공식 REST API 만 노출 (내부 /stream/** 등 제외)
  packages-to-scan:
    - io.github.claudetoolkit.ui.api
    - io.github.claudetoolkit.ui.cost
    - io.github.claudetoolkit.ui.sqlindex
    - io.github.claudetoolkit.ui.dashboard
    - io.github.claudetoolkit.ui.export
    - io.github.claudetoolkit.ui.flow
  show-actuator: false            # /actuator/** 는 별도 헬스체크용이므로 제외

logging:
  level:
    io.github.claudetoolkit: DEBUG
