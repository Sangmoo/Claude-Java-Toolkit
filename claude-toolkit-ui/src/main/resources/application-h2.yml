# ═══ H2 파일 DB (기본값) ═══
spring:
  datasource:
    url: jdbc:h2:file:${user.home}/.claude-toolkit/history-db;AUTO_SERVER=TRUE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: false
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
