# ═══ H2 파일 DB (기본값) ═══
# DB 파일 위치: ~/.claude-toolkit/history-db.mv.db
# 재빌드/재배포해도 데이터 유지됨 (ddl-auto: update)
spring:
  datasource:
    url: jdbc:h2:file:${user.home}/.claude-toolkit/history-db;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: false
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
