<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>Settings 잠금 해제 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="/webjars/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css(v='20250408')}" rel="stylesheet">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh;
               background:var(--bg-primary); }
        .unlock-card { background:var(--bg-secondary); border:1px solid var(--border-color);
                       border-radius:16px; padding:40px 44px; width:100%; max-width:400px;
                       box-shadow:0 8px 32px rgba(0,0,0,.18); }
        .unlock-icon { font-size:2.6rem; color:var(--accent); margin-bottom:16px; opacity:.85; }
        .unlock-input { background:var(--input-bg) !important; border:1px solid var(--border-color) !important;
                        color:var(--text-primary) !important; border-radius:8px; padding:10px 14px;
                        font-size:.9rem; width:100%; }
        .unlock-input:focus { outline:none; border-color:var(--accent) !important;
                              box-shadow:0 0 0 2px rgba(249,115,22,.18) !important; }
        .error-msg { color:#ef4444; font-size:.8rem; margin-top:8px; display:none; }
    </style>
</head>
<body>
<div class="unlock-card text-center">
    <div class="unlock-icon"><i class="fas fa-lock"></i></div>
    <h2 style="font-size:1.15rem;font-weight:700;color:var(--text-primary);margin-bottom:6px;">
        Settings 잠금 해제
    </h2>
    <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:24px;">
        설정 페이지에 접근하려면 비밀번호를 입력하세요.
    </p>

    <input type="password" id="pwdInput" class="unlock-input mb-3"
           placeholder="비밀번호 입력..."
           autofocus
           onkeydown="if(event.key==='Enter') doUnlock()">
    <div class="error-msg" id="errorMsg">
        <i class="fas fa-exclamation-circle me-1"></i><span id="errorText"></span>
    </div>

    <button type="button" class="btn-accent w-100 mt-3" onclick="doUnlock()" id="unlockBtn"
            style="padding:10px;font-size:.9rem;">
        <i class="fas fa-unlock me-1"></i>잠금 해제
    </button>

    <a th:href="@{/}" style="display:block;margin-top:16px;font-size:.78rem;color:var(--text-muted);
                              text-decoration:none;">
        <i class="fas fa-arrow-left me-1"></i>홈으로 돌아가기
    </a>
</div>

<script th:src="@{/js/toolkit.js}"></script>
<script th:inline="javascript">
var redirectUrl = /*[[${redirect}]]*/ '/settings';

function doUnlock() {
    var pwd = document.getElementById('pwdInput').value;
    if (!pwd) return;

    var btn = document.getElementById('unlockBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-circle-notch fa-spin me-1"></i>확인 중...';

    var fd = new FormData();
    fd.append('password', pwd);

    fetch('/security/settings-unlock', {method:'POST', body:fd})
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (d.success) {
                window.location.href = redirectUrl;
            } else {
                var errMsg = document.getElementById('errorMsg');
                document.getElementById('errorText').textContent = d.error || '비밀번호가 올바르지 않습니다.';
                errMsg.style.display = '';
                document.getElementById('pwdInput').value = '';
                document.getElementById('pwdInput').focus();
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-unlock me-1"></i>잠금 해제';
            }
        })
        .catch(function() {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-unlock me-1"></i>잠금 해제';
            alert('요청 실패');
        });
}
</script>
</body>
</html>
