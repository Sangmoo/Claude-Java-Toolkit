<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>리뷰 요청 상세 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/6.5.1/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/prismjs/1.29.0/themes/prism-tomorrow.min.css}">
    <link th:href="@{/css/toolkit.css(v='20250411')}" rel="stylesheet">
    <style>
        .detail-header {
            background:var(--bg-secondary); border:1px solid var(--border-color);
            border-radius:12px; padding:18px 22px; margin-bottom:16px;
        }
        .detail-header h4 { margin:0 0 10px 0; font-size:1rem; font-weight:700; }
        .detail-header .meta { font-size:.82rem; color:var(--text-sub); display:flex; gap:18px; flex-wrap:wrap; }
        .detail-header .meta b { color:var(--text-primary); }

        .status-big {
            display:inline-block; font-size:.8rem; font-weight:700;
            padding:4px 14px; border-radius:14px; margin-left:8px;
        }

        .content-box {
            background:var(--bg-secondary); border:1px solid var(--border-color);
            border-radius:10px; padding:16px 20px; margin-bottom:14px;
        }
        .content-box h6 {
            font-size:.82rem; font-weight:700; color:var(--text-primary);
            margin:0 0 10px 0; display:flex; align-items:center; gap:6px;
        }
        .result-md {
            max-height:420px; overflow-y:auto;
            background:var(--bg-tertiary); padding:12px 16px; border-radius:8px;
            font-size:.84rem; line-height:1.65; color:var(--text-primary);
        }
        .result-md pre {
            background:#1e1e2e; color:#f1f5f9; padding:10px 14px; border-radius:6px;
            font-size:.78rem; overflow-x:auto; margin:6px 0;
        }
        .result-md code {
            background:rgba(124,107,240,.12); color:#a78bfa; padding:1px 5px;
            border-radius:3px; font-size:.78rem;
        }
        .comment-box {
            background:var(--bg-tertiary); border-left:3px solid var(--accent);
            padding:10px 14px; border-radius:0 6px 6px 0; font-size:.84rem;
            white-space:pre-wrap; margin-top:8px;
        }
        .action-bar {
            display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;
        }
        .btn-approve {
            background:#10b981; color:#fff; border:none; border-radius:8px;
            padding:9px 22px; font-size:.86rem; font-weight:600; cursor:pointer;
        }
        .btn-approve:hover { background:#059669; }
        .btn-reject {
            background:#ef4444; color:#fff; border:none; border-radius:8px;
            padding:9px 22px; font-size:.86rem; font-weight:600; cursor:pointer;
        }
        .btn-reject:hover { background:#dc2626; }
    </style>
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>
    <main class="main-area">
        <div class="top-bar">
            <span class="top-bar-title">
                <a href="/review-requests" style="color:var(--text-muted);text-decoration:none;margin-right:8px;">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <i class="fas fa-file-alt me-2" style="color:#8b5cf6"></i>리뷰 요청 상세
            </span>
            <button id="themeToggle" onclick="toggleTheme()">
                <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
            </button>
        </div>
        <div class="main-content">

            <!-- 상단 메타 정보 -->
            <div class="detail-header">
                <h4>
                    <span th:text="${req.historyTitle}">제목</span>
                    <span class="status-big"
                          th:style="'background:' + ${req.statusColor} + '20; color:' + ${req.statusColor} + ';'"
                          th:text="${req.statusLabel}">상태</span>
                </h4>
                <div class="meta">
                    <span><i class="fas fa-tag me-1"></i>유형: <b th:text="${req.historyType}"></b></span>
                    <span><i class="fas fa-user me-1"></i>요청자: <b th:text="${req.authorUsername}"></b></span>
                    <span><i class="fas fa-arrow-right"></i></span>
                    <span><i class="fas fa-user-tie me-1"></i>리뷰어: <b th:text="${req.reviewerUsername}"></b></span>
                    <span><i class="fas fa-clock me-1"></i>요청 <span th:text="${req.createdAt}"></span></span>
                    <span th:if="${req.status != 'PENDING'}">
                        <i class="fas fa-check me-1"></i>응답 <span th:text="${req.respondedAt}"></span>
                    </span>
                </div>
            </div>

            <div class="row">
                <!-- 좌측: 분석 결과 -->
                <div class="col-lg-7">
                    <div class="content-box">
                        <h6><i class="fas fa-file-code" style="color:#3b82f6"></i>원본 분석 결과</h6>
                        <div th:if="${history != null}" class="result-md" id="resultMd"
                             th:text="${history.outputContent}">결과 내용</div>
                        <div th:if="${history == null}" class="result-md" style="color:#ef4444;">
                            <i class="fas fa-exclamation-triangle me-1"></i>연결된 분석 이력이 삭제되었습니다.
                        </div>
                    </div>
                </div>

                <!-- 우측: 코멘트 + 액션 -->
                <div class="col-lg-5">
                    <!-- 요청 코멘트 -->
                    <div class="content-box" th:if="${req.requestComment != null and !#strings.isEmpty(req.requestComment)}">
                        <h6><i class="fas fa-comment" style="color:#f59e0b"></i>요청자 메모</h6>
                        <div class="comment-box" th:text="${req.requestComment}"></div>
                    </div>

                    <!-- 리뷰 코멘트 -->
                    <div class="content-box" th:if="${req.reviewComment != null and !#strings.isEmpty(req.reviewComment)}">
                        <h6>
                            <i class="fas fa-reply" th:style="'color:' + ${req.statusColor}"></i>
                            리뷰어 코멘트 · <span th:text="${req.statusLabel}" th:style="'color:' + ${req.statusColor}"></span>
                        </h6>
                        <div class="comment-box" th:text="${req.reviewComment}"></div>
                    </div>

                    <!-- 액션 영역 (리뷰어 전용, PENDING일 때) -->
                    <div th:if="${canRespond}" class="content-box">
                        <h6><i class="fas fa-gavel" style="color:var(--accent)"></i>리뷰 응답</h6>
                        <p style="font-size:.8rem;color:var(--text-muted);margin-bottom:8px;">
                            지정된 리뷰어로 이 요청에 승인 또는 반려할 수 있습니다.
                        </p>
                        <textarea id="reviewComment" class="form-control" rows="4"
                                  style="font-size:.84rem;margin-bottom:12px;"
                                  placeholder="리뷰 코멘트 (승인 시 선택, 반려 시 필수)"></textarea>
                        <div class="action-bar">
                            <button class="btn-approve" onclick="approve()">
                                <i class="fas fa-check me-1"></i>승인
                            </button>
                            <button class="btn-reject" onclick="reject()">
                                <i class="fas fa-times me-1"></i>반려
                            </button>
                        </div>
                    </div>

                    <!-- 요청 취소 버튼 (작성자, PENDING) -->
                    <div th:if="${canDelete}" class="content-box">
                        <button class="btn btn-outline-tk btn-sm" onclick="cancelRequest()"
                                style="font-size:.78rem;padding:6px 14px;">
                            <i class="fas fa-times me-1"></i>요청 취소
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/webjars/prismjs/1.29.0/prism.js}"></script>
<script th:src="@{/webjars/prismjs/1.29.0/components/prism-java.min.js}"></script>
<script th:src="@{/webjars/prismjs/1.29.0/components/prism-sql.min.js}"></script>
<script th:src="@{/js/toolkit.js(v='20250411')}"></script>
<script th:inline="javascript">
var REQ_ID = /*[[${req.id}]]*/ 0;

function approve() {
    var comment = document.getElementById('reviewComment').value || '';
    if (!confirm('이 리뷰 요청을 승인하시겠습니까?')) return;
    var fd = new URLSearchParams();
    fd.append('comment', comment);
    fetch('/review-requests/' + REQ_ID + '/approve', {method:'POST', body:fd})
        .then(function(r){ return r.json(); })
        .then(function(d){
            if (d.success) {
                showToast('승인되었습니다.', 'success');
                setTimeout(function(){ location.reload(); }, 800);
            } else {
                showToast(d.error || '승인 실패', 'error');
            }
        });
}

function reject() {
    var comment = document.getElementById('reviewComment').value || '';
    if (!comment.trim()) {
        showToast('반려 사유를 입력해주세요.', 'warning');
        return;
    }
    if (!confirm('이 리뷰 요청을 반려하시겠습니까?')) return;
    var fd = new URLSearchParams();
    fd.append('comment', comment);
    fetch('/review-requests/' + REQ_ID + '/reject', {method:'POST', body:fd})
        .then(function(r){ return r.json(); })
        .then(function(d){
            if (d.success) {
                showToast('반려되었습니다.', 'success');
                setTimeout(function(){ location.reload(); }, 800);
            } else {
                showToast(d.error || '반려 실패', 'error');
            }
        });
}

function cancelRequest() {
    if (!confirm('이 리뷰 요청을 취소하시겠습니까?')) return;
    fetch('/review-requests/' + REQ_ID + '/delete', {method:'POST'})
        .then(function(r){ return r.json(); })
        .then(function(d){
            if (d.success) {
                showToast('요청이 취소되었습니다.', 'success');
                setTimeout(function(){ location.href = '/review-requests'; }, 800);
            } else {
                showToast(d.error || '취소 실패', 'error');
            }
        });
}
</script>
</body>
</html>
