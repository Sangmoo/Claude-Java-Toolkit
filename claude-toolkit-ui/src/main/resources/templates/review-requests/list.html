<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>팀 리뷰 요청 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/6.5.1/css/all.min.css}">
    <link th:href="@{/css/toolkit.css(v='20250411')}" rel="stylesheet">
    <style>
        .rr-tabs { display:flex; gap:4px; border-bottom:1px solid var(--border-color); margin-bottom:16px; }
        .rr-tab {
            background:none; border:none; padding:10px 18px; font-size:.86rem; font-weight:600;
            color:var(--text-muted); cursor:pointer; border-bottom:2px solid transparent; transition:all .15s;
        }
        .rr-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
        .rr-tab:hover { color:var(--text-primary); }
        .rr-tab .count {
            background:var(--bg-tertiary); color:var(--text-sub); font-size:.72rem;
            padding:1px 8px; border-radius:10px; margin-left:6px;
        }
        .rr-tab.active .count { background:var(--accent); color:#fff; }

        .rr-card {
            background:var(--bg-secondary); border:1px solid var(--border-color);
            border-radius:10px; padding:14px 18px; margin-bottom:10px;
            transition:all .15s; cursor:pointer;
        }
        .rr-card:hover { border-color:var(--accent); transform:translateY(-1px); }
        .rr-card .row1 { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
        .rr-card .title { font-weight:600; color:var(--text-primary); font-size:.9rem; }
        .rr-card .type-badge {
            display:inline-block; background:var(--bg-tertiary); color:var(--text-sub);
            font-size:.7rem; padding:2px 8px; border-radius:10px; margin-left:6px;
        }
        .rr-card .meta {
            font-size:.74rem; color:var(--text-muted);
            display:flex; gap:12px; align-items:center;
        }
        .rr-card .status-badge {
            font-size:.7rem; font-weight:700; padding:3px 10px; border-radius:10px;
        }
        .rr-comment {
            background:var(--bg-tertiary); border-radius:6px; padding:8px 12px; margin-top:8px;
            font-size:.78rem; color:var(--text-sub); font-style:italic;
        }
        .rr-empty { text-align:center; padding:60px 20px; color:var(--text-muted); }
        .rr-empty i { font-size:2.5rem; color:var(--border-color); margin-bottom:12px; }
    </style>
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>
    <main class="main-area">
        <div class="top-bar">
            <span class="top-bar-title"><i class="fas fa-user-check me-2" style="color:#8b5cf6"></i>팀 리뷰 요청</span>
            <div style="display:flex;gap:8px;">
                <button id="themeToggle" onclick="toggleTheme()">
                    <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
                </button>
            </div>
        </div>
        <div class="main-content">
            <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:16px;">
                <i class="fas fa-info-circle me-1"></i>분석 이력에 대해 팀원에게 리뷰 요청을 보내거나 요청받은 리뷰에 응답할 수 있습니다.
                승인/반려 시 실시간 알림이 발송됩니다.
            </p>

            <!-- 탭 네비게이션 -->
            <div class="rr-tabs">
                <button class="rr-tab active" data-tab="assigned" onclick="switchTab('assigned')">
                    <i class="fas fa-inbox me-1"></i>내게 온 리뷰
                    <span class="count" th:text="${assignedCount}">0</span>
                </button>
                <button class="rr-tab" data-tab="requested" onclick="switchTab('requested')">
                    <i class="fas fa-paper-plane me-1"></i>내가 요청한 리뷰
                    <span class="count" th:text="${requestedCount}">0</span>
                </button>
            </div>

            <!-- 내게 온 리뷰 탭 -->
            <div id="tab-assigned" class="rr-tab-panel">
                <div th:if="${#lists.isEmpty(assignedToMe)}" class="rr-empty">
                    <i class="fas fa-inbox"></i>
                    <p>내게 온 리뷰 요청이 없습니다.</p>
                </div>
                <div th:each="r : ${assignedToMe}" class="rr-card"
                     th:attr="onclick='location.href=\'/review-requests/' + ${r.id} + '\''">
                    <div class="row1">
                        <span class="title">
                            <span th:text="${r.historyTitle}">제목</span>
                            <span class="type-badge" th:text="${r.historyType}">유형</span>
                        </span>
                        <span class="status-badge"
                              th:style="'background:' + ${r.statusColor} + '20; color:' + ${r.statusColor} + ';'"
                              th:text="${r.statusLabel}">상태</span>
                    </div>
                    <div class="meta">
                        <span><i class="fas fa-user me-1"></i>요청자: <b th:text="${r.authorUsername}"></b></span>
                        <span><i class="fas fa-clock me-1"></i><span th:text="${r.createdAt}"></span></span>
                    </div>
                    <div th:if="${r.requestComment != null and !#strings.isEmpty(r.requestComment)}" class="rr-comment">
                        💬 <span th:text="${r.requestComment}"></span>
                    </div>
                </div>
            </div>

            <!-- 내가 요청한 리뷰 탭 -->
            <div id="tab-requested" class="rr-tab-panel" style="display:none;">
                <div th:if="${#lists.isEmpty(requestedByMe)}" class="rr-empty">
                    <i class="fas fa-paper-plane"></i>
                    <p>요청한 리뷰가 없습니다.<br>
                    <small>분석 결과 페이지의 "리뷰 요청" 버튼으로 시작하세요.</small></p>
                </div>
                <div th:each="r : ${requestedByMe}" class="rr-card"
                     th:attr="onclick='location.href=\'/review-requests/' + ${r.id} + '\''">
                    <div class="row1">
                        <span class="title">
                            <span th:text="${r.historyTitle}">제목</span>
                            <span class="type-badge" th:text="${r.historyType}">유형</span>
                        </span>
                        <span class="status-badge"
                              th:style="'background:' + ${r.statusColor} + '20; color:' + ${r.statusColor} + ';'"
                              th:text="${r.statusLabel}">상태</span>
                    </div>
                    <div class="meta">
                        <span><i class="fas fa-user-tie me-1"></i>리뷰어: <b th:text="${r.reviewerUsername}"></b></span>
                        <span><i class="fas fa-clock me-1"></i><span th:text="${r.createdAt}"></span></span>
                    </div>
                    <div th:if="${r.reviewComment != null and !#strings.isEmpty(r.reviewComment)}" class="rr-comment">
                        💬 <span th:text="${r.reviewComment}"></span>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/toolkit.js(v='20250411')}"></script>
<script>
function switchTab(tab) {
    var tabs = document.querySelectorAll('.rr-tab');
    for (var i = 0; i < tabs.length; i++) {
        tabs[i].classList.toggle('active', tabs[i].getAttribute('data-tab') === tab);
    }
    document.getElementById('tab-assigned').style.display = tab === 'assigned' ? '' : 'none';
    document.getElementById('tab-requested').style.display = tab === 'requested' ? '' : 'none';
}
</script>
</body>
</html>
