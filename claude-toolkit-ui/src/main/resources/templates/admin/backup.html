<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>데이터 백업/복원 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css(v='20250409')}" rel="stylesheet">
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>
    <main class="main-area">
        <div class="top-bar">
            <span class="top-bar-title"><i class="fas fa-database me-2" style="color:#10b981"></i>데이터 백업 / 복원</span>
            <button id="themeToggle" onclick="toggleTheme()">
                <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
            </button>
        </div>
        <div class="main-content">
            <div class="row g-3" style="max-width:800px;margin:0 auto;">
                <!-- 백업 -->
                <div class="col-md-6">
                    <div class="panel p-4" style="height:100%;">
                        <div style="text-align:center;margin-bottom:16px;">
                            <i class="fas fa-download" style="color:#10b981;font-size:2rem;"></i>
                            <h5 style="font-size:1rem;font-weight:700;margin-top:10px;">백업 다운로드</h5>
                        </div>
                        <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:16px;">
                            H2 DB, Settings, 보안 설정을 ZIP 파일로 다운로드합니다.
                        </p>
                        <ul style="font-size:.78rem;color:var(--text-sub);margin-bottom:16px;">
                            <li>history-db.mv.db (사용자, 이력, 감사로그 등)</li>
                            <li>settings.json (API 키, DB 연결 등)</li>
                            <li>security-settings.json (보안 설정)</li>
                        </ul>
                        <a href="/admin/backup/download" class="btn-accent w-100 d-block text-center" style="padding:10px;text-decoration:none;border-radius:8px;">
                            <i class="fas fa-download me-1"></i>ZIP 다운로드
                        </a>
                    </div>
                </div>
                <!-- 복원 -->
                <div class="col-md-6">
                    <div class="panel p-4" style="height:100%;">
                        <div style="text-align:center;margin-bottom:16px;">
                            <i class="fas fa-upload" style="color:#f59e0b;font-size:2rem;"></i>
                            <h5 style="font-size:1rem;font-weight:700;margin-top:10px;">백업 복원</h5>
                        </div>
                        <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:16px;">
                            이전에 다운로드한 ZIP 파일을 업로드하여 데이터를 복원합니다.
                        </p>
                        <div class="alert" style="font-size:.75rem;background:rgba(239,68,68,.08);color:#ef4444;border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:8px 12px;">
                            <i class="fas fa-exclamation-triangle me-1"></i>기존 데이터가 덮어쓰여집니다. 복원 후 재시작이 필요합니다.
                        </div>
                        <input type="file" id="restoreFile" accept=".zip" class="form-control mb-2" style="font-size:.84rem;">
                        <button class="btn-accent w-100" style="padding:10px;background:#f59e0b;" onclick="restoreBackup()">
                            <i class="fas fa-upload me-1"></i>복원 실행
                        </button>
                        <div id="restoreResult" style="font-size:.82rem;margin-top:8px;text-align:center;"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/toolkit.js(v='20250409')}"></script>
<script>
function restoreBackup() {
    var file = document.getElementById('restoreFile').files[0];
    if (!file) { showToast('ZIP 파일을 선택하세요.', 'warning'); return; }
    if (!confirm('기존 데이터가 덮어쓰여집니다. 계속하시겠습니까?')) return;
    var fd = new FormData(); fd.append('file', file);
    var el = document.getElementById('restoreResult');
    el.innerHTML = '<span style="color:var(--text-muted);"><i class="fas fa-spinner fa-spin me-1"></i>복원 중...</span>';
    fetch('/admin/backup/restore', {method:'POST', body:fd})
        .then(function(r){ return r.json(); })
        .then(function(d){
            if (d.success) {
                el.innerHTML = '<span style="color:#10b981;"><i class="fas fa-check-circle me-1"></i>' + d.message + '</span>';
            } else {
                el.innerHTML = '<span style="color:#ef4444;"><i class="fas fa-times-circle me-1"></i>' + (d.error||'복원 실패') + '</span>';
            }
        })
        .catch(function(){ el.innerHTML = '<span style="color:#ef4444;">요청 실패</span>'; });
}
</script>
</body>
</html>
