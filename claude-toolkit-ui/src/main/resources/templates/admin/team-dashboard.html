<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>팀 대시보드 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="/webjars/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css(v='20250409')}" rel="stylesheet">
    <script src="/webjars/chart.js/4.4.1/dist/chart.umd.min.js"></script>
    <style>
        .stat-card { border:1px solid var(--border-color); border-radius:10px; padding:16px 20px; background:var(--bg-secondary); text-align:center; }
        .stat-num { font-size:1.8rem; font-weight:800; color:var(--accent); }
        .stat-lbl { font-size:.75rem; color:var(--text-muted); margin-top:2px; }
        .chart-panel { background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:12px; padding:20px; margin-bottom:16px; }
        .chart-title { font-size:.88rem; font-weight:600; color:var(--text-primary); margin-bottom:12px; }
    </style>
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>
    <main class="main-area">
        <div class="top-bar">
            <span class="top-bar-title"><i class="fas fa-chart-line me-2" style="color:var(--accent)"></i>팀 대시보드</span>
            <div class="d-flex gap-2 align-items-center">
                <select id="periodSelect" class="form-select" style="font-size:.8rem;width:auto;padding:4px 10px;" onchange="loadData()">
                    <option value="7">최근 7일</option>
                    <option value="30" selected>최근 30일</option>
                    <option value="90">최근 90일</option>
                </select>
                <button id="themeToggle" onclick="toggleTheme()">
                    <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
                </button>
            </div>
        </div>
        <div class="main-content">
            <!-- 요약 카드 -->
            <div class="row g-3 mb-4">
                <div class="col-6 col-md-3"><div class="stat-card"><div class="stat-num" id="statAnalyses">-</div><div class="stat-lbl">총 분석 건수</div></div></div>
                <div class="col-6 col-md-3"><div class="stat-card"><div class="stat-num" id="statTokens">-</div><div class="stat-lbl">총 토큰 사용량</div></div></div>
                <div class="col-6 col-md-3"><div class="stat-card"><div class="stat-num" id="statUsers">-</div><div class="stat-lbl">활성 사용자</div></div></div>
                <div class="col-6 col-md-3"><div class="stat-card"><div class="stat-num" id="statAvg">-</div><div class="stat-lbl">일 평균 분석</div></div></div>
            </div>
            <!-- 차트 -->
            <div class="row g-3">
                <div class="col-lg-8">
                    <div class="chart-panel"><div class="chart-title"><i class="fas fa-chart-area me-1"></i>일별 분석 트렌드</div><canvas id="dailyChart" height="200"></canvas></div>
                </div>
                <div class="col-lg-4">
                    <div class="chart-panel"><div class="chart-title"><i class="fas fa-chart-pie me-1"></i>기능별 사용 빈도</div><canvas id="typeChart" height="200"></canvas></div>
                </div>
                <div class="col-lg-6">
                    <div class="chart-panel"><div class="chart-title"><i class="fas fa-users me-1"></i>사용자별 분석 건수</div><canvas id="userChart" height="180"></canvas></div>
                </div>
                <div class="col-lg-6">
                    <div class="chart-panel"><div class="chart-title"><i class="fas fa-coins me-1"></i>사용자별 토큰 사용량</div><canvas id="tokenChart" height="180"></canvas></div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/toolkit.js(v='20250409')}"></script>
<script>
var _charts = {};
function loadData() {
    var days = document.getElementById('periodSelect').value;
    fetch('/admin/team-dashboard/data?days=' + days)
        .then(function(r){return r.json();})
        .then(function(d){
            // 요약
            document.getElementById('statAnalyses').textContent = (d.totalAnalyses||0).toLocaleString();
            document.getElementById('statTokens').textContent = d.totalTokens > 1000000 ? (d.totalTokens/1000000).toFixed(1)+'M' : (d.totalTokens||0).toLocaleString();
            document.getElementById('statUsers').textContent = d.activeUsers||0;
            document.getElementById('statAvg').textContent = d.days > 0 ? (d.totalAnalyses / d.days).toFixed(1) : '0';

            var accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#f97316';
            var colors = ['#f97316','#3b82f6','#10b981','#8b5cf6','#ef4444','#f59e0b','#06b6d4','#ec4899','#84cc16','#6366f1'];

            // 일별 차트
            if(_charts.daily) _charts.daily.destroy();
            var labels = Object.keys(d.dailyCounts||{}).map(function(k){return k.substring(5);});
            _charts.daily = new Chart(document.getElementById('dailyChart'), {
                type:'line', data:{labels:labels, datasets:[{label:'분석 건수',data:Object.values(d.dailyCounts||{}),
                borderColor:accent,backgroundColor:accent+'33',fill:true,tension:0.3}]},
                options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
            });

            // 기능별 차트
            if(_charts.type) _charts.type.destroy();
            var typeLabels = Object.keys(d.typeCounts||{});
            _charts.type = new Chart(document.getElementById('typeChart'), {
                type:'doughnut', data:{labels:typeLabels, datasets:[{data:Object.values(d.typeCounts||{}),backgroundColor:colors.slice(0,typeLabels.length)}]},
                options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:10},color:'#94a3b8'}}}}
            });

            // 사용자별 분석
            if(_charts.user) _charts.user.destroy();
            _charts.user = new Chart(document.getElementById('userChart'), {
                type:'bar', data:{labels:Object.keys(d.userCounts||{}), datasets:[{label:'분석 건수',data:Object.values(d.userCounts||{}),backgroundColor:accent}]},
                options:{responsive:true,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true}}}
            });

            // 사용자별 토큰
            if(_charts.token) _charts.token.destroy();
            var tokenVals = Object.values(d.userTokens||{}).map(function(v){return Math.round(v/1000);});
            _charts.token = new Chart(document.getElementById('tokenChart'), {
                type:'bar', data:{labels:Object.keys(d.userTokens||{}), datasets:[{label:'토큰 (K)',data:tokenVals,backgroundColor:'#3b82f6'}]},
                options:{responsive:true,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true}}}
            });
        });
}
loadData();
</script>
</body>
</html>
