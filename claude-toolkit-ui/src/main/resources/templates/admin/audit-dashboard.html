<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>감사 로그 대시보드 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="/webjars/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css(v='20250409')}" rel="stylesheet">
    <script src="/webjars/chart.js/4.4.1/dist/chart.umd.min.js"></script>
    <style>
        .stat-card { border:1px solid var(--border-color); border-radius:10px; padding:16px 20px; background:var(--bg-secondary); text-align:center; }
        .stat-num { font-size:1.8rem; font-weight:800; }
        .stat-lbl { font-size:.75rem; color:var(--text-muted); margin-top:2px; }
        .chart-panel { background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:12px; padding:20px; margin-bottom:16px; }
        .chart-title { font-size:.88rem; font-weight:600; color:var(--text-primary); margin-bottom:12px; }
    </style>
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>
    <main class="main-area">
        <div class="top-bar">
            <span class="top-bar-title"><i class="fas fa-shield-alt me-2" style="color:var(--accent)"></i>감사 로그 대시보드</span>
            <div class="d-flex gap-2 align-items-center">
                <select id="periodSelect" class="form-select" style="font-size:.8rem;width:auto;padding:4px 10px;" onchange="loadData()">
                    <option value="1">오늘</option>
                    <option value="7" selected>최근 7일</option>
                    <option value="30">최근 30일</option>
                </select>
                <button id="themeToggle" onclick="toggleTheme()"><i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span></button>
            </div>
        </div>
        <div class="main-content">
            <div class="row g-3 mb-4">
                <div class="col-6 col-md-3"><div class="stat-card"><div class="stat-num" id="statTotal" style="color:var(--accent)">-</div><div class="stat-lbl">총 요청</div></div></div>
                <div class="col-6 col-md-3"><div class="stat-card"><div class="stat-num" id="statErrors" style="color:#ef4444">-</div><div class="stat-lbl">에러 건수</div></div></div>
                <div class="col-6 col-md-3"><div class="stat-card"><div class="stat-num" id="statErrorRate" style="color:#f59e0b">-</div><div class="stat-lbl">에러율 (%)</div></div></div>
                <div class="col-6 col-md-3"><div class="stat-card"><div class="stat-num" id="statAvg" style="color:#3b82f6">-</div><div class="stat-lbl">일 평균 요청</div></div></div>
            </div>
            <div class="row g-3">
                <div class="col-lg-8">
                    <div class="chart-panel"><div class="chart-title"><i class="fas fa-chart-area me-1"></i>일별 요청 추이</div><canvas id="dailyChart" height="180"></canvas></div>
                </div>
                <div class="col-lg-4">
                    <div class="chart-panel"><div class="chart-title"><i class="fas fa-chart-pie me-1"></i>액션 유형 분포</div><canvas id="actionChart" height="180"></canvas></div>
                </div>
                <div class="col-lg-6">
                    <div class="chart-panel"><div class="chart-title"><i class="fas fa-clock me-1"></i>시간대별 요청 분포</div><canvas id="hourlyChart" height="160"></canvas></div>
                </div>
                <div class="col-lg-6">
                    <div class="chart-panel"><div class="chart-title"><i class="fas fa-users me-1"></i>사용자별 활동 (Top 10)</div><canvas id="userChart" height="160"></canvas></div>
                </div>
                <div class="col-12">
                    <div class="chart-panel"><div class="chart-title"><i class="fas fa-exclamation-triangle me-1"></i>일별 에러율 추이 (%)</div><canvas id="errorChart" height="120"></canvas></div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/toolkit.js(v='20250409')}"></script>
<script>
var _charts = {};
function loadData() {
    var days = document.getElementById('periodSelect').value;
    fetch('/admin/audit-dashboard/data?days=' + days)
        .then(function(r){return r.json();})
        .then(function(d){
            document.getElementById('statTotal').textContent = (d.totalRequests||0).toLocaleString();
            document.getElementById('statErrors').textContent = d.errorCount||0;
            document.getElementById('statErrorRate').textContent = (d.errorRate||0) + '%';
            document.getElementById('statAvg').textContent = days > 0 ? Math.round(d.totalRequests / days) : 0;

            var accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#f97316';
            var colors = ['#f97316','#3b82f6','#10b981','#8b5cf6','#ef4444','#f59e0b','#06b6d4','#ec4899'];

            // 일별
            if(_charts.daily) _charts.daily.destroy();
            var dLabels = Object.keys(d.dailyCounts||{}).map(function(k){return k.substring(5);});
            _charts.daily = new Chart(document.getElementById('dailyChart'), {
                type:'bar', data:{labels:dLabels, datasets:[{label:'요청',data:Object.values(d.dailyCounts||{}),backgroundColor:accent+'cc'}]},
                options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
            });

            // 액션 유형
            if(_charts.action) _charts.action.destroy();
            _charts.action = new Chart(document.getElementById('actionChart'), {
                type:'doughnut', data:{labels:Object.keys(d.actionCounts||{}), datasets:[{data:Object.values(d.actionCounts||{}),backgroundColor:colors}]},
                options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:10},color:'#94a3b8'}}}}
            });

            // 시간대별
            if(_charts.hourly) _charts.hourly.destroy();
            var hLabels = []; for(var i=0;i<24;i++) hLabels.push(i+'시');
            _charts.hourly = new Chart(document.getElementById('hourlyChart'), {
                type:'bar', data:{labels:hLabels, datasets:[{label:'요청',data:d.hourlyDistribution||[],backgroundColor:'#3b82f6aa'}]},
                options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
            });

            // 사용자별
            if(_charts.user) _charts.user.destroy();
            _charts.user = new Chart(document.getElementById('userChart'), {
                type:'bar', data:{labels:Object.keys(d.userActivity||{}), datasets:[{label:'요청',data:Object.values(d.userActivity||{}),backgroundColor:accent}]},
                options:{responsive:true,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true}}}
            });

            // 에러율
            if(_charts.error) _charts.error.destroy();
            var eLabels = Object.keys(d.errorRates||{}).map(function(k){return k.substring(5);});
            _charts.error = new Chart(document.getElementById('errorChart'), {
                type:'line', data:{labels:eLabels, datasets:[{label:'에러율(%)',data:Object.values(d.errorRates||{}),
                borderColor:'#ef4444',backgroundColor:'#ef444433',fill:true,tension:0.3}]},
                options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:100}}}
            });
        });
}
loadData();
</script>
</body>
</html>
