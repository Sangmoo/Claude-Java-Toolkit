<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>사용자 관리 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css}" rel="stylesheet">
    <style>
        .role-badge { font-size:.7rem; font-weight:700; padding:2px 10px; border-radius:10px; }
        .role-ADMIN    { background:rgba(239,68,68,.12); color:#ef4444; }
        .role-REVIEWER { background:rgba(139,92,246,.12); color:#8b5cf6; }
        .role-VIEWER   { background:rgba(59,130,246,.12); color:#3b82f6; }
        .user-row { display:flex; align-items:center; gap:10px; padding:10px 14px;
                    border-bottom:1px solid var(--border-color); font-size:.84rem; }
        .user-row:last-child { border-bottom:none; }
        .user-row:hover { background:rgba(249,115,22,.04); }
        .action-btn { background:none; border:1px solid var(--border-color); color:var(--text-muted);
                      padding:3px 10px; border-radius:6px; font-size:.72rem; cursor:pointer; transition:all .15s; }
        .action-btn:hover { border-color:var(--accent); color:var(--accent); }
        .action-btn.danger:hover { border-color:#ef4444; color:#ef4444; }
    </style>
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>
    <main class="main-area">
        <div class="top-bar">
            <span class="top-bar-title"><i class="fas fa-users-cog me-2" style="color:#ef4444"></i>사용자 관리</span>
            <button id="themeToggle" onclick="toggleTheme()">
                <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
            </button>
        </div>
        <div class="main-content">
            <!-- 사용자 생성 폼 -->
            <div class="panel p-3 mb-3">
                <div class="section-label mb-2" style="font-size:.78rem;">
                    <i class="fas fa-user-plus me-1"></i>새 사용자 생성
                </div>
                <div class="d-flex gap-2 flex-wrap align-items-end">
                    <div>
                        <label style="font-size:.72rem;color:var(--text-muted);">ID</label>
                        <input type="text" id="newUsername" class="form-control" style="font-size:.84rem;width:120px;" placeholder="login_id">
                    </div>
                    <div>
                        <label style="font-size:.72rem;color:var(--text-muted);">비밀번호</label>
                        <input type="password" id="newPassword" class="form-control" style="font-size:.84rem;width:120px;" placeholder="password">
                    </div>
                    <div>
                        <label style="font-size:.72rem;color:var(--text-muted);">사용자이름</label>
                        <input type="text" id="newDisplayName" class="form-control" style="font-size:.84rem;width:110px;" placeholder="홍길동">
                    </div>
                    <div>
                        <label style="font-size:.72rem;color:var(--text-muted);">이메일주소</label>
                        <input type="email" id="newEmail" class="form-control" style="font-size:.84rem;width:160px;" placeholder="user@email.com">
                    </div>
                    <div>
                        <label style="font-size:.72rem;color:var(--text-muted);">핸드폰번호</label>
                        <input type="text" id="newPhone" class="form-control" style="font-size:.84rem;width:130px;" placeholder="010-1234-5678">
                    </div>
                    <div>
                        <label style="font-size:.72rem;color:var(--text-muted);">역할</label>
                        <select id="newRole" class="form-select" style="font-size:.84rem;width:120px;">
                            <option value="VIEWER">VIEWER</option>
                            <option value="REVIEWER">REVIEWER</option>
                            <option value="ADMIN">ADMIN</option>
                        </select>
                    </div>
                    <button class="btn-accent" style="padding:7px 20px;" onclick="createUser()">
                        <i class="fas fa-plus me-1"></i>생성
                    </button>
                </div>
                <div id="createResult" style="font-size:.8rem;margin-top:6px;"></div>
            </div>

            <!-- 사용자 목록 -->
            <div class="panel p-3">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span style="font-size:.85rem;font-weight:600;color:var(--text-sub);">
                        <i class="fas fa-users me-1"></i>등록된 사용자
                        <span style="font-size:.72rem;color:var(--text-muted);" th:text="'(' + ${#lists.size(users)} + '명)'"></span>
                    </span>
                </div>

                <!-- 헤더 -->
                <div style="display:flex;gap:8px;padding:6px 14px;font-size:.72rem;font-weight:600;color:var(--text-muted);
                            border-bottom:2px solid var(--border-color);">
                    <span style="width:90px;">ID</span>
                    <span style="width:80px;">이름</span>
                    <span style="width:150px;">이메일</span>
                    <span style="width:110px;">핸드폰</span>
                    <span style="width:80px;">역할</span>
                    <span style="width:50px;">상태</span>
                    <span style="width:110px;">최근 로그인</span>
                    <span style="flex:1;text-align:right;">액션</span>
                </div>

                <div th:each="u : ${users}" class="user-row">
                    <span style="width:90px;font-weight:600;color:var(--text-primary);" th:text="${u.username}"></span>
                    <span style="width:80px;font-size:.78rem;color:var(--text-sub);" th:text="${u.displayName ?: '-'}"></span>
                    <span style="width:150px;font-size:.72rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
                          th:text="${u.email ?: '-'}"></span>
                    <span style="width:110px;font-size:.72rem;color:var(--text-muted);" th:text="${u.phone ?: '-'}"></span>
                    <span style="width:80px;">
                        <span class="role-badge" th:classappend="'role-' + ${u.role}" th:text="${u.role}"></span>
                    </span>
                    <span style="width:50px;">
                        <span th:if="${u.enabled}" style="color:#10b981;font-size:.72rem;"><i class="fas fa-check-circle"></i></span>
                        <span th:unless="${u.enabled}" style="color:#ef4444;font-size:.72rem;"><i class="fas fa-times-circle"></i></span>
                    </span>
                    <span style="width:110px;font-size:.7rem;color:var(--text-muted);"
                          th:text="${u.lastLoginAt != null ? #temporals.format(u.lastLoginAt, 'MM-dd HH:mm') : '-'}"></span>
                    <span style="flex:1;text-align:right;display:flex;gap:4px;justify-content:flex-end;">
                        <select class="form-select" style="font-size:.7rem;width:100px;padding:2px 6px;"
                                th:id="'role-' + ${u.id}" onchange="changeRole(this)"
                                th:attr="data-id=${u.id}">
                            <option value="VIEWER"   th:selected="${u.role == 'VIEWER'}">VIEWER</option>
                            <option value="REVIEWER"  th:selected="${u.role == 'REVIEWER'}">REVIEWER</option>
                            <option value="ADMIN"     th:selected="${u.role == 'ADMIN'}">ADMIN</option>
                        </select>
                        <button class="action-btn" onclick="openEditModal(this)" th:attr="data-id=${u.id}" title="정보 수정">
                            <i class="fas fa-pen"></i>
                        </button>
                        <button class="action-btn" onclick="promptChangePassword(this)" th:attr="data-id=${u.id}" title="비밀번호 변경">
                            <i class="fas fa-key"></i>
                        </button>
                        <button class="action-btn" onclick="toggleUser(this)" th:attr="data-id=${u.id}"
                                th:title="${u.enabled ? '비활성화' : '활성화'}">
                            <i th:class="${u.enabled ? 'fas fa-ban' : 'fas fa-check'}"></i>
                        </button>
                        <button class="action-btn danger" onclick="deleteUser(this)" th:attr="data-id=${u.id},data-name=${u.username}">
                            <i class="fas fa-trash"></i>
                        </button>
                    </span>
                </div>

                <div th:if="${#lists.isEmpty(users)}" style="text-align:center;padding:30px;color:var(--text-muted);font-size:.82rem;">
                    등록된 사용자가 없습니다.
                </div>
            </div>

            <!-- 역할 설명 -->
            <div class="panel p-3 mt-3">
                <div class="section-label mb-2" style="font-size:.78rem;"><i class="fas fa-info-circle me-1"></i>역할별 권한</div>
                <table style="width:100%;font-size:.78rem;color:var(--text-sub);">
                    <tr style="border-bottom:1px solid var(--border-color);">
                        <td style="padding:6px 0;width:100px;"><span class="role-badge role-ADMIN">ADMIN</span></td>
                        <td style="padding:6px 0;">전체 기능 접근 + 사용자 관리 + Settings + 보안 설정</td>
                    </tr>
                    <tr style="border-bottom:1px solid var(--border-color);">
                        <td style="padding:6px 0;"><span class="role-badge role-REVIEWER">REVIEWER</span></td>
                        <td style="padding:6px 0;">분석·생성 기능 + AI 프롬프트 관리 (편집 가능)</td>
                    </tr>
                    <tr>
                        <td style="padding:6px 0;"><span class="role-badge role-VIEWER">VIEWER</span></td>
                        <td style="padding:6px 0;">분석·생성 기능 실행 (읽기/실행만, 설정 변경 불가)</td>
                    </tr>
                </table>
            </div>
        </div>
    </main>

<!-- 사용자 정보 수정 모달 -->
<div id="editModal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);"
     onclick="if(event.target===this)closeEditModal()">
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(440px,90vw);
                background:var(--bg-primary);border:1px solid var(--border-color);border-radius:12px;overflow:hidden;">
        <div style="padding:14px 18px;border-bottom:1px solid var(--border-color);display:flex;justify-content:space-between;align-items:center;">
            <span style="font-weight:700;font-size:.95rem;color:var(--text-primary);">
                <i class="fas fa-pen me-2" style="color:#f97316"></i>사용자 정보 수정
            </span>
            <button onclick="closeEditModal()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.1rem;">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div style="padding:18px;">
            <input type="hidden" id="editId">
            <div class="mb-2">
                <label style="font-size:.78rem;color:var(--text-sub);">ID (변경 불가)</label>
                <input type="text" id="editUsername" class="form-control" style="font-size:.84rem;" readonly disabled>
            </div>
            <div class="mb-2">
                <label style="font-size:.78rem;color:var(--text-sub);">사용자이름</label>
                <input type="text" id="editDisplayName" class="form-control" style="font-size:.84rem;" placeholder="홍길동">
            </div>
            <div class="mb-2">
                <label style="font-size:.78rem;color:var(--text-sub);">이메일주소</label>
                <input type="email" id="editEmail" class="form-control" style="font-size:.84rem;" placeholder="user@email.com">
            </div>
            <div class="mb-2">
                <label style="font-size:.78rem;color:var(--text-sub);">핸드폰번호</label>
                <input type="text" id="editPhone" class="form-control" style="font-size:.84rem;" placeholder="010-1234-5678">
            </div>
            <div class="mb-2">
                <label style="font-size:.78rem;color:var(--text-sub);">역할</label>
                <select id="editRole" class="form-select" style="font-size:.84rem;">
                    <option value="VIEWER">VIEWER</option>
                    <option value="REVIEWER">REVIEWER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </div>
            <div class="mb-2">
                <label style="font-size:.78rem;color:var(--text-sub);">개인 Claude API 키 <span style="color:var(--text-muted);font-size:.68rem;">(비우면 공용 키 사용)</span></label>
                <input type="password" id="editApiKey" class="form-control" style="font-size:.84rem;font-family:monospace;" placeholder="sk-ant-api03-...">
            </div>
            <div class="d-flex gap-2 mb-3">
                <div style="flex:1;">
                    <label style="font-size:.78rem;color:var(--text-sub);">분당 호출 제한 <span style="color:var(--text-muted);font-size:.68rem;">(0=무제한)</span></label>
                    <input type="number" id="editRateMin" class="form-control" style="font-size:.84rem;" placeholder="0" min="0">
                </div>
                <div style="flex:1;">
                    <label style="font-size:.78rem;color:var(--text-sub);">시간당 호출 제한 <span style="color:var(--text-muted);font-size:.68rem;">(0=무제한)</span></label>
                    <input type="number" id="editRateHour" class="form-control" style="font-size:.84rem;" placeholder="0" min="0">
                </div>
            </div>
            <div class="d-flex justify-content-end gap-2">
                <button onclick="closeEditModal()" style="background:none;border:1px solid var(--border-color);color:var(--text-muted);padding:7px 16px;border-radius:8px;cursor:pointer;font-size:.84rem;">취소</button>
                <button class="btn-accent" style="padding:7px 20px;" onclick="saveEdit()">
                    <i class="fas fa-save me-1"></i>저장
                </button>
            </div>
            <div id="editResult" style="font-size:.8rem;margin-top:6px;"></div>
        </div>
    </div>
</div>

</div>
<script th:src="@{/js/toolkit.js}"></script>
<script>
function createUser() {
    var u = document.getElementById('newUsername').value.trim();
    var p = document.getElementById('newPassword').value.trim();
    var r = document.getElementById('newRole').value;
    var dn = document.getElementById('newDisplayName').value.trim();
    var em = document.getElementById('newEmail').value.trim();
    var ph = document.getElementById('newPhone').value.trim();
    if (!u || !p) { alert('ID와 비밀번호를 입력하세요.'); return; }
    var fd = new URLSearchParams();
    fd.append('username', u); fd.append('password', p); fd.append('role', r);
    fd.append('displayName', dn); fd.append('email', em); fd.append('phone', ph);
    fetch('/admin/users/create', {method:'POST', body:fd})
        .then(function(res){ return res.json(); })
        .then(function(d){
            var el = document.getElementById('createResult');
            if (d.success) { el.innerHTML = '<span style="color:#10b981;">✓ 사용자가 생성되었습니다.</span>'; location.reload(); }
            else { el.innerHTML = '<span style="color:#ef4444;">✗ ' + (d.error||'생성 실패') + '</span>'; }
        });
}
function changeRole(sel) {
    var id = sel.getAttribute('data-id');
    var fd = new URLSearchParams(); fd.append('role', sel.value);
    fetch('/admin/users/' + id + '/change-role', {method:'POST', body:fd})
        .then(function(r){ return r.json(); })
        .then(function(d){ if (!d.success) alert(d.error||'역할 변경 실패'); else location.reload(); });
}
function promptChangePassword(btn) {
    var id = btn.getAttribute('data-id');
    var pw = prompt('새 비밀번호를 입력하세요:');
    if (!pw) return;
    var fd = new URLSearchParams(); fd.append('newPassword', pw);
    fetch('/admin/users/' + id + '/change-password', {method:'POST', body:fd})
        .then(function(r){ return r.json(); })
        .then(function(d){ alert(d.success ? '비밀번호가 변경되었습니다.' : (d.error||'변경 실패')); });
}
function toggleUser(btn) {
    var id = btn.getAttribute('data-id');
    fetch('/admin/users/' + id + '/toggle', {method:'POST'})
        .then(function(r){ return r.json(); })
        .then(function(d){ if (d.success) location.reload(); else alert(d.error||'변경 실패'); });
}
function deleteUser(btn) {
    var id = btn.getAttribute('data-id');
    var name = btn.getAttribute('data-name');
    if (!confirm('사용자 "' + name + '"을 삭제하시겠습니까?')) return;
    fetch('/admin/users/' + id + '/delete', {method:'POST'})
        .then(function(r){ return r.json(); })
        .then(function(d){ if (d.success) location.reload(); else alert(d.error||'삭제 실패'); });
}

function openEditModal(btn) {
    var id = btn.getAttribute('data-id');
    document.getElementById('editId').value = id;
    document.getElementById('editResult').innerHTML = '';
    fetch('/admin/users/' + id)
        .then(function(r){ return r.json(); })
        .then(function(d){
            if (!d.success) { alert('사용자 정보를 불러올 수 없습니다.'); return; }
            document.getElementById('editUsername').value    = d.username || '';
            document.getElementById('editDisplayName').value = d.displayName || '';
            document.getElementById('editEmail').value       = d.email || '';
            document.getElementById('editPhone').value       = d.phone || '';
            document.getElementById('editRole').value        = d.role || 'VIEWER';
            document.getElementById('editApiKey').value       = d.personalApiKey || '';
            document.getElementById('editRateMin').value     = d.rateLimitPerMinute || 0;
            document.getElementById('editRateHour').value    = d.rateLimitPerHour || 0;
            document.getElementById('editModal').style.display = '';
        });
}
function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }
function saveEdit() {
    var id = document.getElementById('editId').value;
    var fd = new URLSearchParams();
    fd.append('displayName', document.getElementById('editDisplayName').value.trim());
    fd.append('email',       document.getElementById('editEmail').value.trim());
    fd.append('phone',       document.getElementById('editPhone').value.trim());
    fd.append('role',        document.getElementById('editRole').value);
    fd.append('personalApiKey',     document.getElementById('editApiKey').value.trim());
    fd.append('rateLimitPerMinute', document.getElementById('editRateMin').value || '0');
    fd.append('rateLimitPerHour',   document.getElementById('editRateHour').value || '0');
    fetch('/admin/users/' + id + '/update', {method:'POST', body:fd})
        .then(function(r){ return r.json(); })
        .then(function(d){
            if (d.success) { location.reload(); }
            else { document.getElementById('editResult').innerHTML = '<span style="color:#ef4444;">' + (d.error||'수정 실패') + '</span>'; }
        });
}
</script>
</body>
</html>
