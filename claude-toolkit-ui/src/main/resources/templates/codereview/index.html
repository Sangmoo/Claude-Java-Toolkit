<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>Java 코드 리뷰 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css(v='20250329')}" rel="stylesheet">
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <main class="main-area">
        <!-- Top bar -->
        <div class="top-bar">
            <span class="top-bar-title"><i class="fas fa-search-plus me-2" style="color:#f97316"></i>Java 코드 리뷰</span>
            <button id="themeToggle" onclick="toggleTheme()">
                <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
            </button>
        </div>

        <!-- Spinner -->
        <div class="spinner-overlay" id="spinner">
            <div class="text-center">
                <div class="spinner-border text-warning mb-3" style="width:3rem;height:3rem;"></div>
                <div class="spinner-msg" id="spinnerMsg">Claude가 코드를 분석 중입니다...</div>
            </div>
        </div>

        <div class="main-content">
            <p class="page-subtitle">Java / Spring 소스 코드를 입력하면 품질·보안·리팩토링 리뷰를 자동 생성합니다.</p>

            <!-- Alerts -->
            <div th:if="${error}" class="alert" style="background:rgba(239,68,68,0.12);border:1px solid #ef4444;color:#ef4444;margin-bottom:16px;padding:12px 16px;border-radius:8px;">
                <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
            </div>
            <div th:if="${scanWarning}" class="alert" style="background:rgba(249,115,22,0.1);border:1px solid var(--accent);color:var(--accent);margin-bottom:16px;padding:10px 14px;border-radius:8px;font-size:0.82rem;">
                <i class="fas fa-exclamation-triangle me-1"></i><span th:text="${scanWarning}"></span>
            </div>

            <div class="row g-3">
                <!-- Input Panel -->
                <div class="col-lg-6">
                    <div class="panel p-3">
                        <form id="reviewForm" th:action="@{/codereview/review}" method="post"
                              onsubmit="showSpinner(['코드를 파싱 중...','보안 취약점 검사 중...','품질 기준 검토 중...','리팩토링 제안 생성 중...','보고서 작성 중...'])">

                            <!-- Source Type + Review Mode -->
                            <div class="row g-2 mb-2">
                                <div class="col-6">
                                    <label class="form-label">소스 유형</label>
                                    <select name="sourceType" class="form-select form-select-sm">
                                        <option value="Java Class"         th:selected="${sourceType == 'Java Class'}">Java Class</option>
                                        <option value="Spring Controller"  th:selected="${sourceType == 'Spring Controller'}">Spring Controller</option>
                                        <option value="Spring Service"     th:selected="${sourceType == 'Spring Service'}">Spring Service</option>
                                        <option value="MyBatis Mapper"     th:selected="${sourceType == 'MyBatis Mapper'}">MyBatis Mapper</option>
                                        <option value="Spring Repository"  th:selected="${sourceType == 'Spring Repository'}">Spring Repository</option>
                                        <option value="Spring Configuration" th:selected="${sourceType == 'Spring Configuration'}">Spring Configuration</option>
                                    </select>
                                </div>
                                <div class="col-6">
                                    <label class="form-label">리뷰 모드</label>
                                    <select name="reviewMode" class="form-select form-select-sm" id="reviewModeSelect">
                                        <option value="full"     th:selected="${reviewMode == 'full'    or reviewMode == null}">전체 리뷰 (품질+보안)</option>
                                        <option value="security" th:selected="${reviewMode == 'security'}">보안 전용 리뷰</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Project Context -->
                            <div class="ctx-box mb-2" th:if="${projectConfigured}">
                                <div class="form-check form-check-inline mb-1">
                                    <input class="form-check-input" type="checkbox" id="useProjectContext"
                                           name="useProjectContext" value="true"
                                           th:checked="${useProjectContext}"
                                           onchange="toggleScanPathInput(this.checked)">
                                    <label class="form-check-label" for="useProjectContext" style="font-size:0.82rem;color:var(--text-sub)">
                                        <i class="fas fa-folder-open me-1" style="color:#f97316"></i>프로젝트 컨텍스트 포함
                                    </label>
                                </div>
                                <div id="scanPathGroup" th:style="${useProjectContext} ? '' : 'display:none'">
                                    <input type="text" class="form-control form-control-sm" name="scanPath"
                                           th:value="${scanPath}" placeholder="스캔 경로 (비우면 Settings 경로 사용)">
                                </div>
                            </div>

                            <!-- Code Input -->
                            <label class="form-label">Java 소스 코드</label>
                            <textarea name="sourceCode" class="form-control" rows="18"
                                      style="font-family:monospace;font-size:0.82rem;"
                                      placeholder="Java / Spring 소스 코드를 붙여넣기 하세요..."
                                      th:text="${sourceCode}"></textarea>

                            <div class="d-flex gap-2 mt-2 flex-wrap">
                                <button type="submit" class="btn-accent">
                                    <i class="fas fa-search me-1"></i>코드 리뷰
                                </button>
                                <button type="button" class="btn btn-outline-tk btn-sm" onclick="runStream()" id="streamBtn">
                                    <i class="fas fa-bolt me-1" style="color:#f97316"></i>실시간
                                </button>
                                <label class="btn btn-outline-tk btn-sm mb-0" style="cursor:pointer;padding:6px 14px;">
                                    <i class="fas fa-upload me-1"></i>파일 업로드
                                    <input type="file" accept=".java,.kt,.groovy" style="display:none"
                                           onchange="uploadFile(this)">
                                </label>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Result Panel -->
                <div class="col-lg-6">
                    <div class="panel p-3" style="height:100%;">
                        <!-- ── 실시간 스트리밍 패널 ── -->
                        <div id="streamPanel" style="display:none;">
                            <div class="d-flex align-items-center justify-content-between mb-2">
                                <h6 class="mb-0" style="color:var(--text-sub);font-size:0.88rem;">
                                    <i class="fas fa-bolt me-2" style="color:#f97316"></i>실시간 결과
                                    <span id="streamStatus" class="ms-2" style="font-size:0.75rem;color:var(--text-muted);"></span>
                                </h6>
                                <button type="button" class="copy-btn" onclick="copyStream()">
                                    <i class="fas fa-copy me-1"></i>복사
                                </button>
                            </div>
                            <div id="streamResult" class="stream-result"></div>
                            <div class="mt-2" style="font-size:0.73rem;color:var(--text-muted);">
                                <i class="fas fa-info-circle me-1"></i>실시간 보기 결과는 이력에 자동 저장되지 않습니다.
                            </div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-2" th:if="${result}">
                            <div class="d-flex gap-2 align-items-center">
                                <span class="result-meta">리뷰 완료</span>
                                <span th:if="${reviewMode == 'security'}"
                                      class="format-badge" style="background:rgba(239,68,68,0.15);color:#ef4444;">보안 전용</span>
                                <span th:if="${projectContextUsed}"
                                      class="status-badge status-ok"><i class="fas fa-check-circle"></i>컨텍스트 적용됨</span>
                            </div>
                            <div class="d-flex gap-2">
                                <button class="copy-btn" id="copyBtn" onclick="copyToClipboard('rawResult')">
                                    <i class="fas fa-copy me-1"></i>복사
                                </button>
                                <button class="copy-btn" onclick="openInNewTab('rawResult')">
                                    <i class="fas fa-external-link-alt me-1"></i>새 탭
                                </button>
                                <form th:action="@{/codereview/download}" method="post" style="display:inline">
                                    <input type="hidden" name="sourceCode" th:value="${sourceCode}">
                                    <input type="hidden" name="reviewMode" th:value="${reviewMode}">
                                    <button type="submit" class="copy-btn">
                                        <i class="fas fa-download me-1"></i>MD 저장
                                    </button>
                                </form>
                            </div>
                        </div>

                        <!-- Severity filter -->
                        <div class="sev-filter" th:if="${result}" id="sevFilterBar">
                            <button class="sev-filter-btn f-all" id="sevBtn-ALL"    onclick="filterSeverity('ALL')">ALL</button>
                            <button class="sev-filter-btn"       id="sevBtn-HIGH"   onclick="filterSeverity('HIGH')">🔴 HIGH</button>
                            <button class="sev-filter-btn"       id="sevBtn-MEDIUM" onclick="filterSeverity('MEDIUM')">🟡 MEDIUM</button>
                            <button class="sev-filter-btn"       id="sevBtn-LOW"    onclick="filterSeverity('LOW')">🟢 LOW</button>
                        </div>

                        <div class="result-box" id="resultBox">
                            <div th:if="${result}">
                                <div class="markdown-body" id="resultMd"></div>
                                <div id="rawResult" style="display:none" th:text="${result}"></div>
                            </div>
                            <div th:unless="${result}" class="result-empty">
                                <i class="fas fa-search-plus" style="font-size:2.5rem;color:var(--text-muted)"></i>
                                <p style="color:var(--text-muted);font-size:0.85rem;margin:0">코드를 입력하고 리뷰 버튼을 클릭하세요</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- File upload form (hidden) -->
<form id="uploadForm" th:action="@{/codereview/review/file}" method="post" enctype="multipart/form-data" style="display:none">
    <input type="file"    id="uploadFileInput" name="file">
    <input type="hidden" id="uploadSourceType" name="sourceType">
    <input type="hidden" id="uploadReviewMode" name="reviewMode">
</form>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
<script th:src="@{/js/toolkit.js(v='20250409')}"></script>
<script>
    var rawEl = document.getElementById('rawResult');
    if (rawEl) {
        var raw = rawEl.textContent || '';
        renderMarkdown(raw, 'resultMd');
        Prism.highlightAllUnder(document.getElementById('resultMd'));
        initSeverityFilter('resultMd');
        filterSeverity('ALL');
    }

    function uploadFile(input) {
        if (!input.files || !input.files[0]) return;
        showSpinner(['파일 읽는 중...','코드 분석 중...']);
        document.getElementById('uploadFileInput').files  = input.files;
        document.getElementById('uploadSourceType').value = document.querySelector('select[name=sourceType]').value;
        document.getElementById('uploadReviewMode').value = document.querySelector('select[name=reviewMode]').value;
        document.getElementById('uploadForm').submit();
    }

    function runStream() {
        var input = document.querySelector('[name=sourceCode]').value.trim();
        if (!input) { alert('소스 코드를 입력하세요.'); return; }
        var reviewMode = document.getElementById('reviewModeSelect').value;
        var sourceType = document.querySelector('select[name=sourceType]').value;
        var feature = (reviewMode === 'security') ? 'code_review_security' : 'code_review';
        document.getElementById('streamPanel').style.display = '';
        document.getElementById('streamResult').textContent = '';
        document.getElementById('streamResult').classList.add('stream-cursor');
        document.getElementById('streamStatus').textContent = '스트리밍 중...';
        startStream(feature, {input: input, sourceType: sourceType}, 'streamResult', function() {
            document.getElementById('streamResult').classList.remove('stream-cursor');
            document.getElementById('streamStatus').textContent = '완료';
        });
    }
    function copyStream() {
        var el = document.getElementById('streamResult');
        if (!el || !el.textContent.trim()) return;
        navigator.clipboard.writeText(el.textContent).then(function() {
            var btn = document.querySelector('[onclick="copyStream()"]');
            if (btn) { var orig = btn.innerHTML; btn.innerHTML = '<i class="fas fa-check me-1"></i>복사됨'; setTimeout(function(){ btn.innerHTML = orig; }, 1500); }
        }).catch(function() {
            var ta = document.createElement('textarea'); ta.value = el.textContent;
            document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        });
    }
</script>
</body>
</html>
