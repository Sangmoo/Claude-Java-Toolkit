<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>파이프라인 편집기 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/6.5.1/css/all.min.css}">
    <link th:href="@{/css/toolkit.css(v='20250411')}" rel="stylesheet">
    <style>
        .editor-grid { display: grid; grid-template-columns: 1fr 280px; gap: 16px; }
        @media (max-width: 900px) { .editor-grid { grid-template-columns: 1fr; } }
        .yaml-editor {
            font-family: 'JetBrains Mono', monospace; font-size: .82rem;
            min-height: 500px; line-height: 1.6;
            background: var(--bg-tertiary) !important;
            color: var(--text-primary) !important;
        }
        /* Monaco Editor 컨테이너 */
        #monacoContainer {
            width: 100%; height: 500px;
            border: 1px solid var(--border-color); border-radius: 8px;
            overflow: hidden;
        }
        #monacoFallback { display: none; }
        .monaco-loaded #monacoFallback { display: none; }
        .monaco-loaded #monacoContainer { display: block; }
        .helper-panel {
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            border-radius: 10px; padding: 14px 16px;
        }
        .helper-panel h6 {
            font-size: .82rem; font-weight: 700; margin: 0 0 10px 0;
            color: var(--text-primary);
        }
        .helper-panel ul { list-style: none; padding: 0; margin: 0; font-size: .74rem; }
        .helper-panel li {
            padding: 4px 6px; cursor: pointer; border-radius: 4px;
            color: var(--text-sub); font-family: 'JetBrains Mono', monospace;
        }
        .helper-panel li:hover { background: var(--bg-tertiary); color: var(--accent); }
        .var-item {
            padding: 3px 6px; margin: 2px 0; font-family: monospace; font-size: .72rem;
            background: rgba(124,107,240,.08); color: #a78bfa; border-radius: 3px; display: block;
        }
    </style>
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>
    <main class="main-area">
        <div class="top-bar">
            <span class="top-bar-title">
                <a href="/pipelines" style="color:var(--text-muted);text-decoration:none;margin-right:8px;">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <i class="fas fa-edit me-2" style="color:var(--accent)"></i>
                <span th:if="${isNew}">새 파이프라인</span>
                <span th:unless="${isNew}" th:text="${def.name}">편집</span>
            </span>
            <div style="display:flex;gap:8px;">
                <button class="btn btn-outline-tk btn-sm" onclick="validateYaml()" style="font-size:.78rem;">
                    <i class="fas fa-check me-1"></i>검증
                </button>
                <button class="btn btn-accent btn-sm" onclick="savePipeline()" style="font-size:.78rem;">
                    <i class="fas fa-save me-1"></i>저장
                </button>
                <button id="themeToggle" onclick="toggleTheme()">
                    <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
                </button>
            </div>
        </div>
        <div class="main-content">
            <div th:if="${def.builtin}" class="alert alert-warning py-2 px-3" style="font-size:.8rem;">
                <i class="fas fa-info-circle me-1"></i>내장 파이프라인은 수정할 수 없습니다. 새 파이프라인으로 복제하여 편집하세요.
            </div>

            <!-- 기본 정보 -->
            <div class="row g-2 mb-3">
                <div class="col-md-6">
                    <label style="font-size:.78rem;color:var(--text-sub);font-weight:600;">이름</label>
                    <input type="text" id="pipeName" class="form-control" style="font-size:.84rem;"
                           th:value="${def.name}" th:disabled="${def.builtin}">
                </div>
                <div class="col-md-4">
                    <label style="font-size:.78rem;color:var(--text-sub);font-weight:600;">입력 언어</label>
                    <select id="pipeLang" class="form-select" style="font-size:.84rem;" th:disabled="${def.builtin}">
                        <option value="java">java</option>
                        <option value="sql">sql</option>
                        <option value="kotlin">kotlin</option>
                        <option value="python">python</option>
                        <option value="javascript">javascript</option>
                        <option value="typescript">typescript</option>
                    </select>
                </div>
                <div class="col-12">
                    <label style="font-size:.78rem;color:var(--text-sub);font-weight:600;">설명</label>
                    <input type="text" id="pipeDesc" class="form-control" style="font-size:.84rem;"
                           th:value="${def.description}" th:disabled="${def.builtin}">
                </div>
            </div>

            <!-- YAML 편집 그리드 -->
            <div class="editor-grid">
                <div>
                    <label style="font-size:.78rem;color:var(--text-sub);font-weight:600;">YAML 정의
                        <span id="editorLabel" style="color:var(--text-muted);font-weight:400;margin-left:6px;"></span>
                    </label>
                    <!-- v3.0: Monaco Editor 컨테이너 -->
                    <div id="monacoContainer"></div>
                    <!-- Fallback: textarea (Monaco 로드 실패 시) -->
                    <textarea id="yamlContent" class="form-control yaml-editor" id="monacoFallback"
                              th:text="${def.yamlContent}" th:disabled="${def.builtin}"></textarea>
                    <div id="editorResult" style="font-size:.76rem;margin-top:8px;"></div>
                </div>

                <!-- v3.0: 시각적 플로우차트 미리보기 (Mermaid) -->
                <div>
                    <div class="helper-panel mb-3">
                        <h6><i class="fas fa-project-diagram" style="color:#8b5cf6"></i>파이프라인 흐름도
                            <button type="button" onclick="refreshFlowchart()" style="float:right;background:none;border:1px solid var(--border-color);color:var(--text-muted);padding:2px 8px;border-radius:4px;cursor:pointer;font-size:.68rem;">
                                <i class="fas fa-sync"></i> 갱신
                            </button>
                        </h6>
                        <div id="flowchartPreview" style="min-height:80px;text-align:center;font-size:.74rem;color:var(--text-muted);">
                            YAML을 작성하면 플로우차트가 표시됩니다
                        </div>
                    </div>
                    <div class="helper-panel mb-3">
                        <h6><i class="fas fa-list" style="color:#3b82f6"></i>분석 유형</h6>
                        <ul>
                            <li th:each="at : ${analysisTypes}" th:text="${at.name()}"
                                onclick="insertAtCursor(this.textContent)">ENUM</li>
                        </ul>
                    </div>
                    <div class="helper-panel">
                        <h6><i class="fas fa-code" style="color:#10b981"></i>사용 가능 변수</h6>
                        <span class="var-item">${pipeline.input}</span>
                        <span class="var-item">${pipeline.language}</span>
                        <span class="var-item">${stepId.output}</span>
                        <span class="var-item">${stepId.executed}</span>
                        <span class="var-item">${stepId.status}</span>
                        <h6 style="margin-top:12px;font-size:.78rem;">조건식 예시</h6>
                        <span class="var-item">${review.executed}</span>
                        <span class="var-item">'${review.output}'.length() > 100</span>
                        <span class="var-item">'${review.output}'.contains('경고')</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script th:src="@{/js/toolkit.js(v='20250411')}"></script>
<script th:inline="javascript">
var PIPE_ID = /*[[${def.id}]]*/ null;
var IS_NEW = /*[[${isNew}]]*/ true;
var IS_BUILTIN = /*[[${def.builtin}]]*/ false;
var CURRENT_LANG = /*[[${def.inputLanguage}]]*/ 'java';
var _monacoEditor = null;

document.getElementById('pipeLang').value = CURRENT_LANG || 'java';

// ── v3.0: Monaco Editor 동적 로드 ──────────────────────────────
(function initMonaco() {
    var monacoContainer = document.getElementById('monacoContainer');
    var fallbackTextarea = document.getElementById('yamlContent');
    var label = document.getElementById('editorLabel');

    // Monaco CDN (jsDelivr)
    var script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js';
    script.onload = function() {
        if (typeof require === 'undefined') { showFallback(); return; }
        require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            // 다크/라이트 테마 감지
            var isDark = document.documentElement.getAttribute('data-theme') !== 'light';

            _monacoEditor = monaco.editor.create(monacoContainer, {
                value: fallbackTextarea.value || '',
                language: 'yaml',
                theme: isDark ? 'vs-dark' : 'vs',
                minimap: { enabled: false },
                lineNumbers: 'on',
                fontSize: 13,
                scrollBeyondLastLine: false,
                wordWrap: 'on',
                tabSize: 2,
                automaticLayout: true,
                readOnly: IS_BUILTIN
            });

            // textarea 숨기고 Monaco 표시
            fallbackTextarea.style.display = 'none';
            monacoContainer.style.display = 'block';
            if (label) label.textContent = '(Monaco Editor)';

            // Monaco → textarea 동기화 (저장/검증 시 사용)
            _monacoEditor.onDidChangeModelContent(function() {
                fallbackTextarea.value = _monacoEditor.getValue();
            });
        });
    };
    script.onerror = showFallback;
    document.head.appendChild(script);

    function showFallback() {
        monacoContainer.style.display = 'none';
        fallbackTextarea.style.display = '';
        if (label) label.textContent = '(텍스트 에디터)';
    }
})();

function validateYaml() {
    var yaml = document.getElementById('yamlContent').value;
    var fd = new URLSearchParams();
    fd.append('yamlContent', yaml);
    fetch('/pipelines/validate', {method:'POST', body:fd})
        .then(function(r){ return r.json(); })
        .then(function(d){
            var el = document.getElementById('editorResult');
            if (d.success) {
                el.innerHTML = '<span style="color:#10b981;"><i class="fas fa-check me-1"></i>검증 통과 · ' + d.stepCount + '개 단계</span>';
            } else {
                el.innerHTML = '<span style="color:#ef4444;"><i class="fas fa-times me-1"></i>' + escHtml(d.error) + '</span>';
            }
        });
}

function savePipeline() {
    if (IS_BUILTIN) {
        showToast('내장 파이프라인은 수정할 수 없습니다.', 'warning');
        return;
    }
    var name = document.getElementById('pipeName').value.trim();
    var desc = document.getElementById('pipeDesc').value.trim();
    var lang = document.getElementById('pipeLang').value;
    var yaml = document.getElementById('yamlContent').value;
    if (!name) { showToast('이름을 입력해주세요.', 'warning'); return; }

    var fd = new URLSearchParams();
    fd.append('name', name);
    fd.append('description', desc);
    fd.append('inputLanguage', lang);
    fd.append('yamlContent', yaml);

    var url = IS_NEW ? '/pipelines' : '/pipelines/' + PIPE_ID + '/save';
    fetch(url, {method:'POST', body:fd})
        .then(function(r){ return r.json(); })
        .then(function(d){
            var el = document.getElementById('editorResult');
            if (d.success) {
                showToast('저장되었습니다.', 'success');
                setTimeout(function(){ window.location.href = '/pipelines'; }, 500);
            } else {
                el.innerHTML = '<span style="color:#ef4444;"><i class="fas fa-times me-1"></i>' + escHtml(d.error) + '</span>';
            }
        });
}

function insertAtCursor(text) {
    var ta = document.getElementById('yamlContent');
    if (!ta || ta.disabled) return;
    var start = ta.selectionStart, end = ta.selectionEnd;
    ta.value = ta.value.substring(0, start) + text + ta.value.substring(end);
    ta.selectionStart = ta.selectionEnd = start + text.length;
    ta.focus();
}

function escHtml(s) {
    return String(s || '').replace(/[&<>"']/g, function(c) {
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
}

// ── v3.0: 시각적 플로우차트 (Mermaid) ─────────────────────────────
(function initMermaid() {
    if (typeof mermaid !== 'undefined') {
        var isDark = document.documentElement.getAttribute('data-theme') !== 'light';
        mermaid.initialize({ startOnLoad: false, theme: isDark ? 'dark' : 'default', securityLevel: 'loose' });
    }
    // 초기 렌더링 (1초 지연 — Monaco 로드 대기)
    setTimeout(refreshFlowchart, 1500);
    // Monaco 변경 시 자동 갱신 (debounce 2초)
    var _fcTimer = null;
    setInterval(function() {
        if (_monacoEditor) {
            // 변경 감지는 이미 onDidChangeModelContent에서 textarea 동기화됨
            // 2초마다 flowchart 갱신
            clearTimeout(_fcTimer);
            _fcTimer = setTimeout(refreshFlowchart, 500);
        }
    }, 3000);
})();

function refreshFlowchart() {
    var yaml = document.getElementById('yamlContent').value;
    if (!yaml || !yaml.trim()) {
        document.getElementById('flowchartPreview').innerHTML =
            '<span style="color:var(--text-muted);">YAML을 작성하면 플로우차트가 표시됩니다</span>';
        return;
    }
    // 간단한 YAML → Mermaid flowchart 변환
    try {
        var mermaidCode = yamlToMermaid(yaml);
        if (!mermaidCode) throw new Error('단계 없음');
        if (typeof mermaid === 'undefined') {
            document.getElementById('flowchartPreview').innerHTML =
                '<pre style="font-size:.7rem;text-align:left;">' + escHtml(mermaidCode) + '</pre>';
            return;
        }
        var container = document.getElementById('flowchartPreview');
        container.innerHTML = '';
        var graphDiv = document.createElement('div');
        graphDiv.className = 'mermaid';
        graphDiv.textContent = mermaidCode;
        container.appendChild(graphDiv);
        mermaid.run({ nodes: [graphDiv] });
    } catch (e) {
        document.getElementById('flowchartPreview').innerHTML =
            '<span style="color:var(--text-muted);font-size:.72rem;">미리보기 불가: ' + escHtml(e.message) + '</span>';
    }
}

function yamlToMermaid(yaml) {
    // 초간단 YAML 파서 — steps 배열에서 id와 analysis만 추출
    var steps = [];
    var lines = yaml.split('\n');
    var currentStep = null;
    for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (line.match(/^-\s*id:/)) {
            if (currentStep) steps.push(currentStep);
            currentStep = { id: line.replace(/^-\s*id:\s*/, '').trim(), analysis: '' };
        } else if (currentStep && line.match(/^analysis:/)) {
            currentStep.analysis = line.replace(/^analysis:\s*/, '').trim();
        } else if (currentStep && line.match(/^condition:/)) {
            currentStep.condition = true;
        }
    }
    if (currentStep) steps.push(currentStep);
    if (steps.length === 0) return null;

    var mmd = 'graph LR\n';
    for (var i = 0; i < steps.length; i++) {
        var s = steps[i];
        var label = s.id + '\\n(' + (s.analysis || '?') + ')';
        var shape = s.condition ? '{' + label + '}' : '[' + label + ']';
        mmd += '    ' + s.id + shape + '\n';
        if (i > 0) {
            var arrow = steps[i-1].condition ? '-.->|condition|' : '-->';
            mmd += '    ' + steps[i-1].id + ' ' + arrow + ' ' + s.id + '\n';
        }
    }
    return mmd;
}
</script>
</body>
</html>
