<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>파이프라인 실행 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/6.5.1/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/prismjs/1.29.0/themes/prism-tomorrow.min.css}">
    <link th:href="@{/css/toolkit.css(v='20250411')}" rel="stylesheet">
    <style>
        .exec-header {
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            border-radius: 10px; padding: 16px 20px; margin-bottom: 16px;
        }
        .exec-header h4 { margin: 0 0 8px 0; font-size: 1rem; font-weight: 700; }
        .exec-meta { font-size: .78rem; color: var(--text-sub); display: flex; gap: 14px; flex-wrap: wrap; }
        .progress-bar-wrap {
            height: 8px; background: var(--bg-tertiary); border-radius: 4px; overflow: hidden; margin-top: 10px;
        }
        .progress-bar-fill {
            height: 100%; background: linear-gradient(90deg,#8b5cf6,#f97316);
            transition: width .4s ease; border-radius: 4px;
        }

        .step-card {
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            border-radius: 10px; margin-bottom: 12px; overflow: hidden;
        }
        .step-card.completed { border-left: 4px solid #10b981; }
        .step-card.running { border-left: 4px solid var(--accent); }
        .step-card.failed { border-left: 4px solid #ef4444; }
        .step-card.skipped { border-left: 4px solid #64748b; }
        .step-card.pending { border-left: 4px solid var(--border-color); }

        .step-header {
            padding: 12px 16px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; user-select: none;
        }
        .step-header:hover { background: var(--bg-tertiary); }
        .step-title { font-weight: 600; font-size: .88rem; color: var(--text-primary); }
        .step-title .icon { margin-right: 8px; }
        .step-meta { font-size: .72rem; color: var(--text-muted); }
        .step-badge {
            font-size: .68rem; font-weight: 700; padding: 2px 8px; border-radius: 10px;
        }
        .step-body {
            padding: 12px 16px; border-top: 1px solid var(--border-color);
            display: none; background: var(--bg-tertiary);
        }
        .step-body.show { display: block; }
        .step-output {
            max-height: 400px; overflow-y: auto; font-size: .82rem; line-height: 1.6;
            white-space: pre-wrap; color: var(--text-primary);
        }
        .step-output pre {
            background: #1e1e2e; color: #f1f5f9; padding: 10px 14px; border-radius: 6px;
            font-size: .78rem;
        }
    </style>
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>
    <main class="main-area">
        <div class="top-bar">
            <span class="top-bar-title">
                <a href="/pipelines" style="color:var(--text-muted);text-decoration:none;margin-right:8px;">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <i class="fas fa-play me-2" style="color:var(--accent)"></i>실행 상세
            </span>
            <button id="themeToggle" onclick="toggleTheme()">
                <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
            </button>
        </div>
        <div class="main-content">

            <!-- 헤더 -->
            <div class="exec-header">
                <h4 th:text="${exec.pipelineName}">파이프라인 이름</h4>
                <div class="exec-meta">
                    <span>실행 ID: <b th:text="${exec.id}"></b></span>
                    <span>사용자: <b th:text="${exec.username}"></b></span>
                    <span>시작: <b th:text="${exec.formattedStartedAt}"></b></span>
                    <span>상태: <span id="execStatus" th:text="${exec.status}"
                                     style="font-weight:700;" th:style="${exec.status == 'COMPLETED' ? 'color:#10b981' : (exec.status == 'FAILED' ? 'color:#ef4444' : 'color:var(--accent)')}"></span></span>
                </div>
                <div class="progress-bar-wrap">
                    <div class="progress-bar-fill" id="progressBar"
                         th:style="'width:' + ${exec.progressPercent} + '%'"></div>
                </div>
                <div style="font-size:.72rem;color:var(--text-muted);margin-top:4px;">
                    <span id="progressText"><span th:text="${exec.completedSteps}"></span> / <span th:text="${exec.totalSteps}"></span> 단계</span>
                    (<span id="progressPercent" th:text="${exec.progressPercent}"></span>%)
                </div>
            </div>

            <!-- 단계별 결과 -->
            <div id="stepsContainer">
                <div th:each="step : ${steps}"
                     class="step-card"
                     th:classappend="${step.status == 'COMPLETED'} ? 'completed' : (${step.status == 'RUNNING'} ? 'running' : (${step.status == 'FAILED'} ? 'failed' : (${step.status == 'SKIPPED'} ? 'skipped' : 'pending')))"
                     th:attr="data-step-id=${step.stepId}">
                    <div class="step-header" th:attr="onclick='toggleStep(\'' + ${step.stepId} + '\')'">
                        <div class="step-title">
                            <span class="icon" th:if="${step.status == 'COMPLETED'}" style="color:#10b981;"><i class="fas fa-check-circle"></i></span>
                            <span class="icon" th:if="${step.status == 'RUNNING'}" style="color:var(--accent);"><i class="fas fa-spinner fa-spin"></i></span>
                            <span class="icon" th:if="${step.status == 'FAILED'}" style="color:#ef4444;"><i class="fas fa-times-circle"></i></span>
                            <span class="icon" th:if="${step.status == 'SKIPPED'}" style="color:#64748b;"><i class="fas fa-forward"></i></span>
                            <span class="icon" th:if="${step.status == 'PENDING'}" style="color:var(--text-muted);"><i class="far fa-circle"></i></span>
                            <span th:text="${step.stepOrder + 1} + '. ' + ${step.stepId}"></span>
                            <span style="color:var(--text-muted);font-size:.74rem;margin-left:6px;" th:text="'(' + ${step.analysisType} + ')'"></span>
                        </div>
                        <div class="step-meta">
                            <span th:if="${step.durationMs != null}" th:text="${step.durationMs} + 'ms'"></span>
                        </div>
                    </div>
                    <div class="step-body" th:id="'body-' + ${step.stepId}">
                        <div class="step-output" th:id="'output-' + ${step.stepId}"
                             th:text="${step.outputContent ?: (step.skipReason ?: (step.errorMessage ?: '(대기 중)'))}"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/webjars/marked/12.0.2/marked.min.js}"></script>
<script th:src="@{/webjars/dompurify/3.1.5/dist/purify.min.js}"></script>
<script th:src="@{/webjars/prismjs/1.29.0/prism.js}"></script>
<script th:src="@{/js/toolkit.js(v='20250411')}"></script>
<script th:inline="javascript">
var EXEC_ID = /*[[${exec.id}]]*/ 0;
var EXEC_STATUS = /*[[${exec.status}]]*/ 'RUNNING';

function toggleStep(stepId) {
    var body = document.getElementById('body-' + stepId);
    if (body) body.classList.toggle('show');
}

function updateStepCard(stepId, status, durationMs) {
    var card = document.querySelector('[data-step-id="' + stepId + '"]');
    if (!card) return;
    card.className = 'step-card ' + status.toLowerCase();
    var iconEl = card.querySelector('.icon');
    if (iconEl) {
        if (status === 'RUNNING')   iconEl.innerHTML = '<i class="fas fa-spinner fa-spin" style="color:var(--accent);"></i>';
        else if (status === 'COMPLETED') iconEl.innerHTML = '<i class="fas fa-check-circle" style="color:#10b981;"></i>';
        else if (status === 'FAILED') iconEl.innerHTML = '<i class="fas fa-times-circle" style="color:#ef4444;"></i>';
        else if (status === 'SKIPPED') iconEl.innerHTML = '<i class="fas fa-forward" style="color:#64748b;"></i>';
    }
    if (durationMs) {
        var metaEl = card.querySelector('.step-meta');
        if (metaEl) metaEl.textContent = durationMs + 'ms';
    }
}

function appendChunk(stepId, chunk) {
    var outputEl = document.getElementById('output-' + stepId);
    if (!outputEl) return;
    if (outputEl.textContent === '(대기 중)') outputEl.textContent = '';
    outputEl.textContent += chunk;
    // 자동 펼치기 (스트리밍 중)
    var body = document.getElementById('body-' + stepId);
    if (body && !body.classList.contains('show')) body.classList.add('show');
    outputEl.scrollTop = outputEl.scrollHeight;
}

function renderMarkdownForStep(stepId) {
    var outputEl = document.getElementById('output-' + stepId);
    if (!outputEl || typeof marked === 'undefined' || typeof DOMPurify === 'undefined') return;
    var raw = outputEl.textContent;
    try {
        var html = marked.parse(raw);
        var clean = DOMPurify.sanitize(html);
        outputEl.innerHTML = clean;
        if (typeof Prism !== 'undefined') Prism.highlightAllUnder(outputEl);
    } catch (e) {}
}

function updateProgress(completed, total) {
    var pct = total > 0 ? Math.round(completed * 100 / total) : 0;
    var bar = document.getElementById('progressBar');
    if (bar) bar.style.width = pct + '%';
    var txt = document.getElementById('progressText');
    if (txt) txt.textContent = completed + ' / ' + total + ' 단계';
    var pctEl = document.getElementById('progressPercent');
    if (pctEl) pctEl.textContent = pct;
}

// 실행이 완료 상태가 아니면 SSE 구독
if (EXEC_STATUS === 'RUNNING') {
    var es = new EventSource('/pipelines/executions/' + EXEC_ID + '/stream');

    es.addEventListener('step-start', function(e) {
        try {
            var data = JSON.parse(e.data);
            updateStepCard(data.stepId, 'RUNNING');
        } catch (err) {}
    });

    es.addEventListener('step-chunk', function(e) {
        try {
            var data = JSON.parse(e.data);
            appendChunk(data.stepId, data.chunk);
        } catch (err) {}
    });

    es.addEventListener('step-completed', function(e) {
        try {
            var data = JSON.parse(e.data);
            updateStepCard(data.stepId, 'COMPLETED', data.durationMs);
            renderMarkdownForStep(data.stepId);
            // 진행률 업데이트는 별도 data fetch
            fetchExecData();
        } catch (err) {}
    });

    es.addEventListener('step-skipped', function(e) {
        try {
            var data = JSON.parse(e.data);
            updateStepCard(data.stepId, 'SKIPPED');
            var outputEl = document.getElementById('output-' + data.stepId);
            if (outputEl) outputEl.textContent = '⏭ ' + (data.skipReason || '조건 미충족');
            fetchExecData();
        } catch (err) {}
    });

    es.addEventListener('error', function(e) {
        try {
            var data = JSON.parse(e.data);
            if (data && data.stepId) {
                updateStepCard(data.stepId, 'FAILED');
                var outputEl = document.getElementById('output-' + data.stepId);
                if (outputEl) outputEl.textContent = '❌ ' + (data.errorMessage || '실행 실패');
            }
        } catch (err) {}
    });

    es.addEventListener('done', function() {
        es.close();
        document.getElementById('execStatus').textContent = 'COMPLETED';
        document.getElementById('execStatus').style.color = '#10b981';
        fetchExecData();
        showToast('파이프라인 실행 완료', 'success');
    });

    es.onerror = function() {
        es.close();
        // 폴링 fallback
        var interval = setInterval(function() {
            fetchExecData(function(d) {
                if (d && (d.status === 'COMPLETED' || d.status === 'FAILED')) {
                    clearInterval(interval);
                    location.reload();
                }
            });
        }, 3000);
    };
}

function fetchExecData(cb) {
    fetch('/pipelines/executions/' + EXEC_ID + '/data')
        .then(function(r){ return r.json(); })
        .then(function(d){
            if (!d.success) return;
            updateProgress(d.completedSteps, d.totalSteps);
            if (cb) cb(d);
        })
        .catch(function(){});
}

// 이미 완료된 실행: 모든 단계 Markdown 렌더링
if (EXEC_STATUS !== 'RUNNING') {
    var cards = document.querySelectorAll('.step-card');
    for (var i = 0; i < cards.length; i++) {
        var stepId = cards[i].getAttribute('data-step-id');
        if (cards[i].classList.contains('completed')) {
            renderMarkdownForStep(stepId);
        }
    }
}
</script>
</body>
</html>
