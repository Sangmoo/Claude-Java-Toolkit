<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="/webjars/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css}" rel="stylesheet">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-primary); }
        .login-card { width:min(400px, 90vw); background:var(--bg-secondary); border:1px solid var(--border-color);
                      border-radius:14px; padding:36px 32px; box-shadow:0 8px 30px rgba(0,0,0,.15); }
        .login-brand { text-align:center; margin-bottom:28px; }
        .login-brand i { color:#f97316; font-size:2rem; }
        .login-brand h2 { font-size:1.2rem; font-weight:700; color:var(--text-primary); margin-top:10px; }
        .login-brand p { font-size:.78rem; color:var(--text-muted); }
        .login-input { background:var(--input-bg) !important; border:1px solid var(--border-color) !important;
                       color:var(--text-primary) !important; font-size:.88rem; padding:10px 14px; border-radius:8px; }
        .login-input:focus { border-color:#f97316 !important; box-shadow:0 0 0 2px rgba(249,115,22,.15) !important; }
        .login-btn { background:#f97316; color:#fff; border:none; padding:10px; border-radius:8px; font-weight:600;
                     font-size:.9rem; width:100%; cursor:pointer; transition:background .15s; }
        .login-btn:hover { background:#ea580c; }
        .theme-toggle { position:fixed; top:16px; right:16px; background:none; border:1px solid var(--border-color);
                        color:var(--text-muted); padding:4px 10px; border-radius:6px; cursor:pointer; font-size:.75rem; }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">
        <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
    </button>

    <div class="login-card">
        <div class="login-brand">
            <i class="fas fa-robot"></i>
            <h2>Claude Java Toolkit</h2>
            <p>AI-powered tools for Oracle DB &amp; Java/Spring</p>
        </div>

        <!-- 에러/로그아웃 메시지 -->
        <div th:if="${param.error != null and param.error[0] == 'true'}" class="alert alert-danger py-2 px-3" style="font-size:.82rem;border-radius:8px;">
            <i class="fas fa-exclamation-circle me-1"></i>아이디 또는 비밀번호가 올바르지 않습니다.
            <span th:if="${param.attempts != null}" th:text="'(' + ${param.attempts[0]} + '/5회 실패)'"></span>
        </div>
        <div th:if="${param.error != null and param.error[0] == 'locked'}" class="alert alert-danger py-2 px-3" style="font-size:.82rem;border-radius:8px;">
            <i class="fas fa-lock me-1"></i>계정이 일시 잠금되었습니다. 10분 후 다시 시도하거나 관리자에게 문의하세요.
        </div>
        <div th:if="${logout}" class="alert alert-success py-2 px-3" style="font-size:.82rem;border-radius:8px;">
            <i class="fas fa-check-circle me-1"></i>로그아웃되었습니다.
        </div>
        <!-- 세션 만료 / 접근 거부 안내 (JS에서 동적으로 주입) -->
        <div id="sessionExpiredAlert" class="alert alert-warning py-2 px-3" style="display:none;font-size:.82rem;border-radius:8px;">
            <i class="fas fa-clock me-1"></i>세션이 만료되었습니다. 다시 로그인해주세요.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label" style="font-size:.82rem;color:var(--text-sub);">사용자명</label>
                <input type="text" name="username" class="form-control login-input" placeholder="admin" autofocus required>
            </div>
            <div class="mb-4">
                <label class="form-label" style="font-size:.82rem;color:var(--text-sub);">비밀번호</label>
                <input type="password" name="password" class="form-control login-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt me-2"></i>로그인
            </button>
        </form>

        <div style="text-align:center;margin-top:18px;font-size:.72rem;color:var(--text-muted);">
            초기 계정: admin / admin1234
        </div>
    </div>

<script>
function toggleTheme() {
    var isDark = document.documentElement.getAttribute('data-theme') !== 'light';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
    document.getElementById('themeLabel').textContent = isDark ? 'Dark' : 'Light';
}
(function(){
    var t = localStorage.getItem('theme');
    document.getElementById('themeLabel').textContent = (t === 'light') ? 'Dark' : 'Light';
})();

/* ── CSRF 토큰 만료 UX ─────────────────────────────────────
   로그인 페이지를 오래 열어두면 CSRF 토큰이 만료되어 제출 시 실패합니다.
   1) ?denied=true / ?expired=true / ?csrf=expired 파라미터 감지 → 안내 표시
   2) 페이지 로드 15분 후, 입력 중이 아니면 자동 새로고침으로 토큰 갱신    */
(function() {
    // 1) URL 파라미터 기반 안내 메시지
    var params = new URLSearchParams(window.location.search);
    if (params.has('denied') || params.has('expired') || params.get('csrf') === 'expired') {
        var alertEl = document.getElementById('sessionExpiredAlert');
        if (alertEl) alertEl.style.display = '';
    }

    // 2) 15분 후 자동 새로고침 (사용자 입력 없을 때만 안전하게)
    var pageLoadTime = Date.now();
    var REFRESH_AFTER_MS = 15 * 60 * 1000;
    setInterval(function() {
        if (Date.now() - pageLoadTime < REFRESH_AFTER_MS) return;
        var u = document.querySelector('input[name="username"]');
        var p = document.querySelector('input[name="password"]');
        // 입력 필드가 비어 있을 때만 새로고침 (사용자 입력 중이면 방해하지 않음)
        if ((!u || !u.value) && (!p || !p.value)) {
            location.reload();
        }
    }, 60000);  // 1분마다 체크
})();
</script>
</body>
</html>
