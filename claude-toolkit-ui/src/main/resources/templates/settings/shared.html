<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>팀 설정 공유 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css}" rel="stylesheet">
    <style>
        .config-card { border:1px solid var(--border-color); border-radius:8px; padding:12px 14px;
                       margin-bottom:8px; background:var(--bg-secondary); }
        .config-type { font-size:.68rem; font-weight:700; padding:1px 8px; border-radius:8px; }
        .config-type-CONTEXT  { background:rgba(16,185,129,.12); color:#10b981; }
        .config-type-TEMPLATE { background:rgba(249,115,22,.12); color:#f97316; }
        .config-type-PROMPT   { background:rgba(139,92,246,.12); color:#8b5cf6; }
    </style>
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>
    <main class="main-area">
        <div class="top-bar">
            <span class="top-bar-title"><i class="fas fa-share-nodes me-2" style="color:#ef4444"></i>팀 설정 공유</span>
            <button id="themeToggle" onclick="toggleTheme()">
                <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
            </button>
        </div>
        <div class="main-content">
            <div class="row g-3">
                <!-- 왼쪽: 새 설정 저장 -->
                <div class="col-lg-5">
                    <div class="panel p-3">
                        <div class="section-label mb-2"><i class="fas fa-plus-circle me-1"></i>새 설정 공유</div>
                        <div class="mb-2">
                            <label style="font-size:.78rem;color:var(--text-sub);">유형</label>
                            <select id="cfgType" class="form-select" style="font-size:.84rem;">
                                <option value="CONTEXT">프로젝트 컨텍스트</option>
                                <option value="TEMPLATE">분석 템플릿</option>
                                <option value="PROMPT">커스텀 프롬프트</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <label style="font-size:.78rem;color:var(--text-sub);">이름</label>
                            <input type="text" id="cfgName" class="form-control" style="font-size:.84rem;" placeholder="설정 이름">
                        </div>
                        <div class="mb-2">
                            <label style="font-size:.78rem;color:var(--text-sub);">내용</label>
                            <textarea id="cfgContent" class="form-control" rows="8" style="font-size:.82rem;font-family:monospace;"
                                      placeholder="설정 내용을 입력하세요..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label style="font-size:.78rem;">
                                <input type="checkbox" id="cfgPublic"> 팀 전체 공개
                            </label>
                        </div>
                        <button class="btn-accent w-100" onclick="saveConfig()">
                            <i class="fas fa-save me-1"></i>저장
                        </button>
                        <div id="saveResult" style="font-size:.8rem;margin-top:6px;"></div>
                    </div>
                </div>

                <!-- 오른쪽: 설정 목록 -->
                <div class="col-lg-7">
                    <!-- 내 설정 -->
                    <div class="panel p-3 mb-3">
                        <div class="section-label mb-2"><i class="fas fa-user me-1"></i>내 설정</div>
                        <div th:if="${#lists.isEmpty(myConfigs)}" style="text-align:center;padding:20px;color:var(--text-muted);font-size:.82rem;">
                            저장된 설정이 없습니다.
                        </div>
                        <div th:each="c : ${myConfigs}" class="config-card">
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <div class="d-flex align-items-center gap-2">
                                    <span class="config-type" th:classappend="'config-type-' + ${c.configType}" th:text="${c.configType}"></span>
                                    <span style="font-weight:600;font-size:.85rem;" th:text="${c.name}"></span>
                                    <span th:if="${c.public}" style="font-size:.65rem;color:#10b981;"><i class="fas fa-globe"></i> 공개</span>
                                </div>
                                <button class="copy-btn" style="font-size:.68rem;color:#ef4444;" onclick="deleteConfig(this)"
                                        th:attr="data-id=${c.id}">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                            <div style="font-size:.75rem;color:var(--text-muted);font-family:monospace;max-height:60px;overflow:hidden;text-overflow:ellipsis;"
                                 th:text="${c.content}"></div>
                            <div style="font-size:.68rem;color:var(--text-muted);margin-top:4px;"
                                 th:text="${#temporals.format(c.createdAt, 'yyyy-MM-dd HH:mm')}"></div>
                        </div>
                    </div>

                    <!-- 공개 설정 -->
                    <div class="panel p-3">
                        <div class="section-label mb-2"><i class="fas fa-globe me-1"></i>팀 공개 설정</div>
                        <div th:if="${#lists.isEmpty(publicConfigs)}" style="text-align:center;padding:20px;color:var(--text-muted);font-size:.82rem;">
                            공개된 설정이 없습니다.
                        </div>
                        <div th:each="c : ${publicConfigs}" class="config-card">
                            <div class="d-flex align-items-center gap-2 mb-1">
                                <span class="config-type" th:classappend="'config-type-' + ${c.configType}" th:text="${c.configType}"></span>
                                <span style="font-weight:600;font-size:.85rem;" th:text="${c.name}"></span>
                                <span style="font-size:.68rem;color:var(--text-muted);" th:text="'by ' + ${c.createdBy}"></span>
                            </div>
                            <div style="font-size:.75rem;color:var(--text-muted);font-family:monospace;max-height:60px;overflow:hidden;"
                                 th:text="${c.content}"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/toolkit.js}"></script>
<script>
function saveConfig() {
    var type    = document.getElementById('cfgType').value;
    var name    = document.getElementById('cfgName').value.trim();
    var content = document.getElementById('cfgContent').value.trim();
    var pub     = document.getElementById('cfgPublic').checked;
    if (!name || !content) { showToast('이름과 내용을 입력하세요.', 'warning'); return; }
    var fd = new URLSearchParams();
    fd.append('configType', type); fd.append('name', name);
    fd.append('content', content); fd.append('isPublic', pub);
    fetch('/settings/shared/save', {method:'POST', body:fd})
        .then(function(r){ return r.json(); })
        .then(function(d){
            var el = document.getElementById('saveResult');
            if (d.success) { el.innerHTML = '<span style="color:#10b981;">✓ 저장되었습니다.</span>'; location.reload(); }
            else { el.innerHTML = '<span style="color:#ef4444;">✗ ' + (d.error||'저장 실패') + '</span>'; }
        });
}
function deleteConfig(btn) {
    var id = btn.getAttribute('data-id');
    if (!confirm('이 설정을 삭제하시겠습니까?')) return;
    fetch('/settings/shared/' + id + '/delete', {method:'POST'})
        .then(function(r){ return r.json(); })
        .then(function(d){ if (d.success) location.reload(); else showToast(d.error||'삭제 실패', 'warning'); });
}
</script>
</body>
</html>
