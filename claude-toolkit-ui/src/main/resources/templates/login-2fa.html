<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA 인증 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css}" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-primary); }
        .tfa-card { width:min(420px, 90vw); background:var(--bg-secondary); border:1px solid var(--border-color);
                    border-radius:14px; padding:36px 32px; box-shadow:0 8px 30px rgba(0,0,0,.15); }
        .tfa-brand { text-align:center; margin-bottom:24px; }
        .tfa-brand i { color:var(--accent); font-size:2rem; }
        .tfa-brand h2 { font-size:1.1rem; font-weight:700; color:var(--text-primary); margin-top:10px; }
        .otp-input { font-size:1.5rem; text-align:center; letter-spacing:8px; font-family:monospace;
                     background:var(--input-bg) !important; border:2px solid var(--border-color) !important;
                     color:var(--text-primary) !important; padding:12px; border-radius:10px; }
        .otp-input:focus { border-color:var(--accent) !important; box-shadow:0 0 0 3px rgba(249,115,22,.15) !important; }
        .btn-2fa { background:var(--accent); color:#fff; border:none; padding:12px; border-radius:8px; font-weight:600;
                   font-size:.9rem; width:100%; cursor:pointer; transition:background .15s; }
        .btn-2fa:hover { filter:brightness(0.9); }
    </style>
</head>
<body>
    <div class="tfa-card">
        <div class="tfa-brand">
            <i class="fas fa-shield-halved"></i>
            <h2>이중 인증 (2FA)</h2>
            <p style="font-size:.78rem;color:var(--text-muted);" th:text="'계정: ' + ${username}"></p>
        </div>

        <!-- ═══ OTP 등록됨 → 코드 입력 ═══ -->
        <div th:if="${mode == 'verify'}">
            <p style="font-size:.82rem;color:var(--text-sub);text-align:center;margin-bottom:16px;">
                Google Authenticator 앱에서 6자리 인증 코드를 입력하세요.
            </p>
            <div class="mb-4">
                <input type="text" id="otpCode" class="form-control otp-input" maxlength="6"
                       placeholder="000000" autofocus>
            </div>
            <button class="btn-2fa" onclick="verifyOtp()">
                <i class="fas fa-check-circle me-2"></i>인증
            </button>
            <div id="verifyResult" style="font-size:.82rem;margin-top:10px;text-align:center;"></div>
        </div>

        <!-- ═══ OTP 미등록 → QR코드 등록 ═══ -->
        <div th:if="${mode == 'setup'}">
            <div style="background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.2);border-radius:8px;padding:10px 14px;margin-bottom:16px;">
                <p style="font-size:.82rem;color:#f97316;margin:0;">
                    <i class="fas fa-exclamation-triangle me-1"></i>
                    <b>관리자 계정은 2FA 등록이 필요합니다.</b><br>
                    Google Authenticator 앱으로 아래 QR코드를 스캔하세요.
                </p>
            </div>
            <div style="text-align:center;margin-bottom:12px;">
                <div id="qrCodeContainer" style="display:inline-block;padding:8px;background:#fff;border-radius:8px;border:1px solid var(--border-color);"></div>
            </div>
            <script th:inline="javascript">
                var otpUri = /*[[${otpAuthUri}]]*/ '';
                if (otpUri && document.getElementById('qrCodeContainer')) {
                    new QRCode(document.getElementById('qrCodeContainer'), {
                        text: otpUri, width: 200, height: 200, colorDark: '#000000', colorLight: '#ffffff'
                    });
                }
            </script>
            <p style="font-size:.72rem;color:var(--text-muted);text-align:center;margin-bottom:4px;">
                수동 입력 키: <code th:text="${secret}" style="font-size:.68rem;word-break:break-all;"></code>
            </p>
            <p style="font-size:.78rem;color:var(--text-sub);text-align:center;margin-bottom:12px;">
                QR코드 스캔 후 앱에 표시되는 6자리 코드를 입력하세요.
            </p>
            <div class="mb-4">
                <input type="text" id="setupCode" class="form-control otp-input" maxlength="6"
                       placeholder="000000" autofocus>
            </div>
            <button class="btn-2fa" onclick="setupOtp()">
                <i class="fas fa-qrcode me-2"></i>등록 + 인증
            </button>
            <div id="setupResult" style="font-size:.82rem;margin-top:10px;text-align:center;"></div>
        </div>

        <div style="text-align:center;margin-top:16px;">
            <a href="/logout" style="font-size:.75rem;color:var(--text-muted);text-decoration:none;">
                <i class="fas fa-sign-out-alt me-1"></i>다른 계정으로 로그인
            </a>
        </div>
    </div>

<script>
function verifyOtp() {
    var code = document.getElementById('otpCode').value.trim();
    if (!code || code.length !== 6) { showToast('6자리 인증 코드를 입력하세요.', 'warning'); return; }
    var fd = new URLSearchParams(); fd.append('code', code);
    var el = document.getElementById('verifyResult');
    el.innerHTML = '<span style="color:var(--text-muted);"><i class="fas fa-spinner fa-spin me-1"></i>확인 중...</span>';
    fetch('/login/2fa/verify', {method:'POST', body:fd})
        .then(function(r){ return r.json(); })
        .then(function(d){
            if (d.success) {
                el.innerHTML = '<span style="color:#10b981;"><i class="fas fa-check-circle me-1"></i>인증 성공!</span>';
                setTimeout(function(){ window.location.href = '/'; }, 500);
            } else {
                el.innerHTML = '<span style="color:#ef4444;"><i class="fas fa-times-circle me-1"></i>' + (d.error||'인증 실패') + '</span>';
            }
        });
}

function setupOtp() {
    var code = document.getElementById('setupCode').value.trim();
    if (!code || code.length !== 6) { showToast('6자리 인증 코드를 입력하세요.', 'warning'); return; }
    var fd = new URLSearchParams(); fd.append('code', code);
    var el = document.getElementById('setupResult');
    el.innerHTML = '<span style="color:var(--text-muted);"><i class="fas fa-spinner fa-spin me-1"></i>확인 중...</span>';
    fetch('/login/2fa/setup', {method:'POST', body:fd})
        .then(function(r){ return r.json(); })
        .then(function(d){
            if (d.success) {
                el.innerHTML = '<span style="color:#10b981;"><i class="fas fa-check-circle me-1"></i>2FA 등록 + 인증 완료!</span>';
                setTimeout(function(){ window.location.href = '/'; }, 500);
            } else {
                el.innerHTML = '<span style="color:#ef4444;"><i class="fas fa-times-circle me-1"></i>' + (d.error||'등록 실패') + '</span>';
            }
        });
}

// Enter 키로 제출
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        var verifyInput = document.getElementById('otpCode');
        var setupInput  = document.getElementById('setupCode');
        if (verifyInput && document.activeElement === verifyInput) verifyOtp();
        if (setupInput  && document.activeElement === setupInput)  setupOtp();
    }
});
</script>
</body>
</html>
