<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>테스트 코드 생성 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="/webjars/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="/webjars/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css(v='20250329')}" rel="stylesheet">
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <main class="main-area">
        <div class="top-bar">
            <span class="top-bar-title"><i class="fas fa-vial me-2" style="color:#f97316"></i>테스트 코드 생성</span>
            <button id="themeToggle" onclick="toggleTheme()">
                <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
            </button>
        </div>

        <div class="spinner-overlay" id="spinner">
            <div class="text-center">
                <div class="spinner-border text-warning mb-3" style="width:3rem;height:3rem;"></div>
                <div class="spinner-msg" id="spinnerMsg">코드 분석 중...</div>
            </div>
        </div>

        <div class="main-content">
            <p class="page-subtitle">Java 소스 코드를 입력하면 JUnit 5 테스트 클래스를 자동 생성합니다.</p>

            <div th:if="${error}" class="alert alert-danger mb-3" th:text="${error}"></div>

            <div class="row g-4">
                <!-- Input -->
                <div class="col-lg-6">
                    <div class="panel p-4">
                        <form method="post" action="/testgen/generate" id="testForm">
                            <div class="mb-3">
                                <label class="form-label">소스 유형</label>
                                <select class="form-select" name="sourceType">
                                    <option value="Controller" th:selected="${sourceType == 'Controller'}">Controller (@RestController / @Controller)</option>
                                    <option value="Service"    th:selected="${sourceType == 'Service'}">Service (@Service)</option>
                                    <option value="Mapper"     th:selected="${sourceType == 'Mapper'}">Mapper / Repository (@Mapper / @Repository)</option>
                                    <option value="General"    th:selected="${sourceType == 'General'}">일반 Java 클래스</option>
                                </select>
                                <div class="form-text">소스 유형에 따라 MockMvc / Mockito / MybatisTest 전략이 선택됩니다.</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Java 소스 코드</label>
                                <textarea class="form-control" name="sourceCode" rows="16"
                                          placeholder="@Service&#10;public class OrderService {&#10;    ..."
                                          th:text="${sourceCode}"></textarea>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-accent flex-fill"
                                        onclick="showSpinner(['소스 코드 분석 중...','테스트 케이스 설계 중...','JUnit 5 코드 작성 중...','Mock 설정 생성 중...'])">
                                    <i class="fas fa-vial me-2"></i>테스트 코드 생성
                                </button>
                                <button type="button" class="btn btn-outline-tk btn-sm" onclick="runStream()" id="streamBtn">
                                    <i class="fas fa-bolt me-1" style="color:#f97316"></i>실시간
                                </button>
                            </div>
                        </form>
                        <hr class="divider my-3">
                        <form method="post" action="/testgen/generate/file" enctype="multipart/form-data">
                            <input type="hidden" name="sourceType" th:value="${sourceType != null ? sourceType : 'Service'}">
                            <div class="input-group">
                                <input type="file" class="form-control form-control-sm" name="file" accept=".java">
                                <button class="btn btn-outline-tk btn-sm" type="submit" onclick="showSpinner(['파일 처리 중...'])">
                                    <i class="fas fa-upload me-1"></i>파일 업로드
                                </button>
                            </div>
                            <p class="upload-hint mt-1">지원: .java</p>
                        </form>
                    </div>
                </div>

                <!-- Result -->
                <div class="col-lg-6">
                    <div class="panel p-4 h-100">
                        <!-- ── 실시간 스트리밍 패널 ── -->
                        <div id="streamPanel" style="display:none;">
                            <div class="d-flex align-items-center justify-content-between mb-2">
                                <h6 class="mb-0" style="color:var(--text-sub);font-size:0.88rem;">
                                    <i class="fas fa-bolt me-2" style="color:#f97316"></i>실시간 결과
                                    <span id="streamStatus" class="ms-2" style="font-size:0.75rem;color:var(--text-muted);"></span>
                                </h6>
                                <button type="button" class="copy-btn" onclick="copyStream()">
                                    <i class="fas fa-copy me-1"></i>복사
                                </button>
                            </div>
                            <div id="streamResult" class="stream-result"></div>
                            <div class="mt-2" style="font-size:0.73rem;color:var(--text-muted);">
                                <i class="fas fa-info-circle me-1"></i>실시간 보기 결과는 이력에 자동 저장되지 않습니다.
                            </div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span class="result-meta">생성된 테스트 코드</span>
                            <div class="d-flex gap-2">
                                <button th:if="${result}" class="copy-btn" onclick="openInNewTab('resultRaw')">
                                    <i class="fas fa-external-link-alt me-1"></i>새 탭
                                </button>
                                <button th:if="${result}" id="copyBtn" class="copy-btn" onclick="copyToClipboard('resultRaw')">
                                    <i class="fas fa-copy me-1"></i>복사
                                </button>
                                <form th:if="${result}" method="post" action="/testgen/download" style="display:inline;">
                                    <input type="hidden" name="sourceCode" th:value="${sourceCode}">
                                    <input type="hidden" name="sourceType" th:value="${sourceType}">
                                    <button type="submit" class="btn btn-outline-tk btn-sm">
                                        <i class="fas fa-download me-1"></i>다운로드
                                    </button>
                                </form>
                            </div>
                        </div>
                        <div th:if="${result}" class="result-box result-raw" id="resultRaw" th:text="${result}"></div>
                        <div th:unless="${result}" class="result-box result-empty">
                            <i class="fas fa-vial fa-2x" style="color:var(--border-color)"></i>
                            <span>Java 소스를 입력하고 테스트 코드를 생성하세요.</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/toolkit.js(v='20250409')}"></script>
<script>
    function runStream() {
        var input = document.querySelector('[name=sourceCode]').value.trim();
        if (!input) { showToast('소스 코드를 입력하세요.', 'warning'); return; }
        var sourceType = document.querySelector('select[name=sourceType]').value;
        document.getElementById('streamPanel').style.display = '';
        document.getElementById('streamResult').textContent = '';
        document.getElementById('streamResult').classList.add('stream-cursor');
        document.getElementById('streamStatus').textContent = '스트리밍 중...';
        startStream('test_gen', {input: input, sourceType: sourceType}, 'streamResult', function() {
            document.getElementById('streamResult').classList.remove('stream-cursor');
            document.getElementById('streamStatus').textContent = '완료';
        });
    }
    function copyStream() {
        var el = document.getElementById('streamResult');
        if (!el || !el.textContent.trim()) return;
        navigator.clipboard.writeText(el.textContent).then(function() {
            var btn = document.querySelector('[onclick="copyStream()"]');
            if (btn) { var orig = btn.innerHTML; btn.innerHTML = '<i class="fas fa-check me-1"></i>복사됨'; setTimeout(function(){ btn.innerHTML = orig; }, 1500); }
        }).catch(function() {
            var ta = document.createElement('textarea'); ta.value = el.textContent;
            document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        });
    }
</script>
</body>
</html>
