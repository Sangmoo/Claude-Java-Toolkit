<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>pom.xml 의존성 분석 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="/webjars/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="/webjars/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css(v='20250329')}" rel="stylesheet">
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <main class="main-area">
        <!-- Top bar -->
        <div class="top-bar">
            <span class="top-bar-title"><i class="fas fa-cubes me-2" style="color:#f97316"></i>pom.xml 의존성 분석</span>
            <button id="themeToggle" onclick="toggleTheme()">
                <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
            </button>
        </div>

        <!-- Spinner -->
        <div class="spinner-overlay" id="spinner">
            <div class="text-center">
                <div class="spinner-border text-warning mb-3" style="width:3rem;height:3rem;"></div>
                <div class="spinner-msg" id="spinnerMsg">분석 중...</div>
            </div>
        </div>

        <div class="main-content">
            <p class="page-subtitle">pom.xml 내용을 입력하면 의존성 취약점, 버전 충돌, 업그레이드 권고를 분석합니다.</p>

            <!-- Error Alert -->
            <div th:if="${error}" class="alert" style="background:rgba(239,68,68,0.12);border:1px solid #ef4444;color:#ef4444;margin-bottom:16px;padding:12px 16px;border-radius:8px;">
                <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
            </div>

            <div class="row g-3">
                <!-- Input Panel -->
                <div class="col-lg-6">
                    <div class="panel p-3">
                        <form id="depcheckForm" th:action="@{/depcheck/analyze}" method="post"
                              onsubmit="showSpinner(['pom.xml 파싱 중...','의존성 트리 분석 중...','취약점 데이터 조회 중...','버전 충돌 검사 중...','권고 사항 생성 중...'])">

                            <label class="form-label">pom.xml 내용</label>
                            <textarea name="pomXml" class="form-control" rows="20"
                                      style="font-family:monospace;font-size:0.82rem;"
                                      placeholder="&lt;project&gt;...&lt;/project&gt;"
                                      th:text="${pomXml}"></textarea>

                            <div class="d-flex gap-2 mt-2 flex-wrap">
                                <button type="submit" class="btn-accent">
                                    <i class="fas fa-cubes me-1"></i>의존성 분석
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Result Panel -->
                <div class="col-lg-6">
                    <div class="panel p-3" style="height:100%;">
                        <!-- Result Action Bar -->
                        <div class="d-flex justify-content-between align-items-center mb-2" th:if="${result}">
                            <div class="d-flex gap-2 align-items-center">
                                <span class="result-meta">분석 완료</span>
                            </div>
                            <div class="d-flex gap-2">
                                <button class="copy-btn" onclick="copyToClipboard('rawResult')">
                                    <i class="fas fa-copy me-1"></i>복사
                                </button>
                                <button class="copy-btn" onclick="openInNewTab('rawResult')">
                                    <i class="fas fa-external-link-alt me-1"></i>새 탭
                                </button>
                                <form th:action="@{/depcheck/download}" method="post" style="display:inline">
                                    <input type="hidden" name="pomXml" th:value="${pomXml}">
                                    <button type="submit" class="copy-btn">
                                        <i class="fas fa-download me-1"></i>MD 저장
                                    </button>
                                </form>
                            </div>
                        </div>

                        <!-- Severity Filter -->
                        <div class="sev-filter" th:if="${result}" id="sevFilterBar">
                            <button class="sev-filter-btn f-all" id="sevBtn-ALL"    onclick="filterSeverity('ALL')">ALL</button>
                            <button class="sev-filter-btn"       id="sevBtn-HIGH"   onclick="filterSeverity('HIGH')">🔴 HIGH</button>
                            <button class="sev-filter-btn"       id="sevBtn-MEDIUM" onclick="filterSeverity('MEDIUM')">🟡 MEDIUM</button>
                            <button class="sev-filter-btn"       id="sevBtn-LOW"    onclick="filterSeverity('LOW')">🟢 LOW</button>
                        </div>

                        <div class="result-box" id="resultBox">
                            <div th:if="${result}">
                                <div class="markdown-body" id="resultMd"></div>
                                <span id="rawResult" style="display:none" th:text="${result}"></span>
                            </div>
                            <div th:unless="${result}" class="result-empty">
                                <i class="fas fa-cubes" style="font-size:2.5rem;color:var(--text-muted)"></i>
                                <p style="color:var(--text-muted);font-size:0.85rem;margin:0">pom.xml을 입력하고 분석 버튼을 클릭하세요</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="/webjars/marked/9.1.6/marked.min.js"></script>
<script src="/webjars/prism/1.29.0/components/prism-core.min.js"></script>
<script src="/webjars/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
<script th:src="@{/js/toolkit.js(v='20250409')}"></script>
<script>
    var rawEl = document.getElementById('rawResult');
    if (rawEl) {
        var raw = rawEl.textContent || '';
        renderMarkdown(raw, 'resultMd');
        Prism.highlightAllUnder(document.getElementById('resultMd'));
        initSeverityFilter('resultMd');
        filterSeverity('ALL');
    }
</script>
</body>
</html>
