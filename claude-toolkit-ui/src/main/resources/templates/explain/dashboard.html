<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>SQL 성능 히스토리 대시보드 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css(v='20250402')}" rel="stylesheet">
    <style>
        .stat-card { background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:10px;
                     padding:16px 20px; text-align:center; }
        .stat-card .stat-num { font-size:2rem; font-weight:700; color:var(--accent); line-height:1; }
        .stat-card .stat-label { font-size:0.78rem; color:var(--text-muted); margin-top:4px; }
        .chart-wrap { background:var(--bg-secondary); border:1px solid var(--border-color);
                      border-radius:10px; padding:20px; }
        .chart-title { font-size:0.85rem; font-weight:600; color:var(--text-secondary); margin-bottom:12px; }
        .range-btn { background:none; border:1px solid var(--border-color); color:var(--text-muted);
                     padding:3px 12px; border-radius:14px; font-size:0.75rem; cursor:pointer; transition:all 0.15s; }
        .range-btn.active { background:var(--accent-subtle); border-color:var(--accent);
                            color:var(--accent); font-weight:500; }
        .hist-table th { font-size:0.75rem; color:var(--text-muted); font-weight:500;
                         border-bottom:1px solid var(--border-color); padding:6px 10px; }
        .hist-table td { font-size:0.80rem; padding:7px 10px; border-bottom:1px solid var(--border-color);
                         color:var(--text-secondary); vertical-align:middle; }
        .hist-table tr:last-child td { border-bottom:none; }
        .cost-bar-wrap { display:flex; align-items:center; gap:8px; }
        .cost-bar { height:6px; border-radius:3px; background:var(--accent); min-width:4px; flex-shrink:0; }
        .cost-num { font-size:0.78rem; color:var(--text-primary); font-weight:600; white-space:nowrap; }
        .cost-null { color:var(--text-muted); font-size:0.75rem; }
        .sql-preview { max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
                       font-family:monospace; font-size:0.75rem; color:var(--text-secondary); }
        .empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }
        .empty-state i { font-size:2.5rem; opacity:0.3; margin-bottom:12px; }
        .trend-up   { color:#ef4444; }
        .trend-down { color:#10b981; }
        .trend-same { color:var(--text-muted); }
        canvas { max-height:280px; }
    </style>
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <main class="main-area">
        <div class="top-bar">
            <span class="top-bar-title">
                <i class="fas fa-chart-line me-2" style="color:#3b82f6"></i>SQL 성능 히스토리 대시보드
            </span>
            <div class="d-flex gap-2 align-items-center">
                <a th:href="@{/explain}" class="btn btn-sm btn-outline-secondary">
                    <i class="fas fa-arrow-left me-1"></i>실행계획 분석
                </a>
                <button id="themeToggle" onclick="toggleTheme()">
                    <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
                </button>
            </div>
        </div>

        <div class="main-content">
            <p class="page-subtitle">실행계획 분석 이력을 기반으로 SQL별 Cost 추이를 시각화합니다.</p>

            <!-- 데이터 없음 -->
            <div th:if="${totalCount == 0}" class="empty-state">
                <div><i class="fas fa-chart-area d-block"></i></div>
                <p class="mt-2 mb-1" style="font-size:0.95rem;">아직 실행계획 분석 이력이 없습니다.</p>
                <p style="font-size:0.82rem;">
                    <a th:href="@{/explain}">실행계획 분석</a>을 실행하면 Cost 추이가 여기에 표시됩니다.
                </p>
            </div>

            <div th:if="${totalCount > 0}">
                <!-- Stats Row -->
                <div class="row g-3 mb-4">
                    <div class="col-6 col-md-3">
                        <div class="stat-card">
                            <div class="stat-num" th:text="${totalCount}">0</div>
                            <div class="stat-label">총 분석 횟수</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="stat-card">
                            <div class="stat-num" id="statMaxCost">—</div>
                            <div class="stat-label">최대 Cost</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="stat-card">
                            <div class="stat-num" id="statMinCost">—</div>
                            <div class="stat-label">최소 Cost</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="stat-card">
                            <div class="stat-num" id="statAvgCost">—</div>
                            <div class="stat-label">평균 Cost</div>
                        </div>
                    </div>
                </div>

                <!-- Favorites Section -->
                <div class="chart-wrap mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="chart-title"><i class="fas fa-star me-1" style="color:#f59e0b"></i>즐겨찾기 SQL</span>
                        <a th:href="@{/explain}" class="copy-btn" style="font-size:.75rem;padding:3px 10px;text-decoration:none;">
                            <i class="fas fa-plus me-1"></i>새 분석
                        </a>
                    </div>
                    <div th:if="${#lists.isEmpty(explainFavorites)}" style="text-align:center;padding:20px;color:var(--text-muted);font-size:.82rem;">
                        <i class="fas fa-star" style="opacity:.2;font-size:1.5rem;display:block;margin-bottom:8px;"></i>
                        실행계획 분석 후 ★ 즐겨찾기 버튼을 눌러 저장하세요.
                    </div>
                    <div th:unless="${#lists.isEmpty(explainFavorites)}" class="table-responsive">
                        <table class="hist-table w-100">
                            <thead>
                                <tr>
                                    <th>저장일시</th>
                                    <th>SQL 미리보기</th>
                                    <th style="text-align:center;">재실행</th>
                                    <th style="text-align:center;">삭제</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="fav : ${explainFavorites}">
                                    <td style="white-space:nowrap;" th:text="${fav.formattedDate}"></td>
                                    <td>
                                        <span class="sql-preview" th:title="${fav.inputContent}" th:text="${fav.inputContent}"></span>
                                    </td>
                                    <td style="text-align:center;">
                                        <form method="post" action="/explain/analyze" style="display:inline;">
                                            <input type="hidden" name="sqlContent" th:value="${fav.inputContent}">
                                            <button type="submit" class="copy-btn" style="font-size:.72rem;padding:2px 10px;">
                                                <i class="fas fa-play me-1" style="color:#22c55e"></i>재실행
                                            </button>
                                        </form>
                                    </td>
                                    <td style="text-align:center;">
                                        <form method="post" th:action="@{/favorites/{id}/delete(id=${fav.id})}" style="display:inline;">
                                            <input type="hidden" name="redirect" value="/explain/dashboard">
                                            <button type="submit" class="copy-btn" style="font-size:.72rem;padding:2px 10px;color:#ef4444;"
                                                    onclick="return confirm('즐겨찾기를 삭제하시겠습니까?')">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Chart -->
                <div class="chart-wrap mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="chart-title"><i class="fas fa-chart-line me-1" style="color:#3b82f6"></i>Cost 추이 (시간 순)</span>
                        <div class="d-flex gap-1">
                            <button class="range-btn active" onclick="filterRange(this,'all')">전체</button>
                            <button class="range-btn" onclick="filterRange(this,'30d')">30일</button>
                            <button class="range-btn" onclick="filterRange(this,'7d')">7일</button>
                        </div>
                    </div>
                    <canvas id="costChart"></canvas>
                </div>

                <!-- Table -->
                <div class="chart-wrap">
                    <div class="chart-title mb-2">
                        <i class="fas fa-table me-1" style="color:#8b5cf6"></i>분석 이력 상세
                    </div>
                    <div class="table-responsive">
                        <table class="hist-table w-100">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>분석 일시</th>
                                    <th>SQL (미리보기)</th>
                                    <th>Cost</th>
                                    <th>변화</th>
                                </tr>
                            </thead>
                            <tbody id="histTableBody">
                            <!-- filled by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div><!-- /main-content -->
    </main>
</div>

<!-- Pass data from Thymeleaf to JS -->
<script th:inline="javascript">
    /*<![CDATA[*/
    var RAW_ENTRIES = [];
    /*[# th:each="e : ${entries}"]*/
    RAW_ENTRIES.push({
        id:        /*[[${e.id}]]*/          0,
        date:      /*[[${e.createdAt}]]*/   '',
        title:     /*[[${e.title}]]*/       '',
        sql:       /*[[${e.inputContent}]]*/ '',
        cost:      /*[[${e.costValue}]]*/   null
    });
    /*[/]*/
    /*]]>*/
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script th:src="@{/js/toolkit.js(v='20250402')}"></script>
<script>
(function() {
    // ── Parse dates ──────────────────────────────────────────────────────────
    RAW_ENTRIES.forEach(function(e) {
        // date format: "2025-04-02T10:30:00" (LocalDateTime toString)
        e.dateObj = new Date(e.date.replace('T', ' '));
        e.sqlShort = (e.sql || '').trim().replace(/\s+/g, ' ').substring(0, 60);
    });

    var allEntries = RAW_ENTRIES.slice(); // full copy for filtering
    var chart;

    // ── Stats ────────────────────────────────────────────────────────────────
    function updateStats(entries) {
        var costs = entries.filter(function(e){ return e.cost !== null && e.cost !== undefined && e.cost !== 'null'; })
                           .map(function(e){ return Number(e.cost); });
        if (costs.length === 0) {
            document.getElementById('statMaxCost').textContent = '—';
            document.getElementById('statMinCost').textContent = '—';
            document.getElementById('statAvgCost').textContent = '—';
            return;
        }
        var max = Math.max.apply(null, costs);
        var min = Math.min.apply(null, costs);
        var avg = Math.round(costs.reduce(function(a,b){return a+b;},0) / costs.length);
        document.getElementById('statMaxCost').textContent = max.toLocaleString();
        document.getElementById('statMinCost').textContent = min.toLocaleString();
        document.getElementById('statAvgCost').textContent = avg.toLocaleString();
    }

    // ── Chart ────────────────────────────────────────────────────────────────
    function buildChart(entries) {
        var labels = [];
        var costs  = [];
        entries.forEach(function(e, i) {
            var d = e.dateObj;
            var label = (d.getMonth()+1) + '/' + d.getDate()
                      + ' ' + ('0'+d.getHours()).slice(-2) + ':' + ('0'+d.getMinutes()).slice(-2);
            labels.push(label);
            var c = (e.cost !== null && e.cost !== undefined && e.cost !== 'null') ? Number(e.cost) : null;
            costs.push(c);
        });

        var isDark = document.documentElement.getAttribute('data-theme') !== 'light';
        var gridColor  = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';
        var labelColor = isDark ? '#94a3b8' : '#64748b';

        if (chart) { chart.destroy(); }
        var ctx = document.getElementById('costChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Root Cost',
                    data: costs,
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59,130,246,0.12)',
                    pointBackgroundColor: costs.map(function(c, i){
                        if (i === 0 || costs[i-1] === null || c === null) return '#3b82f6';
                        return c > costs[i-1] ? '#ef4444' : '#10b981';
                    }),
                    pointRadius: 5,
                    pointHoverRadius: 7,
                    borderWidth: 2,
                    tension: 0.35,
                    fill: true,
                    spanGaps: false
                }]
            },
            options: {
                responsive: true,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(ctx) {
                                return ctx.parsed.y !== null
                                    ? 'Cost: ' + ctx.parsed.y.toLocaleString()
                                    : 'Cost: (없음)';
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: { color: labelColor, font: { size: 11 }, maxTicksLimit: 12 },
                        grid:  { color: gridColor }
                    },
                    y: {
                        ticks: { color: labelColor, font: { size: 11 } },
                        grid:  { color: gridColor },
                        title: { display: true, text: 'Cost', color: labelColor, font: { size: 11 } }
                    }
                }
            }
        });
    }

    // ── Table ────────────────────────────────────────────────────────────────
    function buildTable(entries) {
        var tbody = document.getElementById('histTableBody');
        if (!tbody) return;
        var maxCost = 0;
        entries.forEach(function(e){ if (e.cost && Number(e.cost) > maxCost) maxCost = Number(e.cost); });
        var rows = '';
        for (var i = 0; i < entries.length; i++) {
            var e    = entries[i];
            var prev = i > 0 ? entries[i-1] : null;
            var cost = (e.cost !== null && e.cost !== undefined && e.cost !== 'null') ? Number(e.cost) : null;
            var d    = e.dateObj;
            var dateStr = (d.getMonth()+1) + '/' + d.getDate()
                        + ' ' + ('0'+d.getHours()).slice(-2) + ':' + ('0'+d.getMinutes()).slice(-2);
            var costCell = cost !== null
                ? '<div class="cost-bar-wrap">'
                  + '<div class="cost-bar" style="width:' + Math.round((cost/maxCost)*80+4) + 'px"></div>'
                  + '<span class="cost-num">' + cost.toLocaleString() + '</span></div>'
                : '<span class="cost-null">—</span>';

            var trendCell = '—';
            if (cost !== null && prev !== null && prev.cost !== null && prev.cost !== 'null') {
                var diff = cost - Number(prev.cost);
                var pct  = Math.round(diff / Number(prev.cost) * 100);
                if (diff > 0)      trendCell = '<span class="trend-up"><i class="fas fa-arrow-up"></i> +' + pct + '%</span>';
                else if (diff < 0) trendCell = '<span class="trend-down"><i class="fas fa-arrow-down"></i> ' + pct + '%</span>';
                else               trendCell = '<span class="trend-same">—</span>';
            }

            var sqlHtml = '<div class="sql-preview" title="' + escHtml(e.sqlShort) + '">'
                        + escHtml(e.sqlShort) + '</div>';

            rows += '<tr>'
                 + '<td style="color:var(--text-muted);font-size:0.72rem;">' + (i+1) + '</td>'
                 + '<td style="white-space:nowrap;font-size:0.75rem;">' + dateStr + '</td>'
                 + '<td>' + sqlHtml + '</td>'
                 + '<td>' + costCell + '</td>'
                 + '<td>' + trendCell + '</td>'
                 + '</tr>';
        }
        tbody.innerHTML = rows || '<tr><td colspan="5" class="text-center" style="color:var(--text-muted);padding:20px;">데이터가 없습니다</td></tr>';
    }

    function escHtml(s) {
        return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Range filter ─────────────────────────────────────────────────────────
    window.filterRange = function(btn, range) {
        document.querySelectorAll('.range-btn').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        var now = new Date();
        var filtered;
        if (range === '7d') {
            var cutoff = new Date(now - 7*24*60*60*1000);
            filtered = allEntries.filter(function(e){ return e.dateObj >= cutoff; });
        } else if (range === '30d') {
            var cutoff = new Date(now - 30*24*60*60*1000);
            filtered = allEntries.filter(function(e){ return e.dateObj >= cutoff; });
        } else {
            filtered = allEntries;
        }
        buildChart(filtered);
        buildTable(filtered);
        updateStats(filtered);
    };

    // ── Init ─────────────────────────────────────────────────────────────────
    if (RAW_ENTRIES.length > 0) {
        updateStats(allEntries);
        buildChart(allEntries);
        buildTable(allEntries);
    }
})();
</script>
</body>
</html>
