<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>분석 스케줄링 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css(v='20250402')}" rel="stylesheet">
    <style>
        .job-row { display:flex;align-items:flex-start;gap:16px;padding:16px 20px;border-bottom:1px solid var(--border-color);transition:background .12s; }
        .job-row:hover { background:var(--bg-tertiary); }
        .job-row:last-child { border-bottom:none; }
        .job-name { font-size:.9rem;font-weight:600;color:var(--text-primary); }
        .job-cron { font-family:monospace;font-size:.78rem;background:var(--input-bg);border:1px solid var(--border-color);border-radius:4px;padding:2px 7px;color:var(--text-sub); }
        .job-sql { font-size:.75rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:300px; }
        .status-dot { width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px; }
        .btn-job-action { background:transparent;border:1px solid var(--border-color);color:var(--text-muted);border-radius:6px;padding:4px 10px;font-size:.75rem;cursor:pointer;transition:border-color .12s,color .12s; }
        .btn-job-action:hover { border-color:var(--accent);color:var(--accent); }
        .btn-job-run { background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#22c55e;border-radius:6px;padding:4px 10px;font-size:.75rem;cursor:pointer; }
        .btn-job-delete { background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#ef4444;border-radius:6px;padding:4px 10px;font-size:.75rem;cursor:pointer; }
        .cron-hint { font-size:.72rem;color:var(--text-muted);margin-top:4px; }
        .cron-examples { display:flex;gap:6px;flex-wrap:wrap;margin-top:6px; }
        .cron-chip { background:var(--input-bg);border:1px solid var(--border-color);border-radius:4px;padding:2px 8px;font-size:.7rem;color:var(--text-muted);cursor:pointer;font-family:monospace; }
        .cron-chip:hover { border-color:var(--accent);color:var(--accent); }
    </style>
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>
    <main class="main-area">
        <div class="top-bar">
            <span class="top-bar-title"><i class="fas fa-calendar-check me-2" style="color:#f97316"></i>분석 스케줄링</span>
            <button id="themeToggle" onclick="toggleTheme()"><i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span></button>
        </div>
        <div class="main-content" style="max-width:960px;">
            <p style="font-size:.85rem;color:var(--text-muted);margin-bottom:22px;">
                cron 표현식으로 SQL 리뷰를 정기 자동 실행합니다. 결과는 이력에 자동 저장됩니다.
            </p>

            <!-- 알림 -->
            <div th:if="${saveSuccess}" class="alert alert-success mb-4" style="border-radius:8px;">
                <i class="fas fa-check-circle me-2"></i><span th:text="${saveSuccess}"></span>
            </div>
            <div th:if="${saveError}" class="alert alert-danger mb-4" style="border-radius:8px;">
                <i class="fas fa-exclamation-circle me-2"></i><span th:text="${saveError}"></span>
            </div>

            <!-- 새 스케줄 추가 -->
            <div class="panel p-4 mb-4">
                <h5 class="section-title mb-3"><i class="fas fa-plus me-2" style="color:#f97316"></i>새 스케줄 추가</h5>
                <form method="post" action="/schedule/save">
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">스케줄 이름 <span style="color:#ef4444">*</span></label>
                            <input type="text" class="form-control" name="name" placeholder="예: 일일 주문조회 SQL 리뷰" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Cron 표현식 <span style="color:#ef4444">*</span></label>
                            <input type="text" class="form-control" name="cronExpression" id="cronInput"
                                   placeholder="0 0 9 * * MON-FRI" required>
                            <div class="cron-hint">초 분 시 일 월 요일 (Spring Cron, 6자리)</div>
                            <div class="cron-examples">
                                <span class="cron-chip" onclick="setCron('0 0 9 * * MON-FRI')" title="평일 오전 9시">0 0 9 * * MON-FRI</span>
                                <span class="cron-chip" onclick="setCron('0 0 8 * * *')" title="매일 오전 8시">0 0 8 * * *</span>
                                <span class="cron-chip" onclick="setCron('0 0 9 * * MON')" title="매주 월요일 9시">0 0 9 * * MON</span>
                                <span class="cron-chip" onclick="setCron('0 0 9 1 * *')" title="매월 1일 9시">0 0 9 1 * *</span>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">SQL 내용 <span style="color:#ef4444">*</span></label>
                        <textarea class="form-control" name="sqlContent" rows="5"
                                  placeholder="정기적으로 리뷰할 SQL을 입력하세요..." required
                                  style="font-family:monospace;font-size:.82rem;"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">알림 이메일 <span style="color:var(--text-muted);font-weight:400;">(선택 — 미구현 예정)</span></label>
                        <input type="email" class="form-control" name="notifyEmail"
                               placeholder="example@company.com">
                        <div class="form-text">이메일 발송 기능은 v1.4.0에서 추가될 예정입니다.</div>
                    </div>
                    <button type="submit" class="btn-accent">
                        <i class="fas fa-plus me-2"></i>스케줄 추가
                    </button>
                </form>
            </div>

            <!-- 스케줄 목록 -->
            <div class="panel p-0 overflow-hidden">
                <div style="padding:14px 20px;border-bottom:1px solid var(--border-color);">
                    <span style="font-size:.88rem;font-weight:700;color:var(--text-primary);">
                        <i class="fas fa-list-check me-2" style="color:#f97316"></i>등록된 스케줄
                        <span class="badge" style="background:rgba(249,115,22,.15);color:#f97316;font-size:.7rem;" th:text="${jobs.size()}"></span>
                    </span>
                </div>

                <div th:if="${#lists.isEmpty(jobs)}" style="padding:32px;text-align:center;color:var(--text-muted);font-size:.85rem;">
                    <i class="fas fa-calendar-xmark" style="font-size:2rem;margin-bottom:10px;display:block;opacity:.4;"></i>
                    등록된 스케줄이 없습니다.
                </div>

                <div th:each="job : ${jobs}" class="job-row">
                    <div style="flex:1;min-width:0;">
                        <div class="d-flex align-items-center gap-2 mb-1">
                            <span class="status-dot" th:style="'background:' + ${job.statusColor}"></span>
                            <span class="job-name" th:text="${job.name}"></span>
                            <span class="job-cron" th:text="${job.cronExpression}"></span>
                        </div>
                        <div class="job-sql" th:text="${job.sqlContent}"></div>
                        <div style="font-size:.72rem;color:var(--text-muted);margin-top:4px;">
                            마지막 실행: <span th:text="${job.formattedLastRun}"></span>
                            <span th:if="${job.lastResult != null}" style="margin-left:8px;" th:text="${job.lastResultPreview}"></span>
                        </div>
                    </div>
                    <div class="d-flex gap-2 flex-shrink-0">
                        <button class="btn-job-run"
                                th:attr="data-id=${job.id}"
                                onclick="runJob(this)">
                            <i class="fas fa-play"></i> 즉시 실행
                        </button>
                        <button class="btn-job-action"
                                th:attr="data-id=${job.id},data-enabled=${job.enabled}"
                                onclick="toggleJob(this)">
                            <i th:class="${job.enabled} ? 'fas fa-pause' : 'fas fa-play'"></i>
                            <span th:text="${job.enabled} ? '일시중지' : '재개'"></span>
                        </button>
                        <form method="post" th:action="'/schedule/' + ${job.id} + '/delete'" style="display:inline;" onsubmit="return confirm('삭제하시겠습니까?')">
                            <button type="submit" class="btn-job-delete"><i class="fas fa-trash"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- 즉시 실행 결과 모달 -->
<div id="runResultModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9000;align-items:center;justify-content:center;">
    <div style="background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:12px;padding:24px;max-width:700px;width:90%;max-height:80vh;overflow:auto;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
            <span style="font-weight:700;color:var(--text-primary);"><i class="fas fa-robot me-2" style="color:#22c55e"></i>즉시 실행 결과</span>
            <button onclick="document.getElementById('runResultModal').style.display='none'" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.2rem;">&times;</button>
        </div>
        <div id="runResultContent" style="font-size:.82rem;color:var(--text-muted);white-space:pre-wrap;background:var(--input-bg);border-radius:8px;padding:14px;max-height:400px;overflow:auto;"></div>
    </div>
</div>

<script th:src="@{/js/toolkit.js(v='20250402')}"></script>
<script>
function setCron(val) {
    document.getElementById('cronInput').value = val;
}

function runJob(btn) {
    var id = btn.getAttribute('data-id');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 실행 중...';
    fetch('/schedule/' + id + '/run', { method: 'POST' })
        .then(function(r) { return r.text(); })
        .then(function(result) {
            document.getElementById('runResultContent').textContent = result;
            document.getElementById('runResultModal').style.display = 'flex';
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-play"></i> 즉시 실행';
        })
        .catch(function(e) {
            alert('실행 오류: ' + e.message);
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-play"></i> 즉시 실행';
        });
}

function toggleJob(btn) {
    var id = btn.getAttribute('data-id');
    fetch('/schedule/' + id + '/toggle', { method: 'POST' })
        .then(function() { location.reload(); })
        .catch(function(e) { alert('오류: ' + e.message); });
}
</script>
</body>
</html>
