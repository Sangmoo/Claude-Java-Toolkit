<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>DB 연결 프로필 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css(v='20250403')}" rel="stylesheet">
    <style>
        .profile-card { background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:10px; padding:16px 20px; margin-bottom:12px; transition:border-color .15s; }
        .profile-card.active-profile { border-color:var(--accent); background:var(--accent-subtle); }
        .profile-name { font-size:.95rem; font-weight:600; color:var(--text-primary); }
        .profile-url  { font-size:.75rem; color:var(--text-muted); font-family:monospace; word-break:break-all; }
        .profile-meta { font-size:.72rem; color:var(--text-muted); }
        .active-badge { font-size:.7rem; padding:2px 8px; border-radius:10px; background:var(--accent); color:#fff; font-weight:600; }
    </style>
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <main class="main-area">
        <div class="top-bar">
            <span class="top-bar-title">
                <i class="fas fa-database me-2" style="color:#3b82f6"></i>DB 연결 프로필
            </span>
            <button id="themeToggle" onclick="toggleTheme()">
                <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
            </button>
        </div>

        <div class="main-content">
            <p class="page-subtitle">여러 Oracle DB 연결 정보를 저장하고 원클릭으로 전환할 수 있습니다.</p>

            <div th:if="${param.applied}" class="alert alert-success mb-3" style="font-size:.85rem;">
                <i class="fas fa-check-circle me-2"></i>DB 프로필이 적용되었습니다. 현재 활성 연결이 변경되었습니다.
            </div>

            <div class="row g-4">
                <!-- ── Add Profile Form ── -->
                <div class="col-lg-4">
                    <div class="panel p-4">
                        <h6 class="mb-3" style="color:var(--text-sub);">
                            <i class="fas fa-plus-circle me-2" style="color:var(--accent)"></i>프로필 추가
                        </h6>
                        <form method="post" action="/db-profiles/save" id="addForm">
                            <div class="mb-2">
                                <label class="form-label" style="font-size:.8rem;">프로필 이름 *</label>
                                <input type="text" name="name" class="form-control form-control-sm"
                                       placeholder="예: 개발 DB, 스테이징 DB" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label" style="font-size:.8rem;">JDBC URL *</label>
                                <input type="text" name="url" class="form-control form-control-sm"
                                       placeholder="jdbc:oracle:thin:@host:1521:SID" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label" style="font-size:.8rem;">사용자명 *</label>
                                <input type="text" name="username" class="form-control form-control-sm"
                                       placeholder="SCOTT" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label" style="font-size:.8rem;">비밀번호 *</label>
                                <input type="password" name="password" class="form-control form-control-sm"
                                       placeholder="비밀번호" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" style="font-size:.8rem;">메모 (선택)</label>
                                <input type="text" name="description" class="form-control form-control-sm"
                                       placeholder="환경 설명">
                            </div>
                            <button type="submit" class="btn btn-accent w-100">
                                <i class="fas fa-save me-2"></i>프로필 저장
                            </button>
                        </form>
                    </div>
                </div>

                <!-- ── Profile List ── -->
                <div class="col-lg-8">
                    <div class="panel p-4">
                        <h6 class="mb-3" style="color:var(--text-sub);">
                            <i class="fas fa-list me-2" style="color:#8b5cf6"></i>저장된 프로필
                            <span th:text="'(' + ${#lists.size(profiles)} + ')'"></span>
                        </h6>

                        <div th:if="${#lists.isEmpty(profiles)}" class="result-empty" style="padding:40px 20px;">
                            <i class="fas fa-database fa-2x" style="color:var(--border-color);"></i>
                            <span>저장된 프로필이 없습니다. 왼쪽에서 프로필을 추가하세요.</span>
                        </div>

                        <div th:each="p : ${profiles}">
                            <div class="profile-card"
                                 th:classappend="${p.url == currentUrl} ? 'active-profile' : ''">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div class="flex-grow-1">
                                        <div class="d-flex align-items-center gap-2 mb-1">
                                            <span class="profile-name" th:text="${p.name}"></span>
                                            <span th:if="${p.url == currentUrl}" class="active-badge">
                                                <i class="fas fa-circle" style="font-size:.45rem;"></i> 활성
                                            </span>
                                        </div>
                                        <div class="profile-url mb-1" th:text="${p.maskedUrl}"></div>
                                        <div class="d-flex gap-3">
                                            <span class="profile-meta"><i class="fas fa-user me-1"></i><span th:text="${p.username}"></span></span>
                                            <span class="profile-meta" th:if="${p.description != null and !p.description.isEmpty()}" th:text="${p.description}"></span>
                                            <span class="profile-meta"><i class="fas fa-clock me-1"></i><span th:text="${p.formattedDate}"></span></span>
                                        </div>
                                    </div>
                                    <div class="d-flex gap-1 ms-3 flex-shrink-0">
                                        <form th:unless="${p.url == currentUrl}" method="post"
                                              th:action="@{/db-profiles/{id}/apply(id=${p.id})}">
                                            <button type="submit" class="btn btn-accent btn-sm"
                                                    onclick="return confirm('이 프로필로 DB 연결을 전환하시겠습니까?')">
                                                <i class="fas fa-plug me-1"></i>적용
                                            </button>
                                        </form>
                                        <button type="button" class="copy-btn" style="font-size:.75rem;"
                                                th:attr="onclick='openEditModal(' + ${p.id} + ')'">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <form method="post" th:action="@{/db-profiles/{id}/delete(id=${p.id})}"
                                              style="display:inline;">
                                            <button type="submit" class="copy-btn"
                                                    style="font-size:.75rem;color:#ef4444;"
                                                    onclick="return confirm('이 프로필을 삭제하시겠습니까?')">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content" style="background:var(--bg-secondary);border:1px solid var(--border-color);">
            <div class="modal-header" style="border-color:var(--border-color);">
                <h6 class="modal-title" style="color:var(--text-primary);">
                    <i class="fas fa-edit me-2" style="color:var(--accent)"></i>프로필 편집
                </h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal" style="filter:invert(.5)"></button>
            </div>
            <form id="editForm" method="post">
                <div class="modal-body">
                    <div class="mb-2">
                        <label class="form-label" style="font-size:.8rem;">프로필 이름</label>
                        <input type="text" name="name" id="editName" class="form-control form-control-sm" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label" style="font-size:.8rem;">JDBC URL</label>
                        <input type="text" name="url" id="editUrl" class="form-control form-control-sm" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label" style="font-size:.8rem;">사용자명</label>
                        <input type="text" name="username" id="editUsername" class="form-control form-control-sm" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label" style="font-size:.8rem;">비밀번호 (변경 시만 입력)</label>
                        <input type="password" name="password" id="editPassword" class="form-control form-control-sm" placeholder="빈칸이면 기존 비밀번호 유지">
                    </div>
                    <div class="mb-2">
                        <label class="form-label" style="font-size:.8rem;">메모</label>
                        <input type="text" name="description" id="editDescription" class="form-control form-control-sm">
                    </div>
                </div>
                <div class="modal-footer" style="border-color:var(--border-color);">
                    <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">취소</button>
                    <button type="submit" class="btn btn-accent btn-sm">
                        <i class="fas fa-save me-1"></i>저장
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/toolkit.js(v='20250403')}"></script>
<script>
    function openEditModal(id) {
        fetch('/db-profiles/' + id + '/json')
            .then(function(r){ return r.json(); })
            .then(function(p) {
                document.getElementById('editName').value        = p.name        || '';
                document.getElementById('editUrl').value         = p.url         || '';
                document.getElementById('editUsername').value    = p.username    || '';
                document.getElementById('editPassword').value    = '';
                document.getElementById('editDescription').value = p.description || '';
                document.getElementById('editForm').action = '/db-profiles/' + id + '/update';
                var modal = new bootstrap.Modal(document.getElementById('editModal'));
                modal.show();
            });
    }
</script>
</body>
</html>
