<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>Git 로컬 Diff 분석 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="/webjars/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css(v='20250329')}" rel="stylesheet">
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <main class="main-area">
        <!-- Top bar -->
        <div class="top-bar">
            <span class="top-bar-title"><i class="fab fa-git-alt me-2" style="color:#f97316"></i>Git 로컬 Diff 분석</span>
            <button id="themeToggle" onclick="toggleTheme()">
                <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
            </button>
        </div>

        <!-- Spinner -->
        <div class="spinner-overlay" id="spinner">
            <div class="text-center">
                <div class="spinner-border text-warning mb-3" style="width:3rem;height:3rem;"></div>
                <div class="spinner-msg" id="spinnerMsg">Claude가 diff를 분석 중입니다...</div>
            </div>
        </div>

        <div class="main-content">
            <p class="page-subtitle">로컬 Git 저장소의 커밋 간 diff를 가져와 AI 코드 리뷰를 실행합니다.</p>

            <div class="row g-3">
                <!-- Left Panel -->
                <div class="col-lg-5">
                    <div class="panel p-3">
                        <label class="section-label"><i class="fas fa-folder-open me-1"></i>저장소 경로</label>
                        <div class="d-flex gap-2 mb-2">
                            <input type="text" class="form-control form-control-sm" id="repoPath"
                                   placeholder="C:/workspace/my-project">
                            <button class="btn-accent" style="white-space:nowrap;" onclick="loadCommits()">
                                <i class="fas fa-list me-1"></i>커밋 로드
                            </button>
                        </div>

                        <div class="row g-2 mb-2">
                            <div class="col-6">
                                <label class="section-label"><i class="fas fa-arrow-right me-1"></i>From 커밋</label>
                                <select class="form-select form-select-sm" id="fromCommit">
                                    <option value="">커밋을 로드하세요</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="section-label"><i class="fas fa-arrow-left me-1"></i>To 커밋</label>
                                <select class="form-select form-select-sm" id="toCommit">
                                    <option value="">커밋을 로드하세요</option>
                                </select>
                            </div>
                        </div>

                        <button class="btn-accent mb-3" onclick="loadDiff()">
                            <i class="fas fa-code-compare me-1"></i>Diff 가져오기
                        </button>

                        <label class="section-label"><i class="fas fa-file-code me-1"></i>Diff 미리보기</label>
                        <textarea class="form-control" id="diffPreview" rows="12" readonly
                                  style="font-family:monospace;font-size:0.82rem;"
                                  placeholder="커밋 간 diff가 여기에 표시됩니다..."></textarea>
                    </div>
                </div>

                <!-- Right Panel -->
                <div class="col-lg-7">
                    <div class="panel p-3" style="min-height:100%;">
                        <div id="emptyState"
                             class="d-flex flex-column align-items-center justify-content-center"
                             style="min-height:340px;color:var(--text-muted);">
                            <i class="fab fa-git-alt mb-3" style="font-size:2.5rem;opacity:0.25;"></i>
                            <p class="mb-0" style="font-size:0.9rem;">커밋을 선택하고 diff를 가져온 후 AI 리뷰를 실행하세요</p>
                        </div>

                        <div id="resultArea" style="display:none;">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="section-label mb-0"><i class="fas fa-robot me-1"></i>AI 리뷰 결과</span>
                                <button class="copy-btn" onclick="copyReview()">
                                    <i class="fas fa-copy me-1"></i>복사
                                </button>
                            </div>
                            <div class="markdown-body" id="reviewResult"></div>
                        </div>

                        <div class="mt-3">
                            <button class="btn-accent" id="btnAnalyze" disabled onclick="analyzeGitDiff()">
                                <i class="fas fa-wand-magic-sparkles me-1"></i>AI 리뷰 실행
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="/webjars/marked/9.1.6/marked.min.js"></script>
<script th:src="@{/js/toolkit.js(v='20250409')}"></script>
<script>
    var _reviewText = '';

    function escHtml(s) {
        var d = document.createElement('div');
        d.appendChild(document.createTextNode(s));
        return d.innerHTML;
    }

    function loadCommits() {
        var repoPath = document.getElementById('repoPath').value.trim();
        if (!repoPath) { showToast('저장소 경로를 입력하세요.', 'warning'); return; }

        var sp = document.getElementById('spinner');
        if (sp) { document.getElementById('spinnerMsg').textContent = '커밋 목록을 로드하는 중...'; sp.classList.add('active'); }

        fetch('/git-diff/commits', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ repoPath: repoPath })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (sp) sp.classList.remove('active');
            if (data.error) { showToast(data.error, 'warning'); return; }

            var fromSel = document.getElementById('fromCommit');
            var toSel   = document.getElementById('toCommit');
            fromSel.innerHTML = '';
            toSel.innerHTML   = '';

            var commits = data.commits || [];
            commits.forEach(function(c) {
                var text = c.shortHash + ' - ' + c.message + ' (' + c.author + ')';
                var opt1 = document.createElement('option');
                opt1.value = c.hash;
                opt1.textContent = text;
                fromSel.appendChild(opt1);

                var opt2 = document.createElement('option');
                opt2.value = c.hash;
                opt2.textContent = text;
                toSel.appendChild(opt2);
            });

            if (commits.length > 1) {
                fromSel.selectedIndex = 1;
                toSel.selectedIndex   = 0;
            }
        })
        .catch(function(err) {
            if (sp) sp.classList.remove('active');
            showToast('오류: ' + err.message, 'warning');
        });
    }

    function loadDiff() {
        var repoPath   = document.getElementById('repoPath').value.trim();
        var fromCommit = document.getElementById('fromCommit').value;
        var toCommit   = document.getElementById('toCommit').value;
        if (!repoPath)   { showToast('저장소 경로를 입력하세요.', 'warning'); return; }
        if (!fromCommit || !toCommit) { showToast('From / To 커밋을 선택하세요.', 'warning'); return; }

        var sp = document.getElementById('spinner');
        if (sp) { document.getElementById('spinnerMsg').textContent = 'Diff를 가져오는 중...'; sp.classList.add('active'); }

        fetch('/git-diff/diff', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ repoPath: repoPath, fromCommit: fromCommit, toCommit: toCommit })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (sp) sp.classList.remove('active');
            if (data.error) { showToast(data.error, 'warning'); return; }
            document.getElementById('diffPreview').value = data.diff || '';
            document.getElementById('btnAnalyze').disabled = false;
        })
        .catch(function(err) {
            if (sp) sp.classList.remove('active');
            showToast('오류: ' + err.message, 'warning');
        });
    }

    function analyzeGitDiff() {
        var diff = document.getElementById('diffPreview').value.trim();
        if (!diff) { showToast('Diff가 비어 있습니다.', 'warning'); return; }

        var sp = document.getElementById('spinner');
        if (sp) { document.getElementById('spinnerMsg').textContent = 'Claude가 diff를 분석 중입니다...'; sp.classList.add('active'); }

        fetch('/git-diff/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ diff: diff })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (sp) sp.classList.remove('active');
            if (data.error) { showToast(data.error, 'warning'); return; }
            _reviewText = data.review || '';
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('resultArea').style.display = '';
            document.getElementById('reviewResult').innerHTML = marked.parse(_reviewText);
        })
        .catch(function(err) {
            if (sp) sp.classList.remove('active');
            showToast('오류: ' + err.message, 'warning');
        });
    }

    function copyReview() {
        if (!_reviewText) return;
        navigator.clipboard.writeText(_reviewText).then(function() {
            var btn = document.querySelector('[onclick="copyReview()"]');
            if (btn) { var orig = btn.innerHTML; btn.innerHTML = '<i class="fas fa-check me-1"></i>복사됨'; setTimeout(function(){ btn.innerHTML = orig; }, 1500); }
        }).catch(function() {
            var ta = document.createElement('textarea'); ta.value = _reviewText;
            document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        });
    }
</script>
</body>
</html>
