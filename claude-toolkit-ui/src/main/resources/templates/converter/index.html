<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>코드 변환 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css(v='20250329')}" rel="stylesheet">
    <style>
        .src-toggle-btn { background:none; border:1px solid var(--border-color); color:var(--text-sub);
                          padding:4px 12px; border-radius:8px; font-size:.78rem; cursor:pointer;
                          display:inline-flex; align-items:center; gap:5px; transition:all .15s; }
        .src-toggle-btn:hover { border-color:var(--accent); color:var(--accent); }
        .src-toggle-btn.open  { border-color:var(--accent); color:var(--accent); background:var(--accent-subtle); }
        .src-sel-panel { border:1px solid var(--border-color); border-radius:8px; overflow:hidden;
                         margin-bottom:8px; background:var(--bg-secondary); }
        .src-sel-header { padding:6px 12px; background:var(--bg-secondary);
                          border-bottom:1px solid var(--border-color);
                          display:flex; align-items:center; justify-content:space-between; }
        .src-sel-tab { background:none; border:none; color:var(--text-muted); padding:4px 12px;
                       border-radius:16px; cursor:pointer; font-size:.75rem; font-weight:500; transition:all .15s; }
        .src-sel-tab.active { background:var(--accent-subtle); color:var(--accent); font-weight:600; }
        .src-sel-list { max-height:180px; overflow-y:auto; }
        .src-sel-item { display:flex; align-items:center; gap:7px; padding:6px 12px;
                        cursor:pointer; font-size:.78rem; border-bottom:1px solid var(--border-color); transition:background .1s; }
        .src-sel-item:last-child { border-bottom:none; }
        .src-sel-item:hover    { background:var(--accent-subtle); }
        .src-sel-item.selected { background:var(--accent-subtle); border-left:3px solid var(--accent); font-weight:600; }
        .src-sel-status { font-size:.7rem; color:var(--text-muted); padding:3px 12px;
                          border-bottom:1px solid var(--border-color); }
        .src-sel-bar { background:var(--accent-subtle); border:1px solid var(--accent);
                       border-radius:6px; padding:4px 10px; font-size:.75rem; color:var(--accent);
                       display:flex; align-items:center; gap:6px; margin-bottom:6px; }
        .src-badge { font-size:.62rem; font-weight:700; padding:1px 5px; border-radius:8px; }
        .src-badge-procedure { background:rgba(249,115,22,.15); color:#f97316; }
        .src-badge-function  { background:rgba(59,130,246,.15);  color:#3b82f6; }
        .src-badge-package   { background:rgba(139,92,246,.15);  color:#8b5cf6; }
        .src-badge-trigger   { background:rgba(239,68,68,.15);   color:#ef4444; }
        @keyframes spin-s { to { transform:rotate(360deg); } }
        .spin-s { display:inline-block; animation:spin-s .8s linear infinite; }
    </style>
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <main class="main-area">
        <!-- Top bar -->
        <div class="top-bar">
            <span class="top-bar-title"><i class="fas fa-exchange-alt me-2" style="color:#f97316"></i>코드 변환</span>
            <button id="themeToggle" onclick="toggleTheme()">
                <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
            </button>
        </div>

        <!-- Spinner -->
        <div class="spinner-overlay" id="spinner">
            <div class="text-center">
                <div class="spinner-border text-warning mb-3" style="width:3rem;height:3rem;"></div>
                <div class="spinner-msg" id="spinnerMsg">분석 중...</div>
            </div>
        </div>

        <div class="main-content">
            <p class="page-subtitle">Oracle SP/SQL ↔ Java/Spring + MyBatis 코드를 양방향으로 자동 변환합니다.</p>

            <div th:if="${error}" class="alert alert-danger mb-3" th:text="${error}"></div>

            <div class="row g-4">
                <!-- Input -->
                <div class="col-lg-6">
                    <div class="panel p-4">
                        <form method="post" action="/converter/convert" id="convForm"
                              onsubmit="var sc=this.querySelector('[name=sourceCode]'); if(!sc||!sc.value.trim()){alert('소스 코드를 입력하세요.');return false;} showSpinner(['코드 파싱 중...','변환 로직 분석 중...','코드 생성 중...','파일 구조 작성 중...'])">
                            <div class="mb-3">
                                <label class="form-label">변환 대상</label>
                                <select class="form-select" name="targetType" id="targetTypeSelect" onchange="updateConverterHint()">
                                    <option value="java"       th:selected="${targetType == 'java' or targetType == null}">Oracle SP → Java/Spring + MyBatis</option>
                                    <option value="mybatis"    th:selected="${targetType == 'mybatis'}">Oracle SQL → MyBatis XML</option>
                                    <option value="ibatis"     th:selected="${targetType == 'ibatis'}">iBatis XML → MyBatis XML</option>
                                    <option value="java_to_sp" th:selected="${targetType == 'java_to_sp'}">Java/Spring + MyBatis → Oracle SP</option>
                                </select>
                            </div>
                            <!-- Source selector -->
                            <div class="mb-2">
                                <div class="d-flex align-items-center gap-2 mb-1">
                                    <button type="button" class="src-toggle-btn" id="cSrcToggle" onclick="cToggleSrc()">
                                        <i class="fas fa-folder-open"></i>소스 선택하기
                                        <i class="fas fa-chevron-down" id="cSrcChev" style="font-size:.6rem;transition:transform .15s;"></i>
                                    </button>
                                    <button type="button" class="src-toggle-btn" onclick="cRefreshCache()" title="캐시 갱신">
                                        <i class="fas fa-sync-alt"></i>
                                    </button>
                                </div>
                                <div id="cSelectedBar" style="display:none;" class="src-sel-bar">
                                    <i class="fas fa-check-circle"></i>
                                    <span id="cSelectedName"></span>
                                    <button type="button" onclick="cClearSrc()" style="background:none;border:none;color:var(--accent);margin-left:auto;cursor:pointer;font-size:.7rem;padding:0;">
                                        <i class="fas fa-times"></i> 해제
                                    </button>
                                </div>
                                <div id="cSrcPanel" class="src-sel-panel" style="display:none;">
                                    <div class="src-sel-header">
                                        <div class="d-flex gap-1">
                                            <button type="button" class="src-sel-tab active" id="cTabFiles" onclick="cSwitchTab('files')">
                                                <i class="fab fa-java me-1"></i>Java 파일
                                            </button>
                                            <button type="button" class="src-sel-tab" id="cTabDb" onclick="cSwitchTab('db')">
                                                <i class="fas fa-database me-1"></i>DB 오브젝트
                                            </button>
                                        </div>
                                        <button type="button" onclick="cToggleSrc()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;">
                                            <i class="fas fa-times" style="font-size:.7rem;"></i>
                                        </button>
                                    </div>
                                    <div id="cPanelFiles">
                                        <div class="p-2">
                                            <input type="text" id="cFileSearch" class="form-control form-control-sm"
                                                   placeholder="클래스명·경로 검색..." oninput="cOnFileSearch(this.value)" autocomplete="off">
                                        </div>
                                        <div class="src-sel-status" id="cFileStatus"><i class="fas fa-spinner spin-s me-1"></i>로딩 중...</div>
                                        <div class="src-sel-list" id="cFileList">
                                            <div class="src-sel-item" style="justify-content:center;color:var(--text-muted);">
                                                <i class="fas fa-circle-notch spin-s me-2"></i>파일 목록 로딩 중...
                                            </div>
                                        </div>
                                    </div>
                                    <div id="cPanelDb" style="display:none;">
                                        <div class="p-2 d-flex gap-2">
                                            <input type="text" id="cDbSearch" class="form-control form-control-sm"
                                                   placeholder="오브젝트명 검색..." oninput="cOnDbSearch(this.value)" autocomplete="off" style="flex:1;">
                                            <select id="cDbType" class="form-select form-select-sm" style="width:120px;"
                                                    onchange="cOnDbSearch(document.getElementById('cDbSearch').value)">
                                                <option value="">전체</option>
                                                <option value="PROCEDURE">PROCEDURE</option>
                                                <option value="FUNCTION">FUNCTION</option>
                                                <option value="PACKAGE">PACKAGE</option>
                                                <option value="TRIGGER">TRIGGER</option>
                                            </select>
                                        </div>
                                        <div class="src-sel-status" id="cDbStatus"><i class="fas fa-spinner spin-s me-1"></i>로딩 중...</div>
                                        <div class="src-sel-list" id="cDbList">
                                            <div class="src-sel-item" style="justify-content:center;color:var(--text-muted);">
                                                <i class="fas fa-circle-notch spin-s me-2"></i>DB 오브젝트 로딩 중...
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label" id="sourceLabel">소스 코드</label>
                                <textarea class="form-control" name="sourceCode" rows="18"
                                          id="sourceCodeArea"
                                          placeholder="CREATE OR REPLACE PROCEDURE SP_ORDER_LIST ..."
                                          th:text="${sourceCode}"></textarea>
                            </div>
                            <button type="submit" class="btn btn-accent w-100">
                                <i class="fas fa-exchange-alt me-2"></i>변환 실행
                            </button>
                        </form>
                        <hr class="divider my-3">
                        <form method="post" action="/converter/convert/file" enctype="multipart/form-data">
                            <input type="hidden" name="targetType" id="fileTargetType"
                                   th:value="${targetType != null ? targetType : 'java'}">
                            <div class="input-group">
                                <input type="file" class="form-control form-control-sm" name="file"
                                       accept=".sql,.pls,.pck,.xml,.java">
                                <button class="btn btn-outline-tk btn-sm" type="submit" onclick="syncFileTargetType();showSpinner(['파일 처리 중...'])">
                                    <i class="fas fa-upload me-1"></i>파일 업로드
                                </button>
                            </div>
                            <p class="upload-hint mt-1" id="fileHint">지원: .sql, .pls, .pck, .xml / Java→SP 모드: .java, .xml</p>
                        </form>
                    </div>
                </div>

                <!-- Result -->
                <div class="col-lg-6">
                    <div class="panel p-4 h-100">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span class="result-meta">변환 결과</span>
                            <div class="d-flex gap-2">
                                <button th:if="${result}" id="newTabBtn" class="copy-btn" onclick="openInNewTab('resultRaw')">
                                    <i class="fas fa-external-link-alt me-1"></i>새 탭
                                </button>
                                <button th:if="${result}" id="copyBtn" class="copy-btn" onclick="copyToClipboard('resultRaw')">
                                    <i class="fas fa-copy me-1"></i>복사
                                </button>
                                <form th:if="${result}" method="post" action="/converter/download" style="display:inline;">
                                    <input type="hidden" name="sourceCode"  th:value="${sourceCode}">
                                    <input type="hidden" name="targetType"  th:value="${targetType}">
                                    <button type="submit" class="btn btn-outline-tk btn-sm">
                                        <i class="fas fa-download me-1"></i>다운로드
                                    </button>
                                </form>
                            </div>
                        </div>
                        <div th:if="${result}" class="result-box result-raw" id="resultRaw"
                             th:text="${result}"></div>
                        <div th:unless="${result}" class="result-box result-empty">
                            <i class="fas fa-exchange-alt fa-2x" style="color:var(--border-color)"></i>
                            <span>코드를 입력하고 변환을 실행하세요.</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/toolkit.js(v='20250409')}"></script>
<script>
    var HINTS = {
        java:       { label: 'Oracle PL/SQL / SP 소스', placeholder: 'CREATE OR REPLACE PROCEDURE SP_ORDER_LIST ...' },
        mybatis:    { label: 'Oracle SQL 소스',          placeholder: 'SELECT * FROM T_ORDER WHERE ...' },
        ibatis:     { label: 'iBatis Mapper XML 소스', placeholder: '<sqlMap namespace="order">\n  <select id="selectOrderList" resultClass="com.example.OrderVO">\n    SELECT * FROM T_ORDER WHERE CUST_ID = #custId#\n  </select>\n</sqlMap>' },
        java_to_sp: { label: 'Java/Spring + MyBatis 소스', placeholder: '@Service\npublic class OrderService {\n    public List<OrderVO> getOrderList(OrderVO vo) { ... }\n}' }
    };

    function updateConverterHint() {
        var type = document.getElementById('targetTypeSelect').value;
        var hint = HINTS[type] || HINTS['java'];
        document.getElementById('sourceLabel').textContent = hint.label;
        document.getElementById('sourceCodeArea').placeholder = hint.placeholder;
    }

    function syncFileTargetType() {
        document.getElementById('fileTargetType').value =
            document.getElementById('targetTypeSelect').value;
    }

    // Init on page load
    updateConverterHint();

    /* ── 소스 선택기 ── */
    var cSrcOpen = false, cTabState = 'files';
    var cAllFiles = [], cAllDbObjs = [], cFileLoaded = false, cDbLoaded = false;
    var cCurSource = '';

    function cToggleSrc() {
        cSrcOpen = !cSrcOpen;
        document.getElementById('cSrcPanel').style.display = cSrcOpen ? '' : 'none';
        document.getElementById('cSrcToggle').classList.toggle('open', cSrcOpen);
        document.getElementById('cSrcChev').style.transform = cSrcOpen ? 'rotate(180deg)' : '';
        if (cSrcOpen && !cFileLoaded) cLoadFiles();
        if (cSrcOpen && !cDbLoaded)   cLoadDb();
    }
    function cRefreshCache() {
        cFileLoaded = false; cDbLoaded = false; cAllFiles = []; cAllDbObjs = [];
        cLoadFiles(); cLoadDb();
    }
    function cSwitchTab(tab) {
        cTabState = tab;
        document.getElementById('cPanelFiles').style.display = tab === 'files' ? '' : 'none';
        document.getElementById('cPanelDb').style.display    = tab === 'db'    ? '' : 'none';
        document.getElementById('cTabFiles').classList.toggle('active', tab === 'files');
        document.getElementById('cTabDb').classList.toggle('active',    tab === 'db');
    }
    function cEsc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function cLoadFiles() {
        cFileLoaded = true;
        document.getElementById('cFileStatus').innerHTML = '<i class="fas fa-spinner spin-s me-1"></i>로딩 중...';
        fetch('/harness/cache/files?q=').then(function(r){return r.json();}).then(function(d){
            cAllFiles = d.files || [];
            document.getElementById('cFileStatus').textContent = d.loaded ? '파일 ' + cAllFiles.length + '개' : '캐시 준비 중...';
            cRenderFiles(cAllFiles);
        }).catch(function(){
            document.getElementById('cFileStatus').textContent = '로드 실패 (Settings > 프로젝트 경로 설정)';
        });
    }
    function cOnFileSearch(q) {
        var f = q.trim() ? cAllFiles.filter(function(f){ return (f.relativePath||'').toLowerCase().indexOf(q.toLowerCase())>=0||(f.fileName||'').toLowerCase().indexOf(q.toLowerCase())>=0; }) : cAllFiles;
        cRenderFiles(f);
    }
    function cRenderFiles(list) {
        var el = document.getElementById('cFileList');
        if (!list || !list.length) { el.innerHTML = '<div class="src-sel-item" style="color:var(--text-muted);justify-content:center;">결과 없음</div>'; return; }
        el.innerHTML = list.map(function(f){
            var sel = f.fileName === cCurSource ? ' selected' : '';
            return '<div class="src-sel-item'+sel+'" data-abs="'+cEsc(f.absolutePath||'')+'" data-name="'+cEsc(f.fileName||'')+'" onclick="cSelectFile(this)">'
                 + '<i class="fab fa-java" style="color:#f97316;flex-shrink:0;"></i>'
                 + '<span style="font-weight:500;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+cEsc(f.fileName||'')+'</span>'
                 + '<span style="color:var(--text-muted);font-size:.7rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+cEsc(f.relativePath||'')+'</span>'
                 + '</div>';
        }).join('');
    }
    function cSelectFile(el) {
        document.querySelectorAll('#cFileList .src-sel-item').forEach(function(i){i.classList.remove('selected');});
        el.classList.add('selected');
        var abs = el.getAttribute('data-abs'), name = el.getAttribute('data-name');
        if (!abs) return;
        el.style.opacity = '0.6';
        fetch('/harness/cache/file-content?path='+encodeURIComponent(abs)).then(function(r){return r.json();}).then(function(d){
            el.style.opacity='';
            if (!d.success){ alert(d.error||'파일 로드 실패'); return; }
            document.getElementById('sourceCodeArea').value = d.content || '';
            cSetSrc(name);
        }).catch(function(){ el.style.opacity=''; alert('파일 내용을 불러올 수 없습니다.'); });
    }

    function cLoadDb() {
        cDbLoaded = true;
        document.getElementById('cDbStatus').innerHTML = '<i class="fas fa-spinner spin-s me-1"></i>로딩 중...';
        fetch('/harness/cache/db-objects?q=&type=').then(function(r){return r.json();}).then(function(d){
            cAllDbObjs = d.objects || [];
            document.getElementById('cDbStatus').textContent = d.configured ? 'DB 오브젝트 ' + cAllDbObjs.length + '개' : 'DB 미설정 (Settings > DB 프로필)';
            cRenderDb(cAllDbObjs);
        }).catch(function(){
            document.getElementById('cDbStatus').textContent = '로드 실패';
        });
    }
    function cOnDbSearch(q) {
        var tf = document.getElementById('cDbType').value;
        var f  = cAllDbObjs.filter(function(o){
            return (!q.trim()||(o.name||'').toLowerCase().indexOf(q.toLowerCase())>=0) && (!tf||(o.type||'').toUpperCase()===tf);
        });
        cRenderDb(f);
    }
    function cRenderDb(list) {
        var el = document.getElementById('cDbList');
        if (!list || !list.length) { el.innerHTML = '<div class="src-sel-item" style="color:var(--text-muted);justify-content:center;">결과 없음</div>'; return; }
        el.innerHTML = list.map(function(o){
            var t = (o.type||'').toUpperCase(), sel = o.name===cCurSource?' selected':'';
            return '<div class="src-sel-item'+sel+'" data-name="'+cEsc(o.name||'')+'" data-type="'+cEsc(t)+'" onclick="cSelectDb(this)">'
                 + '<i class="fas fa-database" style="color:#3b82f6;flex-shrink:0;"></i>'
                 + '<span style="font-weight:500;">'+cEsc(o.name||'')+'</span>'
                 + '<span class="src-badge src-badge-'+t.toLowerCase()+'">'+t+'</span>'
                 + '</div>';
        }).join('');
    }
    function cSelectDb(el) {
        document.querySelectorAll('#cDbList .src-sel-item').forEach(function(i){i.classList.remove('selected');});
        el.classList.add('selected');
        var name = el.getAttribute('data-name'), type = el.getAttribute('data-type');
        if (!name) return;
        el.style.opacity = '0.6';
        fetch('/harness/cache/db-source?name='+encodeURIComponent(name)+'&type='+encodeURIComponent(type)).then(function(r){return r.json();}).then(function(d){
            el.style.opacity='';
            if (!d.success){ alert(d.error||'DB 소스 로드 실패'); return; }
            document.getElementById('sourceCodeArea').value = d.source || '';
            cSetSrc(name);
        }).catch(function(){ el.style.opacity=''; alert('DB 오브젝트 소스를 불러올 수 없습니다.'); });
    }
    function cSetSrc(name) {
        cCurSource = name;
        if (name) {
            document.getElementById('cSelectedName').textContent = name;
            document.getElementById('cSelectedBar').style.display = 'flex';
        } else {
            document.getElementById('cSelectedBar').style.display = 'none';
        }
    }
    function cClearSrc() {
        cSetSrc('');
        document.querySelectorAll('.src-sel-item.selected').forEach(function(el){el.classList.remove('selected');});
        document.getElementById('sourceCodeArea').value = '';
    }
</script>
</body>
</html>
