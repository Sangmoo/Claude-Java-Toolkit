<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>비밀번호 변경 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css(v='20250409')}" rel="stylesheet">
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>
    <main class="main-area">
        <div class="top-bar">
            <span class="top-bar-title"><i class="fas fa-key me-2" style="color:#f97316"></i>비밀번호 변경</span>
            <button id="themeToggle" onclick="toggleTheme()">
                <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
            </button>
        </div>
        <div class="main-content">
            <div style="max-width:420px;margin:40px auto;">
                <div class="panel p-4">
                    <div style="text-align:center;margin-bottom:20px;">
                        <i class="fas fa-user-lock" style="color:var(--accent);font-size:2rem;"></i>
                        <h5 style="font-size:1rem;font-weight:700;margin-top:10px;">비밀번호 변경</h5>
                        <p style="font-size:.78rem;color:var(--text-muted);" th:text="'로그인 계정: ' + ${#request.remoteUser}"></p>
                    </div>
                    <div id="mustChangeAlert" style="display:none;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 14px;margin-bottom:16px;">
                        <p style="font-size:.82rem;color:#ef4444;margin:0;">
                            <i class="fas fa-exclamation-triangle me-1"></i>
                            <b>보안을 위해 초기 비밀번호를 반드시 변경해야 합니다.</b><br>
                            대문자, 소문자, 숫자, 특수문자를 각 1개 이상 포함한 8자 이상의 비밀번호를 설정하세요.
                        </p>
                    </div>
                    <div class="mb-3">
                        <label style="font-size:.82rem;color:var(--text-sub);">현재 비밀번호</label>
                        <input type="password" id="currentPw" class="form-control" style="font-size:.88rem;" placeholder="현재 비밀번호">
                    </div>
                    <div class="mb-3">
                        <label style="font-size:.82rem;color:var(--text-sub);">새 비밀번호</label>
                        <input type="password" id="newPw" class="form-control" style="font-size:.88rem;" placeholder="새 비밀번호 (8자 이상, 대/소/숫자/특수문자 포함)">
                    </div>
                    <div class="mb-4">
                        <label style="font-size:.82rem;color:var(--text-sub);">새 비밀번호 확인</label>
                        <input type="password" id="confirmPw" class="form-control" style="font-size:.88rem;" placeholder="새 비밀번호 재입력">
                    </div>
                    <button class="btn-accent w-100" style="padding:10px;" onclick="changePassword()">
                        <i class="fas fa-save me-1"></i>비밀번호 변경
                    </button>
                    <div id="result" style="font-size:.82rem;margin-top:10px;text-align:center;"></div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/toolkit.js(v='20250409')}"></script>
<script>
// mustChange 파라미터 있으면 경고 표시
if (window.location.search.indexOf('mustChange') >= 0) {
    var alertEl = document.getElementById('mustChangeAlert');
    if (alertEl) alertEl.style.display = '';
}

function changePassword() {
    var cur     = document.getElementById('currentPw').value;
    var newPw   = document.getElementById('newPw').value;
    var confirm = document.getElementById('confirmPw').value;
    if (!cur) { showToast('현재 비밀번호를 입력하세요.', 'warning'); return; }
    if (!newPw || newPw.length < 8) { showToast('새 비밀번호는 8자 이상이어야 합니다.', 'warning'); return; }
    if (newPw !== confirm) { showToast('새 비밀번호가 일치하지 않습니다.', 'warning'); return; }
    var fd = new URLSearchParams();
    fd.append('currentPassword', cur); fd.append('newPassword', newPw);
    fetch('/account/change-password', {method:'POST', body:fd})
        .then(function(r){ return r.json(); })
        .then(function(d){
            var el = document.getElementById('result');
            if (d.success) {
                el.innerHTML = '<span style="color:#10b981;"><i class="fas fa-check-circle me-1"></i>비밀번호가 변경되었습니다.</span>';
                document.getElementById('currentPw').value = '';
                document.getElementById('newPw').value = '';
                document.getElementById('confirmPw').value = '';
                // 강제 변경 상태였으면 메인으로 이동
                if (window.location.search.indexOf('mustChange') >= 0) {
                    setTimeout(function(){ window.location.href = '/'; }, 800);
                }
            } else {
                el.innerHTML = '<span style="color:#ef4444;"><i class="fas fa-times-circle me-1"></i>' + (d.error||'변경 실패') + '</span>';
            }
        });
}
</script>
</body>
</html>
