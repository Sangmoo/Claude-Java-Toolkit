<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>Mock 데이터 생성 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="/webjars/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="/webjars/prismjs/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css(v='20250329')}" rel="stylesheet">
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <main class="main-area">
        <div class="top-bar">
            <span class="top-bar-title"><i class="fas fa-table me-2" style="color:#f97316"></i>Mock 데이터 생성기</span>
            <button id="themeToggle" onclick="toggleTheme()">
                <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
            </button>
        </div>

        <div class="spinner-overlay" id="spinner">
            <div class="text-center">
                <div class="spinner-border text-warning mb-3" style="width:3rem;height:3rem;"></div>
                <div class="spinner-msg" id="spinnerMsg">데이터를 생성 중입니다...</div>
            </div>
        </div>

        <div class="main-content">
            <p class="page-subtitle">테이블 DDL 또는 스키마 설명을 입력하면 Oracle INSERT 문을 자동 생성합니다.</p>

            <div th:if="${error}" class="alert" style="background:rgba(239,68,68,0.12);border:1px solid #ef4444;color:#ef4444;margin-bottom:16px;padding:12px 16px;border-radius:8px;">
                <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
            </div>

            <div class="row g-3">
                <!-- Input Panel -->
                <div class="col-lg-5">
                    <div class="panel p-3">
                        <form th:action="@{/mockdata/generate}" method="post"
                              onsubmit="showSpinner(['스키마 분석 중...','컬럼 타입 추론 중...','현실적인 데이터 생성 중...','SQL 문 작성 중...'])">

                            <!-- Options row -->
                            <div class="row g-2 mb-2">
                                <div class="col-6">
                                    <label class="form-label">생성 건수</label>
                                    <input type="number" name="rowCount" class="form-control form-control-sm"
                                           min="1" max="1000" th:value="${rowCount != null ? rowCount : 10}">
                                    <div class="form-text">최대 1,000건</div>
                                </div>
                                <div class="col-6">
                                    <label class="form-label">출력 형식</label>
                                    <select name="format" class="form-select form-select-sm">
                                        <option value="insert" th:selected="${format == 'insert' or format == null}">INSERT INTO (SQL)</option>
                                        <option value="merge"  th:selected="${format == 'merge'}">MERGE INTO (Upsert)</option>
                                        <option value="csv"    th:selected="${format == 'csv'}">CSV 형식</option>
                                    </select>
                                </div>
                            </div>

                            <label class="form-label">테이블 DDL 또는 스키마 설명</label>
                            <textarea name="ddl" class="form-control" rows="20"
                                      style="font-family:monospace;font-size:0.82rem;"
                                      placeholder="CREATE TABLE EMP (&#10;  EMP_ID     NUMBER(10)    NOT NULL,&#10;  EMP_NM     VARCHAR2(100) NOT NULL,&#10;  DEPT_CD    VARCHAR2(10),&#10;  HIRE_DT    DATE,&#10;  SAL        NUMBER(12,2),&#10;  CONSTRAINT PK_EMP PRIMARY KEY (EMP_ID)&#10;);"
                                      th:text="${ddl}"></textarea>

                            <button type="submit" class="btn-accent mt-2">
                                <i class="fas fa-magic me-1"></i>데이터 생성
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Result Panel -->
                <div class="col-lg-7">
                    <div class="panel p-3" style="height:100%;">
                        <div class="d-flex justify-content-between align-items-center mb-2" th:if="${result}">
                            <span class="result-meta">
                                생성 완료 ·
                                <span th:text="${rowCount}"></span>건 ·
                                <span class="format-badge" th:text="${format}"></span>
                            </span>
                            <div class="d-flex gap-2">
                                <button class="copy-btn" id="copyBtn" onclick="copyToClipboard('rawResult')">
                                    <i class="fas fa-copy me-1"></i>복사
                                </button>
                                <button class="copy-btn" onclick="openInNewTab('rawResult')">
                                    <i class="fas fa-external-link-alt me-1"></i>새 탭
                                </button>
                                <form th:action="@{/mockdata/download}" method="post" style="display:inline">
                                    <input type="hidden" name="ddl"      th:value="${ddl}">
                                    <input type="hidden" name="rowCount" th:value="${rowCount}">
                                    <input type="hidden" name="format"   th:value="${format}">
                                    <button type="submit" class="copy-btn">
                                        <i class="fas fa-download me-1"></i>파일 저장
                                    </button>
                                </form>
                            </div>
                        </div>

                        <div class="result-box" id="resultBox">
                            <div th:if="${result}">
                                <pre class="language-sql" style="margin:0;background:none;border:none;padding:0;max-height:none;overflow:visible;">
                                    <code class="language-sql" id="rawResult" th:text="${result}"></code>
                                </pre>
                            </div>
                            <div th:unless="${result}" class="result-empty">
                                <i class="fas fa-table" style="font-size:2.5rem;color:var(--text-muted)"></i>
                                <p style="color:var(--text-muted);font-size:0.85rem;margin:0">DDL을 입력하고 데이터 생성 버튼을 클릭하세요</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="/webjars/prismjs/1.29.0/components/prism-core.min.js"></script>
<script src="/webjars/prismjs/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
<script th:src="@{/js/toolkit.js(v='20250409')}"></script>
<script>
    if (document.getElementById('rawResult')) {
        Prism.highlightAll();
    }
</script>
</body>
</html>
