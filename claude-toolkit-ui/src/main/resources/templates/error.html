<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title th:text="${errorTitle} + ' — Claude Java Toolkit'">Error</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css(v='20250409')}" rel="stylesheet">
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>
    <main class="main-area">
        <div class="top-bar">
            <span class="top-bar-title"><i class="fas fa-exclamation-triangle me-2" style="color:var(--accent)"></i>오류</span>
            <button id="themeToggle" onclick="toggleTheme()">
                <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
            </button>
        </div>
        <div class="main-content">
            <div style="max-width:500px;margin:60px auto;text-align:center;">
                <div class="panel p-5">
                    <div th:switch="${statusCode}">
                        <i th:case="403" class="fas fa-lock"              style="font-size:3rem;color:#ef4444;"></i>
                        <i th:case="404" class="fas fa-search"            style="font-size:3rem;color:#f59e0b;"></i>
                        <i th:case="*"   class="fas fa-exclamation-circle" style="font-size:3rem;color:#ef4444;"></i>
                    </div>
                    <h3 style="margin-top:16px;font-size:1.2rem;font-weight:700;color:var(--text-primary);"
                        th:text="${statusCode} + ' ' + ${errorTitle}">500 서버 오류</h3>
                    <p style="font-size:.88rem;color:var(--text-sub);margin:12px 0 24px;"
                       th:text="${errorMessage}">처리 중 오류가 발생했습니다.</p>
                    <div class="d-flex gap-2 justify-content-center">
                        <a href="/" class="btn-accent" style="padding:8px 24px;text-decoration:none;">
                            <i class="fas fa-home me-1"></i>홈으로
                        </a>
                        <button onclick="history.back()" class="btn btn-outline-tk" style="padding:8px 20px;">
                            <i class="fas fa-arrow-left me-1"></i>뒤로 가기
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/toolkit.js(v='20250409')}"></script>
</body>
</html>
