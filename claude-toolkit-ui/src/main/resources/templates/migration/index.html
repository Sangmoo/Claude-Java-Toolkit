<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>DB 마이그레이션 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css(v='20250329')}" rel="stylesheet">
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <main class="main-area">
        <div class="top-bar">
            <span class="top-bar-title"><i class="fas fa-database me-2" style="color:#f97316"></i>DB 마이그레이션 스크립트 생성</span>
            <button id="themeToggle" onclick="toggleTheme()">
                <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
            </button>
        </div>

        <div class="spinner-overlay" id="spinner">
            <div class="text-center">
                <div class="spinner-border text-warning mb-3" style="width:3rem;height:3rem;"></div>
                <div class="spinner-msg" id="spinnerMsg">스키마 변경사항을 분석 중입니다...</div>
            </div>
        </div>

        <div class="main-content">
            <p class="page-subtitle">BEFORE / AFTER DDL을 입력하면 Oracle ALTER 스크립트, Flyway, Liquibase 형식의 마이그레이션 스크립트를 생성합니다.</p>

            <div th:if="${error}" class="alert" style="background:rgba(239,68,68,0.12);border:1px solid #ef4444;color:#ef4444;margin-bottom:16px;padding:12px 16px;border-radius:8px;">
                <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
            </div>

            <div class="row g-3">
                <!-- Input Panel -->
                <div class="col-lg-5">
                    <div class="panel p-3">
                        <form th:action="@{/migration/generate}" method="post"
                              onsubmit="showSpinner(['DDL 비교 중...','변경사항 분석 중...','마이그레이션 스크립트 생성 중...','롤백 구문 작성 중...'])">

                            <!-- Format + Version -->
                            <div class="row g-2 mb-2">
                                <div class="col-7">
                                    <label class="form-label">출력 형식</label>
                                    <select name="format" class="form-select form-select-sm">
                                        <option value="oracle"    th:selected="${format == 'oracle'    or format == null}">Oracle DDL (ALTER)</option>
                                        <option value="flyway"    th:selected="${format == 'flyway'}">Flyway SQL Script</option>
                                        <option value="liquibase" th:selected="${format == 'liquibase'}">Liquibase XML</option>
                                    </select>
                                </div>
                                <div class="col-5">
                                    <label class="form-label">버전 (Flyway용)</label>
                                    <input type="text" name="version" class="form-control form-control-sm"
                                           th:value="${version != null ? version : '1.0.0'}" placeholder="1.0.0">
                                </div>
                            </div>

                            <!-- BEFORE DDL -->
                            <label class="form-label"><span class="sev-badge sev-medium">BEFORE</span> 현재 DDL</label>
                            <textarea name="beforeDdl" class="form-control mb-2" rows="9"
                                      style="font-family:monospace;font-size:0.82rem;"
                                      placeholder="CREATE TABLE EMP (&#10;  EMP_ID NUMBER(10) NOT NULL,&#10;  EMP_NM VARCHAR2(100),&#10;  ...&#10;);"
                                      th:text="${beforeDdl}"></textarea>

                            <!-- AFTER DDL -->
                            <label class="form-label"><span class="sev-badge sev-low">AFTER</span> 변경 후 DDL</label>
                            <textarea name="afterDdl" class="form-control mb-2" rows="9"
                                      style="font-family:monospace;font-size:0.82rem;"
                                      placeholder="CREATE TABLE EMP (&#10;  EMP_ID   NUMBER(10)    NOT NULL,&#10;  EMP_NM   VARCHAR2(200),   -- 변경: 100→200&#10;  EMAIL    VARCHAR2(300),   -- 추가&#10;  ...&#10;);"
                                      th:text="${afterDdl}"></textarea>

                            <button type="submit" class="btn-accent">
                                <i class="fas fa-code-branch me-1"></i>스크립트 생성
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Result Panel -->
                <div class="col-lg-7">
                    <div class="panel p-3" style="height:100%;">
                        <div class="d-flex justify-content-between align-items-center mb-2" th:if="${result}">
                            <div class="d-flex gap-2 align-items-center">
                                <span class="result-meta">생성 완료</span>
                                <span class="format-badge" th:text="${format}"></span>
                            </div>
                            <div class="d-flex gap-2">
                                <button class="copy-btn" id="copyBtn" onclick="copyToClipboard('rawResult')">
                                    <i class="fas fa-copy me-1"></i>복사
                                </button>
                                <button class="copy-btn" onclick="openInNewTab('rawResult')">
                                    <i class="fas fa-external-link-alt me-1"></i>새 탭
                                </button>
                                <form th:action="@{/migration/download}" method="post" style="display:inline">
                                    <input type="hidden" name="beforeDdl" th:value="${beforeDdl}">
                                    <input type="hidden" name="afterDdl"  th:value="${afterDdl}">
                                    <input type="hidden" name="format"    th:value="${format}">
                                    <input type="hidden" name="version"   th:value="${version}">
                                    <button type="submit" class="copy-btn"><i class="fas fa-download me-1"></i>파일 저장</button>
                                </form>
                            </div>
                        </div>

                        <!-- Risk filter -->
                        <div class="sev-filter" th:if="${result}">
                            <button class="sev-filter-btn f-all" id="sevBtn-ALL"    onclick="filterRisk('ALL')">ALL</button>
                            <button class="sev-filter-btn"       id="sevBtn-HIGH"   onclick="filterRisk('HIGH')">🔴 HIGH RISK</button>
                            <button class="sev-filter-btn"       id="sevBtn-MEDIUM" onclick="filterRisk('MEDIUM')">🟡 MEDIUM</button>
                            <button class="sev-filter-btn"       id="sevBtn-LOW"    onclick="filterRisk('LOW')">🟢 LOW</button>
                        </div>

                        <div class="result-box" id="resultBox">
                            <div th:if="${result}">
                                <div class="markdown-body" id="resultMd"></div>
                                <div id="rawResult" style="display:none" th:text="${result}"></div>
                            </div>
                            <div th:unless="${result}" class="result-empty">
                                <i class="fas fa-code-branch" style="font-size:2.5rem;color:var(--text-muted)"></i>
                                <p style="color:var(--text-muted);font-size:0.85rem;margin:0">BEFORE / AFTER DDL을 입력하고 생성 버튼을 클릭하세요</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
<script th:src="@{/js/toolkit.js(v='20250409')}"></script>
<script>
    var rawEl = document.getElementById('rawResult');
    if (rawEl) {
        renderMarkdown(rawEl.textContent || '', 'resultMd');
        Prism.highlightAllUnder(document.getElementById('resultMd'));
    }

    function filterRisk(level) {
        document.querySelectorAll('#resultMd li').forEach(function(li) {
            var txt = li.textContent || '';
            var liLevel = /\[RISK:\s*HIGH\]/i.test(txt)   ? 'HIGH'   :
                          /\[RISK:\s*MEDIUM\]/i.test(txt) ? 'MEDIUM' :
                          /\[RISK:\s*LOW\]/i.test(txt)    ? 'LOW'    : null;
            li.style.display = (level === 'ALL' || liLevel === level) ? '' : 'none';
        });
        document.querySelectorAll('.sev-filter-btn').forEach(function(b) {
            b.className = b.className.replace(/\s*f-\w+/g, '');
        });
        var active = document.getElementById('sevBtn-' + level);
        if (active) active.className += ' f-' + level.toLowerCase();
    }
</script>
</body>
</html>
