<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>Doc Generator — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css(v='20250329')}" rel="stylesheet">
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <main class="main-area">
        <div class="top-bar">
            <span class="top-bar-title"><i class="fas fa-file-alt me-2" style="color:#f97316"></i>기술 문서 자동 생성</span>
            <button id="themeToggle" onclick="toggleTheme()">
                <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
            </button>
        </div>

        <div class="spinner-overlay" id="spinner">
            <div class="text-center">
                <div class="spinner-border text-warning mb-3" style="width:3rem;height:3rem;"></div>
                <div class="spinner-msg" id="spinnerMsg">Claude가 문서를 생성 중입니다...</div>
            </div>
        </div>

        <div class="main-content">
            <p class="page-subtitle">Oracle SP 또는 Java 소스를 입력하면 기술 문서를 자동 생성합니다.</p>

            <div th:if="${error}"       class="alert alert-danger  mb-3" th:text="${error}"></div>
            <div th:if="${scanWarning}" class="alert alert-warning mb-3 small" th:text="${scanWarning}"></div>

            <div class="row g-4">
                <!-- Input Panel -->
                <div class="col-lg-6">
                    <div class="panel p-4">
                        <form method="post" action="/docgen/generate" id="genForm">
                            <!-- Source type & format row -->
                            <div class="row g-2 mb-3">
                                <div class="col-7">
                                    <label class="form-label">소스 유형</label>
                                    <select class="form-select" name="sourceType">
                                        <option value="Oracle Stored Procedure"   th:selected="${sourceType == 'Oracle Stored Procedure'}">Oracle Stored Procedure</option>
                                        <option value="Oracle Function"           th:selected="${sourceType == 'Oracle Function'}">Oracle Function</option>
                                        <option value="Java Service"              th:selected="${sourceType == 'Java Service'}">Java Service</option>
                                        <option value="Java Controller"           th:selected="${sourceType == 'Java Controller'}">Java Controller</option>
                                        <option value="iBatis/MyBatis Mapper XML" th:selected="${sourceType == 'iBatis/MyBatis Mapper XML'}">iBatis/MyBatis Mapper XML</option>
                                        <option value="Spring Batch Job"          th:selected="${sourceType == 'Spring Batch Job'}">Spring Batch Job</option>
                                        <option value="Oracle Package"            th:selected="${sourceType == 'Oracle Package'}">Oracle Package (SPEC+BODY)</option>
                                    </select>
                                </div>
                                <div class="col-5">
                                    <label class="form-label">출력 형식</label>
                                    <select class="form-select" name="format" id="formatSelect" onchange="updateFormatHint(this.value)">
                                        <option value="md"    th:selected="${format == 'md'    or format == null}">Markdown (.md)</option>
                                        <option value="typst" th:selected="${format == 'typst'}">Typst (.typ)</option>
                                        <option value="html"  th:selected="${format == 'html'}">HTML (.html)</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Output language -->
                            <div class="mb-3">
                                <label class="form-label">출력 언어</label>
                                <select class="form-select" name="outputLang">
                                    <option value="ko" th:selected="${outputLang == 'ko' or outputLang == null}">한국어 (Korean)</option>
                                    <option value="en" th:selected="${outputLang == 'en'}">English</option>
                                </select>
                            </div>

                            <!-- Source code -->
                            <div class="mb-3">
                                <label class="form-label">소스 코드</label>
                                <textarea class="form-control" name="sourceCode" rows="12"
                                          placeholder="CREATE OR REPLACE PROCEDURE SP_MY_PROC ..."
                                          th:text="${sourceCode}"></textarea>
                            </div>

                            <!-- Project context -->
                            <div class="ctx-box mb-3">
                                <div class="d-flex align-items-center justify-content-between mb-2">
                                    <div class="d-flex align-items-center gap-2">
                                        <input class="form-check-input mt-0" type="checkbox"
                                               name="useProjectContext" id="useProjectContext" value="true"
                                               th:checked="${useProjectContext}"
                                               onchange="toggleScanPathInput(this.checked)">
                                        <label class="form-check-label" for="useProjectContext" style="color:var(--text-sub);font-size:.82rem;">
                                            <i class="fas fa-folder-open me-1" style="color:#f97316"></i>
                                            Spring 프로젝트 파일 스캔 후 문서 생성
                                        </label>
                                    </div>
                                    <span th:if="${projectConfigured}"  class="status-badge status-ok">경로 설정됨</span>
                                    <span th:unless="${projectConfigured}" class="status-badge status-none"><a href="/settings" style="color:inherit;text-decoration:none;">설정 필요</a></span>
                                </div>
                                <div id="scanPathGroup" th:style="${useProjectContext} ? '' : 'display:none'">
                                    <label class="form-label">프로젝트 경로 (비워두면 Settings 경로 사용)</label>
                                    <input type="text" class="form-control form-control-sm" name="scanPath"
                                           placeholder="C:/workspace/my-project/src/main/java"
                                           th:value="${scanPath != null ? scanPath : currentScanPath}">
                                    <div class="ctx-hint">Controller, Service, Repository, Mapper, DTO 파일이 자동 분류됩니다.</div>
                                </div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-accent flex-fill"
                                        onclick="showSpinner(['소스 코드 분석 중...','프로젝트 컨텍스트 처리 중...','Claude 문서 작성 중...','마무리 중...'])">
                                    <i class="fas fa-magic me-2"></i>문서 생성
                                </button>
                                <button type="button" class="btn btn-outline-tk btn-sm" onclick="runStream()" id="streamBtn">
                                    <i class="fas fa-bolt me-1" style="color:#f97316"></i>실시간
                                </button>
                            </div>
                        </form>

                        <!-- File Upload -->
                        <hr class="divider my-3">
                        <form method="post" action="/docgen/generate/file" enctype="multipart/form-data">
                            <input type="hidden" name="format"            th:value="${format != null ? format : 'md'}">
                            <input type="hidden" name="outputLang"        th:value="${outputLang != null ? outputLang : 'ko'}">
                            <input type="hidden" name="useProjectContext" th:value="${useProjectContext}">
                            <div class="input-group">
                                <input type="file" class="form-control form-control-sm" name="file" accept=".sql,.java,.xml">
                                <button class="btn btn-outline-tk btn-sm" type="submit" onclick="showSpinner(['파일 처리 중...'])">
                                    <i class="fas fa-upload me-1"></i>파일 업로드
                                </button>
                            </div>
                            <p class="upload-hint mt-1">지원: .sql, .java, .xml</p>
                        </form>
                    </div>
                </div>

                <!-- Result Panel -->
                <div class="col-lg-6">
                    <div class="panel p-4 h-100">
                        <!-- ── 실시간 스트리밍 패널 ── -->
                        <div id="streamPanel" style="display:none;">
                            <div class="d-flex align-items-center justify-content-between mb-2">
                                <h6 class="mb-0" style="color:var(--text-sub);font-size:0.88rem;">
                                    <i class="fas fa-bolt me-2" style="color:#f97316"></i>실시간 결과
                                    <span id="streamStatus" class="ms-2" style="font-size:0.75rem;color:var(--text-muted);"></span>
                                </h6>
                                <button type="button" class="copy-btn" onclick="copyStream()">
                                    <i class="fas fa-copy me-1"></i>복사
                                </button>
                            </div>
                            <div id="streamResult" class="stream-result"></div>
                            <div class="mt-2" style="font-size:0.73rem;color:var(--text-muted);">
                                <i class="fas fa-info-circle me-1"></i>실시간 보기 결과는 이력에 자동 저장되지 않습니다.
                            </div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <div class="d-flex align-items-center gap-2">
                                <span class="result-meta">생성된 문서</span>
                                <span th:if="${projectContextUsed}" class="status-badge status-ok" style="font-size:.7rem;">
                                    <i class="fas fa-folder-open" style="font-size:.6rem;"></i>프로젝트 컨텍스트
                                </span>
                                <span th:if="${result}" class="format-badge" th:text="${format == 'typst' ? 'Typst' : format == 'html' ? 'HTML' : 'Markdown'}"></span>
                            </div>
                            <div class="d-flex gap-2">
                                <!-- Toggle rendered/raw view -->
                                <button th:if="${result != null and format != 'typst'}" class="copy-btn" id="viewToggleBtn" onclick="toggleView()">
                                    <i class="fas fa-eye me-1"></i>렌더링 보기
                                </button>
                                <button th:if="${result}" class="copy-btn" onclick="openInNewTab('resultContent')">
                                    <i class="fas fa-external-link-alt me-1"></i>새 탭
                                </button>
                                <button th:if="${result}" id="copyBtn" class="copy-btn" onclick="copyToClipboard('resultContent')">
                                    <i class="fas fa-copy me-1"></i>복사
                                </button>
                            </div>
                        </div>

                        <!-- Scan summary -->
                        <div th:if="${scanSummary}" class="ctx-box mb-2" style="font-size:.79rem;">
                            <i class="fas fa-check-circle me-1" style="color:#22c55e;"></i>
                            스캔 완료: <span th:text="${scanSummary}"></span>
                        </div>

                        <!-- Rendered markdown view (default) -->
                        <div th:if="${result}">
                            <div class="result-box markdown-body" id="resultRendered" style="display:none;"></div>
                            <div class="result-box result-raw"   id="resultContent"  th:text="${result}"></div>
                            <div id="rawResult" th:attr="data-content=${result},data-format=${format}" style="display:none;"></div>
                        </div>
                        <div th:unless="${result}" class="result-box result-empty">
                            <i class="fas fa-file-alt fa-2x" style="color:var(--border-color)"></i>
                            <span>소스 코드를 입력하면 생성된 문서가 여기에 표시됩니다.</span>
                        </div>

                        <!-- Download -->
                        <div th:if="${result}" class="mt-3">
                            <form method="post" action="/docgen/download">
                                <input type="hidden" name="sourceCode" th:value="${sourceCode}">
                                <input type="hidden" name="sourceType" th:value="${sourceType}">
                                <input type="hidden" name="format"     th:value="${format}">
                                <button type="submit" class="btn btn-outline-tk btn-sm w-100">
                                    <i class="fas fa-download me-2"></i>파일로 다운로드
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
<script th:src="@{/js/toolkit.js(v='20250329')}"></script>
<script>
    var _showRendered = false;

    // Auto-render Markdown result
    var rawEl = document.getElementById('rawResult');
    if (rawEl) {
        var raw    = rawEl.getAttribute('data-content');
        var fmt    = rawEl.getAttribute('data-format');
        if (fmt === 'md' || fmt === null || fmt === '') {
            renderMarkdown(raw, 'resultRendered');
            // Default: show raw (so user can see/copy the text)
        }
    }

    function toggleView() {
        _showRendered = !_showRendered;
        document.getElementById('resultRendered').style.display = _showRendered ? '' : 'none';
        document.getElementById('resultContent').style.display  = _showRendered ? 'none' : '';
        var btn = document.getElementById('viewToggleBtn');
        if (btn) {
            btn.innerHTML = _showRendered
                ? '<i class="fas fa-code me-1"></i>원문 보기'
                : '<i class="fas fa-eye me-1"></i>렌더링 보기';
        }
    }

    function updateFormatHint(fmt) { /* placeholder for future hint */ }

    function runStream() {
        var input = document.querySelector('[name=sourceCode]').value.trim();
        if (!input) { alert('소스 코드를 입력하세요.'); return; }
        var sourceType = document.querySelector('select[name=sourceType]').value;
        document.getElementById('streamPanel').style.display = '';
        document.getElementById('streamResult').textContent = '';
        document.getElementById('streamResult').classList.add('stream-cursor');
        document.getElementById('streamStatus').textContent = '스트리밍 중...';
        startStream('doc_gen', {input: input, sourceType: sourceType}, 'streamResult', function() {
            document.getElementById('streamResult').classList.remove('stream-cursor');
            document.getElementById('streamStatus').textContent = '완료';
        });
    }
    function copyStream() {
        var el = document.getElementById('streamResult');
        if (!el || !el.textContent.trim()) return;
        navigator.clipboard.writeText(el.textContent).then(function() {
            var btn = document.querySelector('[onclick="copyStream()"]');
            if (btn) { var orig = btn.innerHTML; btn.innerHTML = '<i class="fas fa-check me-1"></i>복사됨'; setTimeout(function(){ btn.innerHTML = orig; }, 1500); }
        }).catch(function() {
            var ta = document.createElement('textarea'); ta.value = el.textContent;
            document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        });
    }
</script>
</body>
</html>
