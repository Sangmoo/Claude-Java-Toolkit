<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>배치 분석 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css(v='20250329')}" rel="stylesheet">
    <style>
        .batch-item-card { background:var(--bg-secondary); border:1px solid var(--border-color);
                           border-radius:10px; padding:14px 16px; margin-bottom:10px; position:relative; }
        .batch-item-card .remove-btn { position:absolute; top:10px; right:10px; background:none;
            border:none; color:var(--text-muted); cursor:pointer; font-size:.9rem; }
        .batch-item-card .remove-btn:hover { color:#ef4444; }
        .result-row-ok   { color:#10b981; }
        .result-row-fail { color:#ef4444; }
        .progress-bar-custom { height:10px; border-radius:5px; background:#8b5cf6; transition:width .3s; }
        .progress-bg { height:10px; border-radius:5px; background:var(--border-color); overflow:hidden; }
        .copy-btn { background:none; border:1px solid var(--border-color); color:var(--text-muted);
                    padding:3px 10px; border-radius:6px; font-size:.74rem; cursor:pointer; transition:all .15s; }
        .copy-btn:hover { border-color:#8b5cf6; color:#8b5cf6; }
    </style>
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <main class="main-area">
        <div class="top-bar">
            <span class="top-bar-title">
                <i class="fas fa-layer-group me-2" style="color:#8b5cf6"></i>배치 분석
            </span>
            <button id="themeToggle" onclick="toggleTheme()">
                <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
            </button>
        </div>

        <div class="main-content">
            <p class="page-subtitle">여러 코드 스니펫을 한 번에 하네스 파이프라인으로 분석합니다. 각 항목은 순차적으로 처리됩니다.</p>

            <div class="row g-3">
                <!-- ── 입력 패널 ── -->
                <div class="col-lg-6">
                    <div class="panel p-4">
                        <h6 class="section-title mb-3"><i class="fas fa-list me-2" style="color:#8b5cf6"></i>분석 항목</h6>

                        <div id="batchItems"></div>

                        <button type="button" class="btn btn-outline-tk btn-sm mt-2" onclick="addItem()">
                            <i class="fas fa-plus me-1"></i>항목 추가
                        </button>

                        <hr class="my-3">

                        <div class="mb-3">
                            <label class="form-label" style="font-size:.82rem;">완료 시 이메일 알림 (선택 사항)</label>
                            <input type="email" id="notifyEmail" class="form-control form-control-sm"
                                   placeholder="user@example.com">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="button" class="btn-accent" id="startBtn" onclick="startBatch()">
                                <i class="fas fa-play me-1"></i>배치 분석 시작
                            </button>
                            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="clearAll()">
                                <i class="fas fa-trash me-1"></i>초기화
                            </button>
                        </div>
                    </div>
                </div>

                <!-- ── 결과 패널 ── -->
                <div class="col-lg-6">
                    <!-- 진행 상태 -->
                    <div id="progressPanel" class="panel p-4 mb-3" style="display:none;">
                        <h6 class="section-title mb-2"><i class="fas fa-spinner spin-icon me-2" style="color:#8b5cf6"></i>진행 중</h6>
                        <div class="d-flex justify-content-between mb-1" style="font-size:.82rem;color:var(--text-muted);">
                            <span id="progressLabel">0 / 0 완료</span>
                            <span id="progressPct">0%</span>
                        </div>
                        <div class="progress-bg"><div class="progress-bar-custom" id="progressBar" style="width:0%"></div></div>
                    </div>

                    <!-- 결과 목록 -->
                    <div id="resultsPanel" class="panel p-4" style="display:none;">
                        <div class="d-flex align-items-center justify-content-between mb-3">
                            <h6 class="section-title mb-0"><i class="fas fa-check-circle me-2" style="color:#10b981"></i>분석 완료</h6>
                            <button class="copy-btn" onclick="clearResults()"><i class="fas fa-trash me-1"></i>결과 초기화</button>
                        </div>
                        <div id="summaryBar" class="mb-3" style="font-size:.82rem;color:var(--text-muted);"></div>
                        <div class="table-responsive">
                            <table class="table table-sm" style="font-size:.82rem;">
                                <thead>
                                    <tr>
                                        <th style="width:30px;">#</th>
                                        <th>레이블</th>
                                        <th style="width:60px;">언어</th>
                                        <th style="width:60px;">결과</th>
                                        <th style="width:80px;">상세</th>
                                    </tr>
                                </thead>
                                <tbody id="resultsTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- 상세 결과 모달 -->
<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content" style="background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:12px;">
            <div class="modal-header" style="border-bottom:1px solid var(--border-color);">
                <h5 class="modal-title" id="detailTitle" style="color:var(--text-primary);font-size:.95rem;">상세 결과</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="d-flex gap-2 mb-3">
                    <button class="tab-btn active" id="dtbResponse" onclick="switchDetailTab('response')">분석 결과</button>
                    <button class="tab-btn" id="dtbImproved" onclick="switchDetailTab('improved')">개선된 코드</button>
                </div>
                <pre id="detailContent" style="background:var(--input-bg);border:1px solid var(--border-color);
                     border-radius:8px;padding:14px;white-space:pre-wrap;font-size:.8rem;
                     color:var(--text-sub);max-height:500px;overflow-y:auto;font-family:Consolas,monospace;"></pre>
            </div>
            <div class="modal-footer" style="border-top:1px solid var(--border-color);">
                <button class="copy-btn" onclick="copyDetail()"><i class="fas fa-copy me-1"></i>복사</button>
                <button type="button" class="btn btn-outline-tk btn-sm" data-bs-dismiss="modal">닫기</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/toolkit.js(v='20250329')}"></script>
<script>
var itemCount  = 0;
var batchId    = null;
var pollTimer  = null;
var detailData = null;
var detailTab  = 'response';

/* ── 항목 관리 ── */
function addItem() {
    itemCount++;
    var idx = itemCount;
    var div = document.createElement('div');
    div.className = 'batch-item-card';
    div.id = 'batchItem' + idx;
    div.innerHTML =
        '<button class="remove-btn" onclick="removeItem(' + idx + ')" title="삭제"><i class="fas fa-times"></i></button>'
      + '<div class="mb-2">'
      + '<input type="text" class="form-control form-control-sm mb-1" id="label' + idx + '" placeholder="항목 레이블 (예: UserService.java)">'
      + '<div class="d-flex gap-2 mb-1">'
      + '<button type="button" class="lang-tab-sm active" id="langJava' + idx + '" onclick="setItemLang(' + idx + ',\'java\')">Java</button>'
      + '<button type="button" class="lang-tab-sm" id="langSql' + idx + '" onclick="setItemLang(' + idx + ',\'sql\')">SQL</button>'
      + '</div>'
      + '<textarea class="form-control" id="code' + idx + '" rows="6" placeholder="코드를 입력하세요..." '
      + 'style="font-family:Consolas,monospace;font-size:.78rem;"></textarea>'
      + '</div>';
    document.getElementById('batchItems').appendChild(div);

    // Add mini lang-tab style
    var style = document.createElement('style');
    style.textContent = '.lang-tab-sm{background:none;border:1px solid var(--border-color);color:var(--text-muted);'
        + 'padding:3px 12px;border-radius:20px;cursor:pointer;font-size:.75rem;transition:all .15s;}'
        + '.lang-tab-sm.active{background:rgba(139,92,246,.15);border-color:#8b5cf6;color:#8b5cf6;font-weight:600;}';
    if (!document.getElementById('langTabSmStyle')) {
        style.id = 'langTabSmStyle';
        document.head.appendChild(style);
    }
}

function removeItem(idx) {
    var el = document.getElementById('batchItem' + idx);
    if (el) el.remove();
}

function setItemLang(idx, lang) {
    document.getElementById('langJava' + idx).classList.toggle('active', lang === 'java');
    document.getElementById('langSql'  + idx).classList.toggle('active', lang === 'sql');
}

function getItemLang(idx) {
    var javaBtn = document.getElementById('langJava' + idx);
    return (javaBtn && javaBtn.classList.contains('active')) ? 'java' : 'sql';
}

function collectItems() {
    var items = [];
    var cards = document.querySelectorAll('.batch-item-card');
    for (var i = 0; i < cards.length; i++) {
        var card = cards[i];
        var id   = card.id.replace('batchItem', '');
        var label = document.getElementById('label' + id);
        var code  = document.getElementById('code'  + id);
        if (!code || !code.value.trim()) continue;
        items.push({
            label:    label ? label.value.trim() : '항목 ' + id,
            code:     code.value.trim(),
            language: getItemLang(id)
        });
    }
    return items;
}

function clearAll() {
    document.getElementById('batchItems').innerHTML = '';
    document.getElementById('progressPanel').style.display = 'none';
    document.getElementById('resultsPanel').style.display  = 'none';
    document.getElementById('resultsTable').innerHTML = '';
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    batchId = null;
    itemCount = 0;
}

function clearResults() {
    document.getElementById('resultsPanel').style.display = 'none';
    document.getElementById('resultsTable').innerHTML = '';
    if (batchId) {
        fetch('/harness/batch/status/' + batchId, { method: 'DELETE' });
        batchId = null;
    }
}

/* ── 배치 시작 ── */
function startBatch() {
    var items = collectItems();
    if (!items.length) { alert('분석할 코드 항목을 추가해주세요.'); return; }

    document.getElementById('startBtn').disabled = true;
    document.getElementById('progressPanel').style.display = '';
    document.getElementById('resultsPanel').style.display  = 'none';
    updateProgress(0, items.length);

    var notifyEmail = document.getElementById('notifyEmail').value.trim();

    fetch('/harness/batch/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items: items, notifyEmail: notifyEmail })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (!data.success) {
            alert('배치 시작 실패: ' + (data.error || '오류'));
            document.getElementById('startBtn').disabled = false;
            return;
        }
        batchId = data.batchId;
        pollTimer = setInterval(function() { pollStatus(items.length); }, 2000);
    })
    .catch(function(e) {
        alert('요청 실패: ' + e.message);
        document.getElementById('startBtn').disabled = false;
    });
}

function pollStatus(total) {
    if (!batchId) return;
    fetch('/harness/batch/status/' + batchId)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (!data.found) {
                clearInterval(pollTimer); pollTimer = null;
                document.getElementById('startBtn').disabled = false;
                return;
            }
            updateProgress(data.done, data.total || total);
            if (data.finished) {
                clearInterval(pollTimer); pollTimer = null;
                document.getElementById('startBtn').disabled = false;
                document.getElementById('progressPanel').style.display = 'none';
                renderResults(data.results || []);
            }
        })
        .catch(function() {});
}

function updateProgress(done, total) {
    var pct = total > 0 ? Math.round(done / total * 100) : 0;
    document.getElementById('progressLabel').textContent = done + ' / ' + total + ' 완료';
    document.getElementById('progressPct').textContent   = pct + '%';
    document.getElementById('progressBar').style.width   = pct + '%';
}

/* ── 결과 렌더링 ── */
var allResults = [];

function renderResults(results) {
    allResults = results;
    var ok   = 0;
    var fail = 0;
    for (var i = 0; i < results.length; i++) {
        if (results[i].success) ok++; else fail++;
    }
    document.getElementById('summaryBar').innerHTML =
        '<i class="fas fa-check-circle me-1" style="color:#10b981"></i>성공: <strong>' + ok + '</strong>'
      + ' &nbsp; <i class="fas fa-times-circle me-1" style="color:#ef4444"></i>실패: <strong>' + fail + '</strong>';

    var html = '';
    for (var j = 0; j < results.length; j++) {
        var r = results[j];
        var preview = '';
        if (r.success && r.response) {
            preview = r.response.replace(/[\r\n]+/g, ' ').replace(/[#*`]/g, '').substring(0, 80);
            if (r.response.length > 80) preview += '...';
        } else if (!r.success) {
            preview = r.error || '오류';
        }
        html += '<tr>'
              + '<td>' + (j+1) + '</td>'
              + '<td title="' + escHtml(r.label || '') + '">' + escHtml((r.label || '').substring(0,30)) + '</td>'
              + '<td><span style="font-size:.7rem;">' + escHtml(r.language || '') + '</span></td>'
              + '<td class="' + (r.success ? 'result-row-ok' : 'result-row-fail') + '">'
              + (r.success ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-times-circle"></i>') + '</td>'
              + '<td><button class="copy-btn" onclick="showDetail(' + j + ')">상세 보기</button></td>'
              + '</tr>';
    }
    document.getElementById('resultsTable').innerHTML = html;
    document.getElementById('resultsPanel').style.display = '';
}

function showDetail(idx) {
    var r = allResults[idx];
    detailData = r;
    detailTab  = 'response';
    document.getElementById('detailTitle').textContent = (r.label || '항목 ' + (idx+1)) + ' — 분석 결과';
    document.getElementById('detailContent').textContent = r.response || r.error || '';
    document.getElementById('dtbResponse').className = 'tab-btn active';
    document.getElementById('dtbImproved').className = 'tab-btn';
    new bootstrap.Modal(document.getElementById('detailModal')).show();
}

function switchDetailTab(tab) {
    detailTab = tab;
    document.getElementById('dtbResponse').className = 'tab-btn' + (tab === 'response' ? ' active' : '');
    document.getElementById('dtbImproved').className = 'tab-btn' + (tab === 'improved' ? ' active' : '');
    if (!detailData) return;
    if (tab === 'response') {
        document.getElementById('detailContent').textContent = detailData.response || detailData.error || '';
    } else {
        document.getElementById('detailContent').textContent = detailData.improved || '(개선 코드 없음)';
    }
}

function copyDetail() {
    var text = document.getElementById('detailContent').textContent;
    if (navigator.clipboard) {
        navigator.clipboard.writeText(text);
    }
}

function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 페이지 로드 시 기본 항목 1개 추가
addItem();
</script>
</body>
</html>
