<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${share.title} + ' — Claude Toolkit 공유'">공유 결과 — Claude Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="/webjars/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css(v='20250402')}" rel="stylesheet">
    <script src="/webjars/marked/9.1.6/marked.min.js"></script>
    <style>
        body { background: var(--bg-primary); color: var(--text-primary); padding: 0; margin: 0; }
        .share-wrap { max-width: 900px; margin: 0 auto; padding: 32px 20px; }
        .share-header { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px 24px; margin-bottom: 22px; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
        .share-title { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); }
        .share-meta { font-size: .78rem; color: var(--text-muted); margin-top: 4px; }
        .share-badge { display: inline-flex; align-items: center; gap: 4px; font-size: .68rem; background: rgba(249,115,22,.12); color: #f97316; border: 1px solid rgba(249,115,22,.3); border-radius: 20px; padding: 2px 9px; font-weight: 600; margin-right: 6px; }
        .share-expiry { font-size: .72rem; color: var(--text-muted); background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 6px; padding: 4px 10px; white-space: nowrap; }
        .result-panel { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; }
        .result-panel h6 { font-size: .72rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 12px; }
        .input-box { background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px 14px; font-family: monospace; font-size: .8rem; color: var(--text-sub); white-space: pre-wrap; max-height: 200px; overflow: auto; margin-bottom: 20px; }
        .output-box { font-size: .88rem; line-height: 1.7; }
        .share-branding { text-align: center; margin-top: 32px; font-size: .75rem; color: var(--text-muted); }
        .share-branding a { color: #f97316; text-decoration: none; }
        @media print { .share-branding { display: none; } }
    </style>
</head>
<body>
<script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
<div class="share-wrap">
    <div class="share-header">
        <div>
            <span class="share-badge"><i class="fas fa-share-nodes"></i>공유된 분석 결과</span>
            <div class="share-title mt-2" th:text="${share.title}">분석 제목</div>
            <div class="share-meta">
                <span th:text="${share.type}"></span> ·
                생성일: <span th:text="${share.formattedCreatedAt}"></span>
            </div>
        </div>
        <div class="d-flex flex-column align-items-end gap-2">
            <span class="share-expiry"><i class="fas fa-clock me-1"></i><span th:text="${share.remainingDaysText}"></span></span>
            <button onclick="window.print()" class="btn btn-outline-secondary btn-sm" style="font-size:.72rem;">
                <i class="fas fa-print me-1"></i>인쇄/PDF
            </button>
        </div>
    </div>

    <div class="result-panel">
        <!-- Input -->
        <h6><i class="fas fa-terminal me-1"></i>입력 내용</h6>
        <div class="input-box" th:text="${share.inputContent}"></div>

        <!-- Output -->
        <h6><i class="fas fa-robot me-1"></i>AI 분석 결과</h6>
        <div class="output-box" id="outputBox"></div>
    </div>

    <div class="share-branding">
        <i class="fas fa-robot me-1" style="color:#f97316"></i>
        <a href="https://github.com/Sangmoo/Claude-Java-Toolkit" target="_blank">Claude Java Toolkit</a>
        으로 생성된 공유 링크입니다.
    </div>
</div>

<script th:inline="javascript">
/*<![CDATA[*/
var OUTPUT_CONTENT = /*[[${share.outputContent}]]*/ '';
/*]]>*/
</script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var el = document.getElementById('outputBox');
    if (el && OUTPUT_CONTENT) {
        if (typeof marked !== 'undefined') {
            marked.setOptions({ breaks: true, gfm: true });
            el.innerHTML = marked.parse(OUTPUT_CONTENT);
        } else {
            el.textContent = OUTPUT_CONTENT;
        }
    }
});
</script>
</body>
</html>
