<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}();</script>
    <title>민감정보 마스킹 — Claude Java Toolkit</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/toolkit.css(v='20250408')}" rel="stylesheet">
    <style>
        /* ── 패턴 토글 칩 ── */
        .pattern-chip { display:inline-flex; align-items:center; gap:5px;
                        padding:4px 12px; border-radius:20px; cursor:pointer;
                        border:1px solid var(--border-color); color:var(--text-muted);
                        font-size:.75rem; font-weight:500; transition:all .15s;
                        user-select:none; }
        .pattern-chip:hover     { border-color:var(--accent); color:var(--accent); }
        .pattern-chip.active    { background:rgba(249,115,22,.12); border-color:var(--accent);
                                  color:var(--accent); font-weight:600; }
        .pattern-chip .chip-dot { width:6px; height:6px; border-radius:50%;
                                  background:currentColor; flex-shrink:0; }

        /* ── 결과 탭 ── */
        .result-tab { background:none; border:1px solid var(--border-color); color:var(--text-muted);
                      padding:4px 12px; border-radius:20px; cursor:pointer; font-size:.78rem; transition:all .15s; }
        .result-tab.active { background:rgba(249,115,22,.12); border-color:var(--accent);
                             color:var(--accent); font-weight:600; }

        /* ── 토큰 맵 테이블 ── */
        .token-table th { font-size:.72rem; color:var(--text-muted); font-weight:600;
                          padding:7px 10px; border-bottom:1px solid var(--border-color); }
        .token-table td { font-size:.75rem; padding:6px 10px; border-bottom:1px solid var(--border-color); }
        .token-table tr:last-child td { border-bottom:none; }
        .token-cell { font-family:'JetBrains Mono',monospace; color:var(--accent); font-size:.72rem; }
        .original-cell { color:#ef4444; font-family:'JetBrains Mono',monospace; font-size:.72rem; }
        .type-badge { font-size:.65rem; font-weight:700; padding:1px 7px; border-radius:10px;
                      background:rgba(249,115,22,.12); color:var(--accent); }

        /* ── 카운트 배지 ── */
        .masked-count { background:rgba(16,185,129,.12); color:#10b981;
                        padding:3px 10px; border-radius:20px; font-size:.76rem; font-weight:600; }
        .copy-btn { background:none; border:1px solid var(--border-color); color:var(--text-muted);
                    padding:3px 10px; border-radius:6px; font-size:.74rem; cursor:pointer; transition:all .15s; }
        .copy-btn:hover { border-color:var(--accent); color:var(--accent); }

        /* ── 복원 영역 ── */
        .restore-area { border:1px solid var(--border-color); border-radius:10px;
                        background:var(--bg-secondary); overflow:hidden; }
        .restore-header { padding:10px 14px; background:var(--bg-secondary);
                          border-bottom:1px solid var(--border-color);
                          font-size:.82rem; font-weight:600; }

        /* ── 마스킹 하이라이트 (미리보기용) ── */
        .masked-text-box { background:var(--bg-secondary); border:1px solid var(--border-color);
                           border-radius:8px; padding:12px 14px; font-family:'JetBrains Mono',monospace;
                           font-size:.78rem; line-height:1.7; white-space:pre-wrap;
                           word-break:break-word; max-height:320px; overflow-y:auto; }
        .token-highlight { background:rgba(249,115,22,.18); color:var(--accent);
                           border-radius:3px; padding:0 2px; font-weight:600; }
    </style>
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <main class="main-area">
        <div class="top-bar">
            <span class="top-bar-title">
                <i class="fas fa-user-shield me-2" style="color:#f97316"></i>민감정보 마스킹
            </span>
            <button id="themeToggle" onclick="toggleTheme()">
                <i class="fas fa-sun me-1"></i><span id="themeLabel">Light</span>
            </button>
        </div>

        <div class="main-content">
            <p class="page-subtitle">
                AI 전송 전 주민번호·이메일·전화번호 등 민감정보를 자동 탐지해 토큰으로 교체합니다.
                AI 응답을 받은 후 원본으로 복원할 수 있습니다.
            </p>

            <div class="row g-3">
                <!-- ════════════ 왼쪽: 입력 + 패턴 선택 ════════════ -->
                <div class="col-lg-5">
                    <div class="panel p-3">

                        <!-- 패턴 선택 -->
                        <div class="mb-2" style="font-size:.78rem;color:var(--text-muted);font-weight:600;">
                            <i class="fas fa-filter me-1"></i>탐지할 패턴 선택
                        </div>
                        <div class="d-flex flex-wrap gap-2 mb-3" id="patternChips">
                            <th:block th:each="p : ${patterns}">
                                <label class="pattern-chip active"
                                       th:data-type="${p.type}"
                                       onclick="togglePattern(this)">
                                    <span class="chip-dot"></span>
                                    <span th:text="${p.label}"></span>
                                </label>
                            </th:block>
                        </div>
                        <div class="d-flex gap-2 mb-3">
                            <button type="button" class="btn btn-outline-tk btn-sm" onclick="selectAll()">전체 선택</button>
                            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="selectNone()">전체 해제</button>
                        </div>

                        <!-- 입력 텍스트 -->
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label class="form-label mb-0" style="font-size:.82rem;">원본 텍스트</label>
                            <span id="inputChars" style="font-size:.7rem;color:var(--text-muted);"></span>
                        </div>
                        <textarea id="inputText" class="form-control" rows="16"
                                  placeholder="SQL, 코드, 로그 등 민감정보가 포함된 텍스트를 붙여넣으세요..."
                                  oninput="onInputChange()"
                                  style="font-family:'JetBrains Mono',monospace;font-size:.8rem;resize:vertical;"></textarea>

                        <div class="d-flex gap-2 mt-2 flex-wrap align-items-center">
                            <button type="button" class="btn-accent" onclick="applyMasking()" id="maskBtn" style="flex:1;">
                                <i class="fas fa-mask me-1"></i>마스킹 적용
                            </button>
                            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="clearAll()" title="초기화">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                        <div class="mt-1" style="font-size:.72rem;color:var(--text-muted);">
                            <i class="fas fa-keyboard me-1"></i>Ctrl+Enter 단축키 지원
                        </div>
                    </div>
                </div>

                <!-- ════════════ 오른쪽: 결과 ════════════ -->
                <div class="col-lg-7">

                    <!-- 빈 상태 -->
                    <div id="emptyState" class="panel p-4 text-center"
                         style="min-height:420px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;">
                        <div style="font-size:2.6rem;opacity:.2;"><i class="fas fa-user-shield"></i></div>
                        <div style="color:var(--text-muted);font-size:.88rem;">
                            텍스트를 입력하고 "마스킹 적용"을 클릭하면<br>민감정보가 토큰으로 교체됩니다
                        </div>
                        <div class="d-flex gap-3 mt-1" style="font-size:.75rem;color:var(--text-muted);opacity:.7;flex-wrap:wrap;justify-content:center;">
                            <span><i class="fas fa-id-card me-1"></i>주민번호</span>
                            <span>·</span>
                            <span><i class="fas fa-envelope me-1"></i>이메일</span>
                            <span>·</span>
                            <span><i class="fas fa-phone me-1"></i>전화번호</span>
                            <span>·</span>
                            <span><i class="fas fa-key me-1"></i>API 키</span>
                        </div>
                    </div>

                    <!-- 결과 영역 -->
                    <div id="resultArea" style="display:none;">

                        <!-- 요약 배지 -->
                        <div class="d-flex align-items-center gap-2 mb-2 flex-wrap">
                            <span id="summaryBadge" class="masked-count"></span>
                            <span id="typeSummary" style="font-size:.75rem;color:var(--text-muted);"></span>
                        </div>

                        <!-- 탭 -->
                        <div class="panel" style="overflow:hidden;">
                            <div style="padding:9px 14px;background:var(--bg-secondary);
                                        border-bottom:1px solid var(--border-color);
                                        display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;">
                                <div class="d-flex gap-2">
                                    <button class="result-tab active" id="rtMasked"   onclick="switchTab('masked')">
                                        <i class="fas fa-mask me-1"></i>마스킹 결과
                                    </button>
                                    <button class="result-tab"        id="rtTokenMap" onclick="switchTab('tokenmap')">
                                        <i class="fas fa-table me-1"></i>토큰 맵
                                    </button>
                                    <button class="result-tab"        id="rtRestore"  onclick="switchTab('restore')">
                                        <i class="fas fa-rotate-left me-1"></i>복원하기
                                    </button>
                                </div>
                                <div class="d-flex gap-2">
                                    <button class="copy-btn" onclick="copyMasked()" title="마스킹된 텍스트 복사">
                                        <i class="fas fa-copy me-1"></i>복사
                                    </button>
                                    <button class="copy-btn" onclick="copyTokenMap()" title="토큰 맵 JSON 복사">
                                        <i class="fas fa-code me-1"></i>토큰맵 복사
                                    </button>
                                </div>
                            </div>

                            <!-- 마스킹 결과 탭 -->
                            <div id="tabMasked" class="p-3">
                                <div class="masked-text-box" id="maskedDisplay"></div>
                            </div>

                            <!-- 토큰 맵 탭 -->
                            <div id="tabTokenmap" class="p-3" style="display:none;">
                                <div style="overflow-x:auto;max-height:400px;overflow-y:auto;">
                                    <table class="token-table w-100">
                                        <thead>
                                            <tr>
                                                <th>토큰</th>
                                                <th>원본 값</th>
                                                <th>유형</th>
                                            </tr>
                                        </thead>
                                        <tbody id="tokenTableBody"></tbody>
                                    </table>
                                </div>
                            </div>

                            <!-- 복원하기 탭 -->
                            <div id="tabRestore" class="p-3" style="display:none;">
                                <p style="font-size:.78rem;color:var(--text-muted);margin-bottom:10px;">
                                    <i class="fas fa-info-circle me-1"></i>
                                    AI로부터 받은 응답에 토큰이 포함되어 있으면 아래에 붙여넣고 복원하세요.
                                    또는 마스킹 결과를 그대로 복원합니다.
                                </p>
                                <div class="mb-2" style="font-size:.78rem;color:var(--text-muted);">AI 응답 (토큰 포함)</div>
                                <textarea id="restoreInput" class="form-control mb-2" rows="8"
                                          placeholder="토큰이 포함된 텍스트를 붙여넣거나, 비워두면 마스킹 결과를 복원합니다..."
                                          style="font-family:'JetBrains Mono',monospace;font-size:.78rem;resize:vertical;"></textarea>
                                <button type="button" class="btn-accent" onclick="applyRestore()">
                                    <i class="fas fa-rotate-left me-1"></i>원본으로 복원
                                </button>

                                <!-- 복원 결과 -->
                                <div id="restoredResult" style="display:none;margin-top:14px;">
                                    <div class="d-flex align-items-center justify-content-between mb-1">
                                        <span style="font-size:.78rem;color:var(--text-muted);">복원된 텍스트</span>
                                        <button class="copy-btn" onclick="copyRestored()">
                                            <i class="fas fa-copy me-1"></i>복사
                                        </button>
                                    </div>
                                    <div class="masked-text-box" id="restoredDisplay"
                                         style="border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.05);"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div><!-- /row -->
        </div><!-- /main-content -->
    </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/toolkit.js}"></script>
<script>
/* ═══════════════════════════════════════════════════════════════
   State
   ═══════════════════════════════════════════════════════════════ */
var currentMaskedText = '';
var currentTokenMap   = {};  // token → original (JS object)
var currentTokenList  = [];  // [{token, original, type}]

/* ═══════════════════════════════════════════════════════════════
   Init
   ═══════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', function() {
    var saved = localStorage.getItem('input_masking_text');
    if (saved) { document.getElementById('inputText').value = saved; onInputChange(); }
});

function onInputChange() {
    var v = document.getElementById('inputText').value;
    document.getElementById('inputChars').textContent = v.length > 0 ? v.length.toLocaleString() + '자' : '';
    localStorage.setItem('input_masking_text', v);
}

/* ═══════════════════════════════════════════════════════════════
   패턴 선택
   ═══════════════════════════════════════════════════════════════ */
function togglePattern(el) {
    el.classList.toggle('active');
}

function selectAll() {
    var chips = document.querySelectorAll('.pattern-chip');
    for (var i = 0; i < chips.length; i++) chips[i].classList.add('active');
}

function selectNone() {
    var chips = document.querySelectorAll('.pattern-chip');
    for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
}

function getSelectedTypes() {
    var types = [];
    var chips = document.querySelectorAll('.pattern-chip.active');
    for (var i = 0; i < chips.length; i++) {
        types.push(chips[i].getAttribute('data-type'));
    }
    return types;
}

/* ═══════════════════════════════════════════════════════════════
   마스킹 적용
   ═══════════════════════════════════════════════════════════════ */
function applyMasking() {
    var text = document.getElementById('inputText').value;
    if (!text.trim()) { alert('텍스트를 입력해주세요.'); return; }

    var types = getSelectedTypes();
    if (types.length === 0) { alert('탐지할 패턴을 최소 1개 이상 선택해주세요.'); return; }

    var btn = document.getElementById('maskBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-circle-notch fa-spin me-1"></i>탐지 중...';

    var fd = new FormData();
    fd.append('text', text);
    for (var i = 0; i < types.length; i++) fd.append('types', types[i]);

    fetch('/input-masking/mask', {method:'POST', body:fd})
        .then(function(r) { return r.json(); })
        .then(function(d) {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-mask me-1"></i>마스킹 적용';
            if (!d.success) { alert('오류: ' + (d.error||'')); return; }
            renderResult(d);
        })
        .catch(function(e) {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-mask me-1"></i>마스킹 적용';
            alert('요청 실패: ' + e.message);
        });
}

function renderResult(d) {
    currentMaskedText = d.maskedText || '';
    currentTokenMap   = {};
    currentTokenList  = d.tokenList || [];

    for (var i = 0; i < currentTokenList.length; i++) {
        var row = currentTokenList[i];
        currentTokenMap[row.token] = row.original;
    }

    document.getElementById('emptyState').style.display  = 'none';
    document.getElementById('resultArea').style.display  = '';

    // 요약
    var total = d.totalMasked || 0;
    document.getElementById('summaryBadge').textContent =
        total > 0 ? total + '개 마스킹됨' : '민감정보 없음';
    document.getElementById('summaryBadge').style.background =
        total > 0 ? 'rgba(16,185,129,.12)' : 'rgba(100,116,139,.12)';
    document.getElementById('summaryBadge').style.color =
        total > 0 ? '#10b981' : '#64748b';

    // 유형별 요약
    var cbt = d.countByType || {};
    var parts = [];
    for (var k in cbt) {
        if (cbt.hasOwnProperty(k)) parts.push(typeLabel(k) + ' ' + cbt[k] + '개');
    }
    document.getElementById('typeSummary').textContent = parts.join('  ·  ');

    // 마스킹 결과 탭
    document.getElementById('maskedDisplay').innerHTML = highlightTokens(escHtml(currentMaskedText));

    // 토큰 맵 탭
    renderTokenTable(currentTokenList);

    // 복원 탭 초기화
    document.getElementById('restoreInput').value = '';
    document.getElementById('restoredResult').style.display = 'none';

    switchTab('masked');
}

function highlightTokens(html) {
    // {{MASK_TYPE_N}} 패턴을 하이라이트
    return html.replace(/(\{\{MASK_[A-Z_0-9]+\}\})/g,
        '<span class="token-highlight">$1</span>');
}

function renderTokenTable(tokenList) {
    var tbody = document.getElementById('tokenTableBody');
    if (!tokenList || tokenList.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--text-muted);padding:16px;">탐지된 민감정보 없음</td></tr>';
        return;
    }
    var html = '';
    for (var i = 0; i < tokenList.length; i++) {
        var row = tokenList[i];
        html += '<tr>'
              + '<td class="token-cell">' + escHtml(row.token) + '</td>'
              + '<td class="original-cell">' + escHtml(row.original) + '</td>'
              + '<td><span class="type-badge">' + escHtml(typeLabel(row.type)) + '</span></td>'
              + '</tr>';
    }
    tbody.innerHTML = html;
}

/* ═══════════════════════════════════════════════════════════════
   복원
   ═══════════════════════════════════════════════════════════════ */
function applyRestore() {
    var restoreText = document.getElementById('restoreInput').value;
    var textToRestore = restoreText.trim() ? restoreText : currentMaskedText;

    if (!textToRestore) { alert('복원할 텍스트가 없습니다.'); return; }
    if (Object.keys(currentTokenMap).length === 0) { alert('토큰 맵이 없습니다. 먼저 마스킹을 실행하세요.'); return; }

    var fd = new FormData();
    fd.append('maskedText', textToRestore);
    fd.append('tokenJson',  JSON.stringify(currentTokenMap));

    fetch('/input-masking/unmask', {method:'POST', body:fd})
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (!d.success) { alert('오류: ' + (d.error||'')); return; }
            document.getElementById('restoredDisplay').textContent = d.restoredText || '';
            document.getElementById('restoredResult').style.display = '';
            showToast(d.restoredCount + '개 토큰이 복원되었습니다.');
        })
        .catch(function(e) { alert('복원 실패: ' + e.message); });
}

/* ═══════════════════════════════════════════════════════════════
   탭 전환
   ═══════════════════════════════════════════════════════════════ */
function switchTab(tab) {
    var tabs = ['masked','tokenmap','restore'];
    tabs.forEach(function(t) {
        var cap  = t.charAt(0).toUpperCase() + t.slice(1);
        var pane = document.getElementById('tab'    + cap);
        var btn  = document.getElementById('rt'     + cap);
        if (pane) pane.style.display = (t === tab) ? '' : 'none';
        if (btn)  btn.className = 'result-tab' + (t === tab ? ' active' : '');
    });
}

/* ═══════════════════════════════════════════════════════════════
   복사 액션
   ═══════════════════════════════════════════════════════════════ */
function copyMasked() {
    if (!currentMaskedText) { alert('복사할 내용이 없습니다.'); return; }
    copyToClipboard(currentMaskedText, '마스킹된 텍스트가 복사되었습니다.');
}

function copyTokenMap() {
    if (Object.keys(currentTokenMap).length === 0) { alert('토큰 맵이 없습니다.'); return; }
    copyToClipboard(JSON.stringify(currentTokenMap, null, 2), '토큰 맵이 복사되었습니다.');
}

function copyRestored() {
    var el = document.getElementById('restoredDisplay');
    if (!el.textContent) { alert('복사할 내용이 없습니다.'); return; }
    copyToClipboard(el.textContent, '복원된 텍스트가 복사되었습니다.');
}

function copyToClipboard(text, msg) {
    navigator.clipboard.writeText(text).then(function() {
        showToast(msg);
    }).catch(function() {
        var ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        showToast(msg);
    });
}

/* ═══════════════════════════════════════════════════════════════
   유틸
   ═══════════════════════════════════════════════════════════════ */
function clearAll() {
    document.getElementById('inputText').value = '';
    document.getElementById('emptyState').style.display = '';
    document.getElementById('resultArea').style.display = 'none';
    currentMaskedText = ''; currentTokenMap = {}; currentTokenList = [];
    localStorage.removeItem('input_masking_text');
    onInputChange();
}

function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function typeLabel(type) {
    var map = {
        SSN:'주민번호', CREDIT_CARD:'신용카드', EMAIL:'이메일', PHONE_KR:'전화번호',
        IP_ADDR:'IP 주소', PASSWORD:'비밀번호', API_KEY:'API 키', ACCOUNT_NO:'계좌번호'
    };
    return map[type] || type;
}

function showToast(msg) {
    if (typeof window.showToast === 'function') { window.showToast(msg); return; }
    var t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#10b981;color:#fff;padding:8px 18px;border-radius:8px;font-size:.82rem;z-index:9999;';
    document.body.appendChild(t);
    setTimeout(function() { if (t.parentNode) document.body.removeChild(t); }, 2500);
}

// Ctrl+Enter
document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); applyMasking(); }
});
</script>
