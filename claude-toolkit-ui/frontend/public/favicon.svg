<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background tile -->
  <rect width="100" height="100" rx="18" fill="#0f172a"/>
  <!-- Antenna stem -->
  <rect x="46" y="7" width="8" height="15" rx="3" fill="#f97316"/>
  <!-- Antenna orb -->
  <circle cx="50" cy="6" r="6" fill="#f97316"/>
  <!-- Robot head -->
  <rect x="10" y="20" width="80" height="64" rx="13" fill="#f97316"/>
  <!-- Left eye socket -->
  <circle cx="33" cy="46" r="10" fill="#0f172a"/>
  <!-- Right eye socket -->
  <circle cx="67" cy="46" r="10" fill="#0f172a"/>
  <!-- Left eye glow -->
  <circle cx="33" cy="46" r="5" fill="#7dd3fc"/>
  <!-- Right eye glow -->
  <circle cx="67" cy="46" r="5" fill="#7dd3fc"/>
  <!-- Mouth / speaker grille -->
  <rect x="26" y="64" width="48" height="9" rx="4" fill="#0f172a"/>
  <rect x="32" y="64" width="4" height="9" fill="#f97316"/>
  <rect x="40" y="64" width="4" height="9" fill="#f97316"/>
  <rect x="48" y="64" width="4" height="9" fill="#f97316"/>
  <rect x="56" y="64" width="4" height="9" fill="#f97316"/>
  <rect x="64" y="64" width="4" height="9" fill="#f97316"/>
  <!-- Left ear bolt -->
  <circle cx="10" cy="50" r="5" fill="#0f172a"/>
  <!-- Right ear bolt -->
  <circle cx="90" cy="50" r="5" fill="#0f172a"/>
