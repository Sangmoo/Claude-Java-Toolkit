name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests --batch-mode

      - name: Run Tests
        run: mvn test --batch-mode
        env:
          # Tests that need API key are skipped unless secret is set
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            claude-sql-advisor/target/claude-sql-advisor.jar
            claude-doc-generator/target/claude-doc-generator.jar
            claude-toolkit-ui/target/*.jar
