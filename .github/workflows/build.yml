name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build all modules
        run: mvn -B package -DskipTests --no-transfer-progress

      - name: Upload UI JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-toolkit-ui
          path: claude-toolkit-ui/target/*.jar
          retention-days: 7
